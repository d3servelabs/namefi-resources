{{ define "header" }}
<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
        <base target="_blank">

        <style>
            body {
                background-color: #eef4fb;
                font-family: "Avenir Next", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                font-size: 16px;
                line-height: 24px;
                margin: 0;
                color: #4b5f77;
            }

            .wrap {
                background-color: #fff;
                padding: 32px;
                max-width: 620px;
                margin: 0 auto;
                border-radius: 18px;
                border: 1px solid #d6e0ed;
            }

            .header {
                padding-bottom: 0.9rem;
                margin-bottom: 1rem;
            }

            .header-logo {
                display: block;
                width: 104px;
                max-width: 100%;
                height: auto;
            }

            .footer {
                text-align: center;
                font-size: 12px;
                color: #6c7e94;
            }
            .footer a {
                color: #18865f;
            }
            .footer a:hover {
                color: #136a4b;
            }

            .gutter {
                padding: 24px;
            }
            .button {
                background: #48e59b;
                color: #032017 !important;
                display: inline-block;
                border-radius: 10px;
                padding: 0.58rem 1rem;
                text-align: center;
                text-decoration: none;
                font-weight: 700;
            }
            .button:hover {
                background: #35cf89;
                color: #032017;
            }
            img {
                max-width: 100%;
            }

            a {
                color: #18865f !important;
                text-decoration-color: #9adfc0;
                text-underline-offset: 3px;
            }
            a:hover {
                color: #136a4b;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                border: 1px solid #c1d0e2;
            }
            table th {
                border: 1px solid #d3deeb;
                background-color: #edf3fb;
                color: #445a74;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.04em;
                padding: 10px 12px;
                text-align: left;
                text-transform: uppercase;
            }
            table td {
                border: 1px solid #d3deeb;
                color: #0f1b2d;
                padding: 10px 12px;
            }
            h1, h2, h3 {
                color: #101b2d;
            }
            @media screen and (max-width: 600px) {
                .wrap {
                    max-width: auto;
                }
                .gutter {
                    padding: 0.5rem;
                }
            }
        </style>
    </head>
<body style="background-color: #eef4fb;">
    <div class="gutter">&nbsp;</div>
    <div class="wrap">
        <div class="header">
            {{ if ne LogoURL "" }}
                <img src="{{ LogoURL }}" alt="Namefi" class="header-logo" />
            {{ end }}
        </div>
{{ end }}

{{ define "footer" }}
    </div>
    
    <div class="footer">
    </div>
    <div class="gutter">&nbsp;</div>
</body>
</html>
{{ end }}
