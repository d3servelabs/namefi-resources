{{ define "header" }}
<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
        <base target="_blank">

        <style>
            body {
                background-color: #F0F1F3;
                font-family: 'Helvetica Neue', 'Segoe UI', Helvetica, sans-serif;
                font-size: 15px;
                line-height: 26px;
                margin: 0;
                color: #444;
            }

            .wrap {
                background-color: #fff;
                padding: 30px;
                max-width: 525px;
                margin: 0 auto;
                border-radius: 0.65rem;
            }

            .header {
                border-bottom: 1px solid #737373;
                padding-bottom: 1rem;
                margin-bottom: 1rem;
            }

            .footer {
                text-align: center;
                font-size: 12px;
                color: #888;
            }
            .footer a {
                color: #1dd17d;
            }
            .footer a:hover {
                color: #00b05f;
            }

            .gutter {
                padding: 30px;
            }
            .button {
                background: #1dd17d;
                color: #fff !important;
                display: inline-block;
                border-radius: 0.65rem;
                padding: 0.5rem 1rem;
                text-align: center;
                text-decoration: none;
                font-weight: bold;
            }
            .button:hover {
                background: #00b05f;
                color: #fff;
            }
            img {
                max-width: 100%;
            }

            a {
                color: #1dd17d !important;
            }
            a:hover {
                color: #00b05f;
            }
            @media screen and (max-width: 600px) {
                .wrap {
                    max-width: auto;
                }
                .gutter {
                    padding: 0.5rem;
                }
            }
        </style>
    </head>
<body style="background-color: #F0F1F3;">
    <div class="gutter">&nbsp;</div>
    <div class="wrap">
        <div class="header">
            {{ if ne LogoURL "" }}
                <img src="{{ LogoURL }}" alt="listmonk" />
            {{ end }}
        </div>
{{ end }}

{{ define "footer" }}
    </div>
    
    <div class="footer">
    </div>
    <div class="gutter">&nbsp;</div>
</body>
</html>
{{ end }}
