events{
}
error_log /dev/stderr error;


http {
    resolver 169.254.169.254 ipv6=off valid=30s;
    resolver_timeout 60s;

    upstream api {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    upstream temporal {
        server 127.0.0.1:8233;
        keepalive 16;
    }

    upstream workers {
        server 127.0.0.1:3001;
        keepalive 16;
    }

    upstream control {
        server 127.0.0.1:8081;
    }

    upstream hello {
        server 127.0.0.1:8080;
    }

    # control
    server {
        listen 8081;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
    # hello
    server {
        listen 8080;
        location / {
            default_type text/plain;
            return 200 'Ok';
        }
    }

    map $cookie_proxy_override $upstream_host_from_cookie {
        default "api";

        api "api";
        workers "workers";
        temporal-ui "temporal";
        hello "hello";
    }

    map $arg_namefi_dev_mode_control $upstream_host {
        default $upstream_host_from_cookie;
        1 'control';
    }



    server {
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        access_log /dev/stdout;
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            proxy_pass http://$upstream_host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
