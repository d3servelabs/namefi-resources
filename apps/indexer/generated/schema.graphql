"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type Meta {
  status: JSON
}

type Query {
  namefiNft(tokenId: BigInt!, chainId: Float!): NamefiNft
  namefiNfts(where: NamefiNftFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): NamefiNftPage!
  burnedNamefiNftLog(tokenId: BigInt!, chainId: Float!, burnedBlock: BigInt!): BurnedNamefiNftLog
  burnedNamefiNftLogs(where: BurnedNamefiNftLogFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): BurnedNamefiNftLogPage!
  _meta: Meta
}

