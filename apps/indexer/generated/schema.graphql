"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type Meta {
  status: JSON
}

type Query {
  namefiNft(tokenId: BigInt!, chainId: Float!): NamefiNft
  namefiNfts(where: NamefiNftFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): NamefiNftPage!
  _meta: Meta
}

type NamefiNft {
  tokenId: BigInt!
  normalizedDomainName: String!
  expirationTimeInSeconds: BigInt!
  isLocked: Boolean
  ownerAddress: String!
  chainId: Int!
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

type NamefiNftPage {
  items: [NamefiNft!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

input NamefiNftFilter {
  AND: [NamefiNftFilter]
  OR: [NamefiNftFilter]
  tokenId: BigInt
  tokenId_not: BigInt
  tokenId_in: [BigInt]
  tokenId_not_in: [BigInt]
  tokenId_gt: BigInt
  tokenId_lt: BigInt
  tokenId_gte: BigInt
  tokenId_lte: BigInt
  normalizedDomainName: String
  normalizedDomainName_not: String
  normalizedDomainName_in: [String]
  normalizedDomainName_not_in: [String]
  normalizedDomainName_contains: String
  normalizedDomainName_not_contains: String
  normalizedDomainName_starts_with: String
  normalizedDomainName_ends_with: String
  normalizedDomainName_not_starts_with: String
  normalizedDomainName_not_ends_with: String
  expirationTimeInSeconds: BigInt
  expirationTimeInSeconds_not: BigInt
  expirationTimeInSeconds_in: [BigInt]
  expirationTimeInSeconds_not_in: [BigInt]
  expirationTimeInSeconds_gt: BigInt
  expirationTimeInSeconds_lt: BigInt
  expirationTimeInSeconds_gte: BigInt
  expirationTimeInSeconds_lte: BigInt
  isLocked: Boolean
  isLocked_not: Boolean
  isLocked_in: [Boolean]
  isLocked_not_in: [Boolean]
  ownerAddress: String
  ownerAddress_not: String
  ownerAddress_in: [String]
  ownerAddress_not_in: [String]
  ownerAddress_contains: String
  ownerAddress_not_contains: String
  ownerAddress_starts_with: String
  ownerAddress_ends_with: String
  ownerAddress_not_starts_with: String
  ownerAddress_not_ends_with: String
  chainId: Int
  chainId_not: Int
  chainId_in: [Int]
  chainId_not_in: [Int]
  chainId_gt: Int
  chainId_lt: Int
  chainId_gte: Int
  chainId_lte: Int
  lastUpdatedBlock: BigInt
  lastUpdatedBlock_not: BigInt
  lastUpdatedBlock_in: [BigInt]
  lastUpdatedBlock_not_in: [BigInt]
  lastUpdatedBlock_gt: BigInt
  lastUpdatedBlock_lt: BigInt
  lastUpdatedBlock_gte: BigInt
  lastUpdatedBlock_lte: BigInt
  lastUpdatedTimestamp: BigInt
  lastUpdatedTimestamp_not: BigInt
  lastUpdatedTimestamp_in: [BigInt]
  lastUpdatedTimestamp_not_in: [BigInt]
  lastUpdatedTimestamp_gt: BigInt
  lastUpdatedTimestamp_lt: BigInt
  lastUpdatedTimestamp_gte: BigInt
  lastUpdatedTimestamp_lte: BigInt
}