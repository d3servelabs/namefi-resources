id: require-namefi-subject-prefix
message: "Email subjects should start with [Namefi] prefix"
severity: warning
language: tsx
rule:
  pattern: 'title="$TITLE"'
  inside:
    pattern: '<NamefiEmailContainer $$$>'
  not:
    matches: '[Namefi] $$$'
note: |
  Add [Namefi] prefix to subject:
  title="[Namefi] Your Subject Here"

files:
  - "apps/backend/src/mail/**/*.tsx"
  - "apps/backend/src/mail/**/*.tsx"

ignore:
  - "**/*.test.tsx"
  - "**/*.spec.tsx"
  - "**/node_modules/**" 