id: require-rehype-external-links
message: "ReactMarkdown should use rehypeExternalLinks plugin"
severity: info
language: tsx

rule:
  pattern: '<ReactMarkdown $$$>'
  not:
    has:
      all:
        - pattern:
            context: '<ReactMarkdown rehypePlugins=$VAR>'
            selector: jsx_attribute
        - regex: 'rehypeExternalLinks'

note: |
  Add rehypeExternalLinks plugin:
  <ReactMarkdown
    rehypePlugins={[
      [rehypeExternalLinks, { target: '_blank', rel: ['noopener', 'noreferrer'] }],
    ]}
  >

files:
  - "apps/backend/src/mail/**/*.tsx"
  - "apps/backend/src/mail/**/*.tsx"

ignore:
  - "**/*.test.tsx"
  - "**/*.spec.tsx"
  - "**/node_modules/**" 