id: require-powered-by-namefi-hook-import
message: "Email templates should import usePoweredByNamefiDomain hook"
severity: warning
language: tsx
rule:
  pattern: |
    export const $COMPONENT = (props: $Props) => {
      $$$
    };
  not:
    inside:
      any:
        - pattern: |
            import { usePoweredByNamefiDomain } from '../components/powered-by-namefi-url-context';
        - pattern: |
            import { $$$, usePoweredByNamefiDomain, $$$ } from '../components/powered-by-namefi-url-context';
note: |
  Import usePoweredByNamefiDomain:
  import { usePoweredByNamefiDomain } from '../components/powered-by-namefi-url-context';

files:
  - "apps/backend/src/mail/**/*.tsx"
  - "apps/backend/src/mail/**/*.tsx"

ignore:
  - "**/*.test.tsx"
  - "**/*.spec.tsx"
  - "**/node_modules/**" 