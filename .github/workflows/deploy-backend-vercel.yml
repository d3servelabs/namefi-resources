name: Deploy Backend and Vercel

on:
  push:
    branches:
      - main # Regular push to main branch deploys to dev
    tags:
      - "astra/prod/v*" # Tags like astra/prod/v1.0.0 for production deployment
      - "astra/v*" # Tags like astra/v1.0.0 (marker for triggering prod deployment)
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - production

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }} # GCP project ID
  REGION: ${{ vars.GCP_REGION }} # GCP region
  REPO_NAME: ${{ vars.REPOSITORY_NAME }} # Artifact Registry repository name
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_RELEASE_CHANNEL_URL }} # Slack webhook URL
jobs:
  display_info:
    runs-on: ubuntu-latest
    steps:
      - name: Show Push Event Details
        run: |
          echo "Ref: ${{ github.event.ref }}"
          echo "Before SHA: ${{ github.event.before }}"
          echo "After SHA: ${{ github.event.after }}"
          echo "Base Ref (for push events, usually null): ${{ github.event.base_ref }}"
  # Detect if backend and frontend packages have changed
  detect-changes:
    name: Detect Backend and Frontend Changes
    runs-on: ubuntu-latest
    outputs:
      has-backend-changes: ${{ steps.check-changes.outputs.has-backend-changes }}
      has-frontend-changes: ${{ steps.check-changes.outputs.has-frontend-changes }}
      should-backend-deploy: ${{ steps.check-changes.outputs.should-backend-deploy }}
      should-frontend-deploy: ${{ steps.check-changes.outputs.should-frontend-deploy }}
    steps:
      - name: Check if deploy is unconditional
        id: deploy-mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "skip-detection=true" >> $GITHUB_OUTPUT
            echo "reason=manual workflow dispatch" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/astra/(prod/)?v ]]; then
            echo "skip-detection=true" >> $GITHUB_OUTPUT
            echo "reason=tag push" >> $GITHUB_OUTPUT
          else
            echo "skip-detection=false" >> $GITHUB_OUTPUT
            echo "reason=change detection required" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.deploy-mode.outputs.skip-detection != 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Determine before commit
        if: steps.deploy-mode.outputs.skip-detection != 'true'
        id: determine-before-commit
        uses: ./.github/actions/determine-before-commit

      - name: Detect Turbo changes
        if: steps.deploy-mode.outputs.skip-detection != 'true'
        id: turbo-changes
        uses: ./.github/actions/detect-turbo-changes
        with:
          base-ref: ${{ steps.determine-before-commit.outputs.before-commit }}
          head-ref: ${{ github.sha }}
          packages: |
            @namefi-astra/backend
            @namefi-astra/frontend
          fallback-files: |
            bun.lock
            package.json
            bunfig.toml
            .bun-version

      - name: Check if changed
        id: check-changes
        run: |
          # Deploy if:
          # 1. Manual workflow dispatch
          # 2. Tag push (astra/v* or astra/prod/v*)
          # 3. Main branch push AND (backend OR frontend have changes)
          SKIP_DETECTION="${{ steps.deploy-mode.outputs.skip-detection }}"
          HAS_BACKEND_CHANGES="${{ contains(fromJSON(steps.turbo-changes.outputs.changed-packages || '[]'), '@namefi-astra/backend' ) }}"
          HAS_FRONTEND_CHANGES="${{ contains(fromJSON(steps.turbo-changes.outputs.changed-packages || '[]'), '@namefi-astra/frontend' ) }}"

          echo "Detection mode: ${{ steps.deploy-mode.outputs.reason }}"

          if [[ "$SKIP_DETECTION" == "true" ]]; then
            HAS_BACKEND_CHANGES="true"
            HAS_FRONTEND_CHANGES="true"
          fi

          echo "has-backend-changes=$HAS_BACKEND_CHANGES" >> $GITHUB_OUTPUT
          echo "has-frontend-changes=$HAS_FRONTEND_CHANGES" >> $GITHUB_OUTPUT

          if [[ "$SKIP_DETECTION" == "true" ]]; then
            echo "should-backend-deploy=true" >> $GITHUB_OUTPUT
            echo "should-frontend-deploy=true" >> $GITHUB_OUTPUT
            echo "Deploying without change detection"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should-backend-deploy=$HAS_BACKEND_CHANGES" >> $GITHUB_OUTPUT
            echo "should-frontend-deploy=$HAS_FRONTEND_CHANGES" >> $GITHUB_OUTPUT
            echo "Deploying: Main branch push with backend changes"
          else
            echo "should-backend-deploy=false" >> $GITHUB_OUTPUT
            echo "should-frontend-deploy=false" >> $GITHUB_OUTPUT
            echo "Skipping: No relevant changes or trigger"
          fi

  # Compute environment variables
  compute-env:
    name: Compute Environment Variables
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.compute.outputs.label }}
      infisical_token_selector: ${{ steps.infisical_token_selector.outputs.infisical_token_selector }}
      vercel_env: ${{ steps.compute.outputs.vercel_env }}
      should_trigger_prod: ${{ steps.compute.outputs.should_trigger_prod }}
    steps:
      - name: Compute environment values
        id: compute
        run: |
          # Determine if this is a production deployment
          IS_PROD="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.environment }}" == "production" ]]; then
            IS_PROD="true"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/astra/prod/v* ]]; then
            IS_PROD="true"
          fi

          # Set label (prod or dev)
          if [[ "$IS_PROD" == "true" ]]; then
            echo "label=prod" >> $GITHUB_OUTPUT
            echo "vercel_env=production" >> $GITHUB_OUTPUT
          else
            echo "label=dev" >> $GITHUB_OUTPUT
            echo "vercel_env=dev" >> $GITHUB_OUTPUT
          fi

          # Determine if we should trigger prod deployment (only for astra/v* tags, not astra/prod/v*)
          SHOULD_TRIGGER="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/astra/v* && "${{ github.ref }}" != refs/tags/astra/prod/v* ]]; then
            SHOULD_TRIGGER="true"
          fi
          echo "should_trigger_prod=$SHOULD_TRIGGER" >> $GITHUB_OUTPUT

          # Output for debugging
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Is Production: $IS_PROD"
          echo "Label: $([ "$IS_PROD" == "true" ] && echo "prod" || echo "dev")"
          echo "Vercel Env: $([ "$IS_PROD" == "true" ] && echo "production" || echo "dev")"
          echo "Should Trigger Prod: $SHOULD_TRIGGER"

      - name: Set Infisical token selector
        id: infisical_token_selector
        run: |
          if [[ "${{ steps.compute.outputs.label }}" == "prod" ]]; then
            echo "infisical_token_selector=prod" >> $GITHUB_OUTPUT
          else
            echo "infisical_token_selector=dev" >> $GITHUB_OUTPUT
          fi

  # Check if we should skip this run (if tag exists for same commit on main push)
  check-duplicate:
    name: Check for Duplicate Runs
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check if tag exists for this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only check for duplicates on main branch push
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            COMMIT_SHA="${{ github.sha }}"

            # Wait a few seconds to allow tag push events to be registered
            # This handles the race condition where tag and commit are pushed together
            echo "Waiting 15 seconds to allow tag events to be registered..."
            sleep 15

            # Use GitHub API to query tags - this handles authentication automatically
            # and is more reliable than git ls-remote in CI environments
            echo "Checking for tags pointing to commit $COMMIT_SHA..."
            
            # Get all tags and filter for astra/v* or astra/prod/v* tags pointing to this commit
            MATCHING_TAGS=$(gh api repos/${{ github.repository }}/tags --paginate --jq ".[] | select(.commit.sha == \"$COMMIT_SHA\") | .name" 2>/dev/null | grep -E '^astra/(prod/)?v' || true)

            if [ ! -z "$MATCHING_TAGS" ]; then
              echo "Found tags for this commit via GitHub API:"
              echo "$MATCHING_TAGS"
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "Skipping workflow - tag-based deployment will handle this"
            else
              echo "No matching tags found for this commit"
              echo "should_skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Not a main branch push, proceeding with workflow"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug output
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Should skip: ${{ steps.check.outputs.should_skip }}"

  # Backend build job
  build-backend:
    name: Build Backend Container
    needs: [compute-env, check-duplicate, detect-changes]
    if: needs.check-duplicate.outputs.should_skip != 'true' && needs.detect-changes.outputs.should-backend-deploy == 'true'
    runs-on: "blacksmith-8vcpu-ubuntu-2404"
    permissions:
      contents: read
      id-token: write # Required for GCP Workload Identity Federation
    outputs:
      image_exists: ${{ steps.check-image.outputs.exists }}
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Debug environment variables
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Environment: ${{ needs.compute-env.outputs.label }}"
          echo "Vercel Environment: ${{ needs.compute-env.outputs.vercel_env }}"

      # Set up Google Cloud authentication using WIF
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set Docker tag
        id: set-tag
        run: |
          # Use SHA-based tag without environment label for reusability
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api:${{ github.sha }}"
          LATEST_IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api:latest"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "latest_image_tag=$LATEST_IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Docker tag: $IMAGE_TAG"

      - name: Check if Docker image exists
        id: check-image
        run: |
          {
            IMAGE_TAG="${{ steps.set-tag.outputs.image_tag }}"

            IMAGE_DETAILS="$(gcloud artifacts docker images describe "$IMAGE_TAG" --format="json" 2>/dev/null)"

            {
              echo "Image details: $IMAGE_DETAILS"
            } || {
              echo "Image not found: $IMAGE_TAG"
            }
            DIGEST="$(echo $IMAGE_DETAILS | jq .image_summary.digest)"

            # Try to pull the manifest to check if image exists
            if [[ -n $DIGEST ]]; then
              echo "Image already exists: $IMAGE_TAG"
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "Image does not exist: $IMAGE_TAG"
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          } || {
            echo "Failed to check image: $IMAGE_TAG"
            echo "exists=false" >> $GITHUB_OUTPUT
          }

      - name: Set up Docker Buildx
        if: steps.check-image.outputs.exists != 'true'
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build and Push Container
        if: steps.check-image.outputs.exists != 'true'
        uses: useblacksmith/build-push-action@v2
        with:
          tags: ${{ steps.set-tag.outputs.latest_image_tag }},${{ steps.set-tag.outputs.image_tag }}
          push: true
          context: .
          file: ./apps/backend/Dockerfile

      - name: Skip build
        if: steps.check-image.outputs.exists == 'true'
        run: |
          echo "Skipping build - image already exists"
          echo "Using existing image: ${{ steps.set-tag.outputs.image_tag }}"

  # Deploy to Cloud Run (Backend API)
  deploy-backend-api:
    name: Deploy Backend API to Cloud Run
    needs: [compute-env, build-backend]
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      id-token: write # Required for GCP Workload Identity Federation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run (Backend/API)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: "namefi-astra-api-${{ needs.compute-env.outputs.label }}"
          region: ${{ env.REGION }}
          project_id: "${{ env.PROJECT_ID }}"
          image: "${{ needs.build-backend.outputs.image_tag }}"

      - name: Show Backend API URL
        run: |
          echo "Backend API deployed to ${{ steps.deploy.outputs.url }}"
          echo "Using image: ${{ needs.build-backend.outputs.image_tag }}"
          echo "Image was cached: ${{ needs.build-backend.outputs.image_exists }}"

  # Deploy to Cloud Run (Temporal)
  deploy-backend-temporal:
    name: Deploy Temporal to Cloud Run
    needs: [compute-env, build-backend]
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      id-token: write # Required for GCP Workload Identity Federation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run (Backend/Temporal)
        id: deploy-temporal
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: "namefi-astra-temporal-${{ needs.compute-env.outputs.label }}"
          region: ${{ env.REGION }}
          project_id: "${{ env.PROJECT_ID }}"
          image: "${{ needs.build-backend.outputs.image_tag }}"

      - name: Show Temporal URL
        run: |
          echo "Temporal deployed to ${{ steps.deploy-temporal.outputs.url }}"
          echo "Using image: ${{ needs.build-backend.outputs.image_tag }}"
          echo "Image was cached: ${{ needs.build-backend.outputs.image_exists }}"

  # Run database migrations
  migrate:
    name: Run Database Migrations
    needs: [compute-env, deploy-backend-api, deploy-backend-temporal]
    runs-on: "blacksmith-4vcpu-ubuntu-2204"
    env:
      INFISICAL_SERVICE_TOKEN: ${{ needs.compute-env.outputs.infisical_token_selector == 'prod' && secrets.INFISICAL_PROD_SERVICE_TOKEN || secrets.INFISICAL_DEV_SERVICE_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install

      - name: Run DB Migration
        working-directory: ./packages/db
        run: bun db:migrate

  # Deploy to Vercel (build happens on Vercel, but traffic is not routed yet)
  deploy-vercel:
    name: Deploy Frontend to Vercel
    needs: [compute-env, check-duplicate, detect-changes]
    if: needs.check-duplicate.outputs.should_skip != 'true' && needs.detect-changes.outputs.should-frontend-deploy == 'true'
    runs-on: "ubuntu-latest"
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Prepare pruned Vercel root
        id: prune
        run: |
          set -euo pipefail

          PRUNE_DIR="${RUNNER_TEMP:-/tmp}/vercel-pruned-$RANDOM"

          bunx turbo prune @namefi-astra/frontend --docker --out-dir "$PRUNE_DIR"

          PRUNED_ROOT="$PRUNE_DIR/full"

          if [[ -f ".bun-version" ]]; then
            cp ".bun-version" "$PRUNED_ROOT/"
          fi

          if [[ -f "vercel.json" ]]; then
            cp "vercel.json" "$PRUNED_ROOT/"
          fi

          if [[ -f "$PRUNE_DIR/bun.lock" ]]; then
            cp "$PRUNE_DIR/bun.lock" "$PRUNED_ROOT/"
          fi

          if [[ -f "scripts/prepare.sh" ]]; then
            mkdir -p "$PRUNED_ROOT/scripts"
            cp "scripts/prepare.sh" "$PRUNED_ROOT/scripts/prepare.sh"
          fi

          echo "deploy_root=$PRUNED_ROOT" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (build on Vercel, skip domain routing)
        id: deploy
        run: |
          set -euo pipefail

          cd "${{ steps.prune.outputs.deploy_root }}"

          # Deploy with --skip-domain to build on Vercel without routing traffic
          # Use --target=production or --target=dev based on environment
          if [[ "${{ needs.compute-env.outputs.label }}" == "prod" ]]; then
            echo "Deploying to production target (traffic not routed yet)"
            DEPLOYMENT_URL=$(vercel deploy --yes --target=production --skip-domain --scope=${{ secrets.VERCEL_ORG_ID }} --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }} | tail -n 1 | tr -d '\r')
          else
            echo "Deploying to dev target (traffic not routed yet)"
            DEPLOYMENT_URL=$(vercel deploy --yes --target=dev --scope=${{ secrets.VERCEL_ORG_ID }} --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }} | tail -n 1 | tr -d '\r')
          fi

          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

          # Extract deployment ID from URL for promote step
          DEPLOYMENT_ID=$(echo "$DEPLOYMENT_URL" | sed -E 's|https://(.+)|\1|')
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Deployment ID: $DEPLOYMENT_ID"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PROJECT_ID }}

      - name: Show Deployment URL
        run: |
          echo "🚀 Frontend built and deployed to: ${{ steps.deploy.outputs.deployment_url }}"
          echo "Target environment: ${{ needs.compute-env.outputs.label }}"
          echo "Note: Traffic is not yet routed to this deployment"

  # Route traffic to Vercel deployment
  route-vercel-traffic:
    name: Route Traffic to Vercel
    needs: [compute-env, deploy-vercel, deploy-backend-api, deploy-backend-temporal, migrate]
    if: |-
      !cancelled() &&
      needs.deploy-vercel.result == 'success' &&
      (needs.deploy-backend-api.result == 'success' || needs.deploy-backend-api.result == 'skipped') &&
      (needs.deploy-backend-temporal.result == 'success' || needs.deploy-backend-temporal.result == 'skipped') &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: "ubuntu-latest"
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Promote deployment to production
        if: needs.compute-env.outputs.label == 'prod'
        run: |
          echo "Promoting deployment to production: ${{ needs.deploy-vercel.outputs.deployment_url }}"
          # Use vercel promote to route production traffic
          vercel promote --yes "${{ needs.deploy-vercel.outputs.deployment_id }}" --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          echo "✅ Production traffic routed successfully"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PROJECT_ID }}

      - name: Dev deployment ready
        if: needs.compute-env.outputs.label == 'dev'
        run: |
          echo "Development deployment is ready at: ${{ needs.deploy-vercel.outputs.deployment_url }}"
          echo "✅ No promotion needed for dev environment"

  # Optional: Trigger additional workflow for prod deployment after tag build
  # Only runs for astra/v* tags (not astra/prod/v*)
  trigger-prod-deployment:
    name: Trigger Production Deployment
    needs: [compute-env, build-backend]
    if: needs.compute-env.outputs.should_trigger_prod == 'true'
    runs-on: "ubuntu-latest"
    env:
      WORKFLOW_ID: ${{ vars.DEPLOY_BACKEND_VERCEL_WORKFLOW_ID }}
    steps:
      - name: Authenticate as NameFi Bot
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.NAMEFI_BOT_APP_ID }}
          private-key: ${{ secrets.NAMEFI_BOT_PRIVATE_KEY }}

      - name: Wait for Artifact Registry propagation
        run: |
          echo "Waiting 60 seconds to ensure Docker image is available..."
          sleep 60

      - name: Trigger Production Workflow
        run: |
          echo "Tag deployment completed: ${{ github.ref }}"
          echo "Container built with SHA: ${{ github.sha }}"

          curl -X POST \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            --fail-with-body \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/${{ env.WORKFLOW_ID }}/dispatches \
            -d '{"ref":"${{ github.ref }}","inputs":{"environment":"production"}}'

  # Summary job
  deployment-summary:
    name: Deployment Summary
    needs:
      [
        compute-env,
        deploy-backend-api,
        deploy-backend-temporal,
        deploy-vercel,
        route-vercel-traffic,
      ]
    if: always()
    runs-on: "ubuntu-latest"
    steps:
      - name: Summary
        id: summary
        run: |
          echo "## 📊 Deployment Summary"
          echo ""
          echo "### Environment: ${{ needs.compute-env.outputs.label }}"
          echo "### Trigger: ${{ github.event_name }}"
          echo "### Ref: ${{ github.ref }}"
          echo ""
          echo "### Backend Status:"
          echo "- API: ${{ needs.deploy-backend-api.result }}"
          echo "- Temporal: ${{ needs.deploy-backend-temporal.result }}"
          echo ""
          echo "### Frontend Status:"
          echo "- Vercel Deploy: ${{ needs.deploy-vercel.result }}"
          echo "- Vercel Traffic Routing: ${{ needs.route-vercel-traffic.result }}"
          echo ""

          # Determine overall status
          if [[ "${{ needs.deploy-vercel.result }}" == "success" && \
                "${{ needs.route-vercel-traffic.result }}" == "success" && \
                "${{ needs.deploy-backend-api.result }}" == "success" && \
                "${{ needs.deploy-backend-temporal.result }}" == "success" ]]; then
            echo "### 🎉 Deployment Complete!"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "### ⚠️ Deployment had issues, please check the logs"
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: always() && !(github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          # Determine status emoji and color
          if [[ "${{ steps.summary.outputs.status }}" == "success" ]]; then
            STATUS_EMOJI="🎉"
            STATUS_TEXT="Success"
            COLOR="good"
          else
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="Failed"
            COLOR="danger"
          fi

          # Build Slack message payload
          PAYLOAD=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "$COLOR",
                "title": "$STATUS_EMOJI Deployment $STATUS_TEXT",
                "fields": [
                  {
                    "title": "Environment",
                    "value": "${{ needs.compute-env.outputs.label }}",
                    "short": true
                  },
                  {
                    "title": "Trigger",
                    "value": "${{ github.event_name }}",
                    "short": true
                  },
                  {
                    "title": "Ref",
                    "value": "${{ github.ref }}",
                    "short": false
                  },
                  {
                    "title": "Backend API",
                    "value": "${{ needs.deploy-backend-api.result }}",
                    "short": true
                  },
                  {
                    "title": "Backend Temporal",
                    "value": "${{ needs.deploy-backend-temporal.result }}",
                    "short": true
                  },
                  {
                    "title": "Frontend (Vercel)",
                    "value": "${{ needs.deploy-vercel.result }}",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>",
                    "short": true
                  },
                  {
                    "title": "Workflow Run",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>",
                    "short": false
                  }
                ],
                "footer": "GitHub Actions",
                "ts": $(date +%s)
              }
            ]
          }
          EOF
          )

          # Send to Slack
          # Requires SLACK_WEBHOOK_URL secret to be set
          if [[ -n "${{ env.SLACK_WEBHOOK_URL }}" ]]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" \
              "${{ env.SLACK_WEBHOOK_URL }}"
            echo "Slack notification sent"
          else
            echo "SLACK_WEBHOOK_URL not configured, skipping notification"
          fi
