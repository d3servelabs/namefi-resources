name: Review PR by OpenHands

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested, synchronize]
    branches-ignore:
      - prod
  workflow_dispatch:
    inputs:  
      pr_number:  
        description: "PR number to review (required for manual runs)"  
        required: true  
        type: number  

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-auto-review:
    name: Check Auto Review Configuration
    runs-on: ubuntu-latest
    outputs:
      should-review: ${{ steps.check.outputs.should-review }}
    steps:
      - name: Check Configuration
        id: check
        run: |
          # Always run for manual dispatches
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should-review=true" >> $GITHUB_OUTPUT
            echo "✅ Manual dispatch detected, proceeding with review"
            exit 0
          fi

          # For PR triggers, check OPENHANDS_AUTO_REVIEW variable
          OPENHANDS_AUTO_REVIEW="${{ vars.OPENHANDS_AUTO_REVIEW || 'false' }}"

          if [ "$OPENHANDS_AUTO_REVIEW" = "true" ]; then
            echo "should-review=true" >> $GITHUB_OUTPUT
            echo "✅ Auto-review is enabled, proceeding with review"
          else
            echo "should-review=false" >> $GITHUB_OUTPUT
            echo "❌ Auto-review is disabled (OPENHANDS_AUTO_REVIEW=$OPENHANDS_AUTO_REVIEW)"
            echo "## ⏭️ Scheduled Review Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Auto-review is disabled. To enable scheduled reviews, set the repository variable \`OPENHANDS_AUTO_REVIEW=true\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
  review:
    permissions:  
      contents: read  
      pull-requests: write  
      issues: write 
    runs-on: ubuntu-latest
    needs: check-auto-review
    if: needs.check-auto-review.outputs.should-review == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Review PR
        timeout-minutes: 20
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.OPENHANDS_LLM_MODEL }}
          REVIEW_BOT_GITHUB_TOKEN: ${{ secrets.REVIEW_BOT_GITHUB_TOKEN }}
          REVIEW_BOT_GITHUB_REPO: ${{ github.repository }}
          REVIEW_BOT_GITHUB_PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          WORKSPACE_BASE: ${{ github.workspace }}
        run: |
          mkdir -p "$WORKSPACE_BASE/.openhands"
          PROMPT_FILE="$WORKSPACE_BASE/.openhands/PROMPT.md"
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "PROMPT.md not found at $PROMPT_FILE" >&2
            exit 1
          fi
          PROMPT_CONTENT=$(envsubst '$REVIEW_BOT_GITHUB_PR_NUMBER $REVIEW_BOT_GITHUB_REPO' < "$PROMPT_FILE")

          docker run --rm -i \
            --pull=always \
            -e SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.56-nikolaik \
            -e WORKSPACE_MOUNT_PATH=$WORKSPACE_BASE \
            -e LLM_API_KEY=$LLM_API_KEY \
            -e LLM_MODEL=$LLM_MODEL \
            -e LOG_ALL_EVENTS=true \
            -e GITHUB_TOKEN=$REVIEW_BOT_GITHUB_TOKEN \
            -e SANDBOX_ENV_GITHUB_TOKEN=$REVIEW_BOT_GITHUB_TOKEN \
            -e REVIEW_BOT_GITHUB_REPO=$REVIEW_BOT_GITHUB_REPO \
            -e REVIEW_BOT_GITHUB_PR_NUMBER=$REVIEW_BOT_GITHUB_PR_NUMBER \
            -v $WORKSPACE_BASE:/opt/workspace_base \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $WORKSPACE_BASE/.openhands:/.openhands \
            --add-host host.docker.internal:host-gateway \
            --name openhands-app-$(date +%Y%m%d%H%M%S) \
            docker.all-hands.dev/all-hands-ai/openhands:0.56 \
            python -m openhands.core.main --selected-repo "$REVIEW_BOT_GITHUB_REPO" -t "$PROMPT_CONTENT"