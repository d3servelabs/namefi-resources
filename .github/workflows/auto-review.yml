name: Review PR by OpenHands

on:
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2
      - name: Review PR
        timeout-minutes: 15
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          REVIEW_BOT_GITHUB_TOKEN: ${{ secrets.REVIEW_BOT_GITHUB_TOKEN }}
          REVIEW_BOT_GITHUB_REPO: ${{ github.repository }}
          REVIEW_BOT_GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          WORKSPACE_BASE: ${{ github.workspace }}
        run: |
          docker run -i \
            --pull=always \
            -e SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.33-nikolaik \
            -e WORKSPACE_MOUNT_PATH=$WORKSPACE_BASE \
            -e LLM_API_KEY=$LLM_API_KEY \
            -e LLM_MODEL=anthropic/claude-3-7-sonnet-20250219 \
            -e LOG_ALL_EVENTS=true \
            -e GITHUB_TOKEN=$REVIEW_BOT_GITHUB_TOKEN \
            -e SANDBOX_ENV_GITHUB_TOKEN=$REVIEW_BOT_GITHUB_TOKEN \
            -v $WORKSPACE_BASE:/opt/workspace_base \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ~/.openhands-state:/.openhands-state \
            --add-host host.docker.internal:host-gateway \
            --name openhands-app-$(date +%Y%m%d%H%M%S) \
            docker.all-hands.dev/all-hands-ai/openhands:0.33 \
            python -m openhands.core.main --selected-repo $REVIEW_BOT_GITHUB_REPO -t "Run `export GITHUB_TOKEN=$REVIEW_BOT_GITHUB_TOKEN` and then verify that the environment variable GITHUB_TOKEN is set, and then please perform the following:\n\n1. Analyze the code changes in the PR $REVIEW_BOT_GITHUB_PR_NUMBER.\n\n2. Identify potential issues such as bugs, style inconsistencies, security vulnerabilities, or performance concerns.\n\n3. Suggest improvements or fixes where necessary.\n\n4. Post an overall summary comment on the PR.\n\n5. If specific code lines require feedback, add line-level comments.\n\n6. If the PR looks good and requires no changes, approve it.\n\n    Use the available GITHUB_TOKEN and GitHub REST API calls to post comments and approvals directly to the pull request."