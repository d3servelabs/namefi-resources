name: Chromatic

on:
  # Baseline build on main to keep Chromatic baselines current.
  # NOTE: no trigger-level `paths` filter here on purpose — the `changes` job
  # below is the single source of truth for "could this change affect visuals?",
  # so push and merge_group share identical, drift-free filtering logic.
  push:
    branches:
      - main
  # Pre-merge visual check: runs ONCE per merge on the final combined state.
  # This replaces per-PR builds and collapses the O(N) stack-restack amplification
  # (restacking N branches used to fire N full builds via `synchronize`).
  # NOTE: only fires once the GitHub merge queue is enabled in repo settings
  # (Settings -> Branches -> require merge queue). Until then, Chromatic runs on
  # main pushes only.
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel: main pushes set baselines and each merge_group is a distinct
  # pre-merge gate — cancelling either would skip a needed snapshot.
  cancel-in-progress: false

env:
  NODE_OPTIONS: --max-old-space-size=8192
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Cheap gate: skip the expensive Storybook build entirely when a change cannot
  # affect visuals. ALLOWLIST semantics — Storybook only renders the frontend app
  # and the shared UI package, so a change can only move a snapshot if it touches
  # one of those two. Everything else (other apps, db, infra, docs) is skipped.
  # Tradeoff vs the old denylist: a change to a *shared package* that a story
  # imports (e.g. packages/utils) now SKIPS the build, so a visual regression
  # introduced purely there wouldn't be caught until a frontend/ui file also
  # changes. Accepted for the build-minute savings; widen the allowlist below if a
  # shared package starts feeding the rendered UI.
  changes:
    runs-on: ubuntu-latest
    outputs:
      visual: ${{ steps.filter.outputs.visual }}
    steps:
      - uses: actions/checkout@v5
        with:
          # paths-filter needs the diff base in local history. Shallow (default)
          # checkout made multi-commit pushes log "fatal: Not a valid object name
          # <before>" and fall back; full history makes the diff base always resolvable.
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # v4 natively detects the diff base for both push and merge_group events.
          # (v3 had no merge_group support and needed a manual base+ref workaround.)
          # 'every' = a path counts as `visual` only if it matches ALL patterns:
          # the positive allowlist AND none of the `!` exclusions. The allowlist is
          # ONE brace-expansion pattern on purpose — two separate positives
          # ('apps/frontend/**', 'packages/ui/**') could never both match the same
          # file, so under 'every' `visual` would be permanently false.
          predicate-quantifier: 'every'
          # Expose the exact files that matched so the gate decision below can show
          # *why* it ran (which file(s) tripped 'visual'). Empty when visual=false.
          list-files: 'shell'
          filters: |
            visual:
              - '{apps/frontend,packages/ui}/**'
              - '!**/*.test.*'
              - '!**/*.spec.*'
              - '!**/*.testing.ts'
              - '!**/*.stories.mdx'
              - '!**/*.md'

      # Make the gate decision auditable from the Actions UI without digging:
      #  - a single greppable line in the raw log (`gh run view --log | grep CHROMATIC_GATE`)
      #  - a rich block in the run's Summary tab, including the files that tripped it.
      # Values come in via env (not inline ${{ }}) so filenames can't break the
      # script or open a shell-injection hole.
      - name: Log visual-gate decision
        if: ${{ always() }}
        env:
          VISUAL: ${{ steps.filter.outputs.visual }}
          VISUAL_FILES: ${{ steps.filter.outputs.visual_files }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$VISUAL" = "true" ]; then
            DECISION="RUN — visual-affecting file(s) changed"
          elif [ "$VISUAL" = "false" ]; then
            DECISION="SKIP — no change under apps/frontend or packages/ui (only non-visual paths)"
          else
            # Empty/unknown => paths-filter failed; the chromatic job's !cancelled()
            # fail-safe will still run the build rather than silently skip it.
            DECISION="RUN (fail-safe) — gate produced no decision (visual='$VISUAL')"
          fi
          # Greppable one-liner for log analysis / scripting.
          echo "CHROMATIC_GATE event=$EVENT sha=$SHA visual=$VISUAL decision=$DECISION"
          echo "CHROMATIC_GATE matched_files=[$VISUAL_FILES]"
          # Human-readable block in the run Summary tab.
          {
            echo "### Chromatic visual gate"
            echo ""
            echo "- **Decision:** $DECISION"
            echo "- **Event:** \`$EVENT\` · **Commit:** \`$SHA\`"
            if [ "$VISUAL" = "true" ] && [ -n "$VISUAL_FILES" ]; then
              echo "- **Files that matched the \`visual\` filter:**"
              for f in $VISUAL_FILES; do echo "    - \`$f\`"; done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  chromatic:
    needs: changes
    # Fail-safe: run unless the gate explicitly returned 'false'. `!cancelled()`
    # is a status-check function, so GitHub evaluates this `if` even when the
    # `changes` job FAILS (it does not auto-skip dependents in that case) — a
    # paths-filter hiccup then yields visual='' and Chromatic still runs. Better
    # to pay for a build than to silently disable the visual gate. We use
    # `!cancelled()` rather than `always()` so a cancelled run won't spawn a build.
    if: ${{ !cancelled() && needs.changes.outputs.visual != 'false' }}
    runs-on: "blacksmith-8vcpu-ubuntu-2404"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: |
          bun install
          bun install

      - name: Run Chromatic
        run: |
          # --only-changed enables TurboSnap: snapshot only stories affected by the
          # changed files (vs the Chromatic baseline), instead of all ~200 every time.
          CHROMATIC_FLAGS="--exit-once-uploaded --only-changed"
          if [ "${{ github.event_name }}" = "push" ]; then
            # main: auto-accept to update baselines for the next merge group.
            # Higher diff threshold (0.2 = 20% tolerance) for noise on main.
            CHROMATIC_FLAGS="$CHROMATIC_FLAGS --auto-accept-changes --diff-threshold 0.2"
          else
            # merge_group: pre-merge visual check, stricter threshold.
            # NON-BLOCKING: the base --exit-once-uploaded exits 0 right after upload,
            # before the visual verdict is known, so this never fails the merge.
            # To make Chromatic BLOCK a bad merge, remove --exit-once-uploaded from the
            # base flags above (so the CLI waits for the verdict and exits non-zero on
            # changes) AND mark this job a required check on the merge queue.
            CHROMATIC_FLAGS="$CHROMATIC_FLAGS --diff-threshold 0.05"
          fi
          # tee the CLI output so the next step can surface the TurboSnap counts in
          # the run Summary. `shell: bash` below is REQUIRED: it runs the script with
          # `-o pipefail`, so a Chromatic failure propagates through the pipe instead
          # of being masked by tee's exit 0. (The implicit default shell is `bash -e`
          # WITHOUT pipefail, which would swallow a real build error.)
          ../../node_modules/.bin/infisical run --token=$INFISICAL_SERVICE_TOKEN --env=dev -- bun run chromatic $CHROMATIC_FLAGS 2>&1 | tee "$RUNNER_TEMP/chromatic-output.log"
        shell: bash
        working-directory: apps/frontend
        env:
          INFISICAL_SERVICE_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}

      # Surface how many snapshots TurboSnap actually captured vs skipped, so the
      # gate decision (did we build?) and the real cost (did we snapshot?) are both
      # visible at a glance in the run Summary. Greppable via CHROMATIC_SNAPSHOTS.
      - name: Summarize snapshot usage
        if: ${{ always() }}
        run: |
          LOG="$RUNNER_TEMP/chromatic-output.log"
          [ -f "$LOG" ] || { echo "No Chromatic output captured."; exit 0; }
          # `|| true` so a no-match grep never fails this reporting step (robust
          # regardless of whether the shell runs with pipefail).
          TURBO=$(grep -iE "limited to [0-9]+ story files" "$LOG" | tail -1 | sed -e 's/^[[:space:]]*//' -e 's/^→[[:space:]]*//' || true)
          COUNT=$(grep -iE "Capturing [0-9]+ snapshots" "$LOG" | tail -1 | sed 's/^[[:space:]]*//' || true)
          echo "CHROMATIC_SNAPSHOTS ${COUNT:-unknown}"
          {
            echo "### Chromatic snapshot usage"
            echo ""
            echo "- ${TURBO:-TurboSnap scope not reported}"
            echo "- ${COUNT:-Snapshot count not reported (build may have failed before upload)}"
          } >> "$GITHUB_STEP_SUMMARY"
