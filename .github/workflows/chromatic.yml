name: Chromatic

on:
  push:
    branches:
      - main
    paths:
      # Broad coverage on main to keep baselines current
      - "packages/ui/**"
      - "apps/frontend/src/**/*.ts"
      - "apps/frontend/src/**/*.tsx"
      - "apps/frontend/src/**/*.css"
      # Exclude non-code files
      - "!**/*.md"
      - "!**/*.json"
      - "!**/*.test.ts"
      - "!**/*.test.tsx"
      - "!**/*.spec.ts"
      - "!**/*.spec.tsx"
  pull_request:
    branches-ignore:
      - prod
    paths:
      # Restrictive for PRs - only components and UI
      - "packages/ui/**"
      - "apps/frontend/src/components/**"
      - "apps/frontend/src/stories/**"
      - "apps/frontend/src/pbns/**"
      - "apps/frontend/src/app/globals.css"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_OPTIONS: --max-old-space-size=8192
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  chromatic:
    runs-on: "blacksmith-8vcpu-ubuntu-2404"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: |
          bun install
          bun install

      - name: Run Chromatic
        run: |
          CHROMATIC_FLAGS="--exit-once-uploaded"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Auto-accept on main to update baselines
            # Higher diff threshold (0.2 = 20% tolerance) for noise on main
            CHROMATIC_FLAGS="$CHROMATIC_FLAGS --auto-accept-changes --diff-threshold 0.2"
          else
            # Allow changes on PRs without failing CI
            # Stricter threshold for PRs to catch real changes
            CHROMATIC_FLAGS="$CHROMATIC_FLAGS --exit-zero-on-changes --diff-threshold 0.05"
          fi
          ../../node_modules/.bin/infisical run --token=$INFISICAL_SERVICE_TOKEN --env=dev -- bun run chromatic $CHROMATIC_FLAGS
        working-directory: apps/frontend
        env:
          INFISICAL_SERVICE_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
