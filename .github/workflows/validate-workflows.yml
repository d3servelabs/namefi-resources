name: Validate Temporal Workflows

on:
  pull_request:
    branches-ignore:
      - prod
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ENVIRONMENT: test
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TYPECHECK_CONCURRENCY: 8
  TURBO_CHECKERROR_CONCURRENCY: 8

jobs:
  detect-resources-only:
    name: Detect Resources-only PR
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.resources-only.outputs.result }}
    steps:
      - name: Detect resources-only PR
        id: resources-only
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            if (context.eventName !== 'pull_request') {
              core.setOutput('result', 'false');
              return;
            }

            const allowedExactPaths = ['apps/resources/data'];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const isAllowedFile = (filename) => allowedExactPaths.includes(filename);

            const resourcesOnly = files.length > 0 && files.every((file) => isAllowedFile(file.filename));
            core.info(`Changed files: ${files.map((file) => file.filename).join(', ') || '(none)'}`);
            core.info(`Resources-only PR: ${resourcesOnly}`);
            core.setOutput('result', resourcesOnly ? 'true' : 'false');

  validate-workflow-exports:
    name: Validate Workflow Exports
    needs: detect-resources-only
    if: needs.detect-resources-only.outputs.result != 'true'
    runs-on: "blacksmith-4vcpu-ubuntu-2404"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install # && bun install # this is intentional because of an issue with bun linking binaries and infisical #infisical-clean

      - name: Validate workflow exports
        run: |
          cd apps/backend
          echo "🔍 Checking that all workflows are exported from index.ts..."
          bun tsx scripts/validate-workflow-exports.ts

  test-workflow-bundling:
    name: Test Workflow Bundling
    needs: detect-resources-only
    if: needs.detect-resources-only.outputs.result != 'true'
    runs-on: "blacksmith-4vcpu-ubuntu-2404"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install # && bun install # this is intentional because of an issue with bun linking binaries and infisical #infisical-clean

      - name: Test main workflow bundle
        run: |
          cd apps/backend
          echo "🧪 Testing main workflow bundle..."
          bun run bundle:workflows
          echo "✅ Main workflow bundle succeeded"

  summary:
    name: Workflow Validation Summary
    runs-on: ubuntu-latest
    needs: [detect-resources-only, validate-workflow-exports, test-workflow-bundling]
    if: always()
    steps:
      - name: Check validation results
        run: |
          echo "📊 Workflow Validation Summary"
          echo "=============================="

          export_result="${{ needs.validate-workflow-exports.result }}"
          bundle_result="${{ needs.test-workflow-bundling.result }}"
          resources_only="${{ needs.detect-resources-only.outputs.result }}"

          echo "📦 Resources-only: $resources_only"
          echo "✅ Workflow Exports: $export_result"
          echo "🧪 Workflow Bundling: $bundle_result"

          if [[ "$resources_only" == "true" ]]; then
            echo ""
            echo "ℹ️ Resources-only PR; skipping workflow export and bundling validation."
            exit 0
          fi

          if [[ "$export_result" == "cancelled" ]] || [[ "$bundle_result" == "cancelled" ]]; then
            echo ""
            echo "ℹ️ Workflow validation run was superseded and cancelled."
            exit 0
          fi

          if [[ "$export_result" != "success" ]] || [[ "$bundle_result" != "success" ]]; then
            echo ""
            echo "❌ Workflow validation failed!"
            echo "Please check the job logs above for specific issues."
            exit 1
          else
            echo ""
            echo "🎉 All workflow validations passed!"
          fi
