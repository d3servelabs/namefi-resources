name: Create Release

on:
  workflow_dispatch:
    inputs:
      forceRelease:
        description: 'Force release even if no changes detected in apps/frontend or apps/backend'
        required: false
        default: false
        type: boolean
      version:
        description: 'Exact version to release (e.g. 3.5.0 for a minor, 4.0.0 for a major). Leave blank to auto-increment the patch of the current version.'
        required: false
        default: ''
        type: string
      canary:
        description: 'Cut a canary release candidate: tags astra/v<version>-rc.N (deploys to canary only) instead of the normal astra/v<version> (dev → prod). Does not bump main.'
        required: false
        default: false
        type: boolean
  schedule:
    # Run daily at 11:00 UTC
    - cron: '0 11 * * *'

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

jobs:
  check-auto-deploy:
    name: Check Auto Deploy Configuration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}
    steps:
      - name: Check Configuration
        id: check
        run: |
          # For manual triggers, always proceed
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Manual trigger detected, proceeding with release"
            exit 0
          fi

          # For scheduled triggers, check AUTO_DEPLOY variable
          AUTO_DEPLOY="${{ vars.AUTO_DEPLOY || 'false' }}"

          if [ "$AUTO_DEPLOY" = "true" ]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Auto-deploy is enabled, proceeding with scheduled release"
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
            echo "❌ Auto-deploy is disabled (AUTO_DEPLOY=$AUTO_DEPLOY)"
            echo "## ⏭️ Scheduled Release Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Auto-deploy is disabled. To enable scheduled releases, set the repository variable \`AUTO_DEPLOY=true\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This workflow was triggered by the daily schedule (11:00 UTC) but will not create a release." >> $GITHUB_STEP_SUMMARY
          fi

  detect-changes:
    name: Detect Changes in Apps
    needs: check-auto-deploy
    if: needs.check-auto-deploy.outputs.should-deploy == 'true'
    runs-on: 'blacksmith-4vcpu-ubuntu-2204'
    outputs:
      should-release: ${{ steps.check-changes.outputs.should-release }}
      changed-packages: ${{ steps.detect.outputs.changed-packages }}
      has-frontend-changes: ${{ steps.check-changes.outputs.has-frontend-changes }}
      has-backend-changes: ${{ steps.check-changes.outputs.has-backend-changes }}
      previous-astra-tag: ${{ steps.get-tag.outputs.latest-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install

      - name: Get latest release tag
        id: get-tag
        run: |
          # Get the latest STABLE astra release tag. Exclude -rc canary tags: they
          # point at current HEAD without bumping main, so treating one as "latest"
          # would make the next stable cut from the same commit look like "no changes"
          # and would diff release notes from the rc instead of the last stable tag.
          LATEST_TAG=$(git tag -l 'astra/v*' --sort=-version:refname | grep -vE -- '-rc(\.[0-9]+)?$' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release tag found, will proceed with release"
            echo "first-release=true" >> $GITHUB_OUTPUT
            echo "latest-tag=" >> $GITHUB_OUTPUT
            echo "base-ref=HEAD^" >> $GITHUB_OUTPUT
          else
            echo "Latest release tag: $LATEST_TAG"
            echo "first-release=false" >> $GITHUB_OUTPUT
            echo "latest-tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "base-ref=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed packages
        id: detect
        uses: ./.github/actions/detect-turbo-changes
        with:
          base-ref: ${{ steps.get-tag.outputs.base-ref }}
          head-ref: ${{ github.sha }}
          packages: |
            @namefi-astra/backend
            @namefi-astra/frontend
          fallback-files: |
            bun.lock
            package.json
            bunfig.toml
            .bun-version

      - name: Check for frontend/backend changes
        id: check-changes
        env:
          # User-controlled string — pass via env (not inline ${{ }}) to avoid shell injection.
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          FORCE_RELEASE="${{ github.event.inputs.forceRelease }}"
          CANARY="${{ github.event.inputs.canary }}"
          FIRST_RELEASE="${{ steps.get-tag.outputs.first-release }}"
          HAS_CHANGES="${{ steps.detect.outputs.has-changes }}"

          # Strip whitespace so a blank/whitespace-only version input doesn't trip the release
          # gate; the update-versions job trims and validates the authoritative value the same way.
          REQUESTED_VERSION="$(printf '%s' "$REQUESTED_VERSION" | tr -d '[:space:]')"

          # Use fromJSON and contains to check for frontend/backend changes
          HAS_FRONTEND_CHANGES="${{ contains(fromJSON(steps.detect.outputs.changed-packages), '@namefi-astra/frontend') }}"
          HAS_BACKEND_CHANGES="${{ contains(fromJSON(steps.detect.outputs.changed-packages), '@namefi-astra/backend') }}"

          echo "Force release: $FORCE_RELEASE"
          echo "Requested version: ${REQUESTED_VERSION:-(none)}"
          echo "First release: $FIRST_RELEASE"
          echo "Has changes: $HAS_CHANGES"
          echo "Changed packages: ${{ steps.detect.outputs.changed-packages }}"
          echo "Has frontend changes: $HAS_FRONTEND_CHANGES"
          echo "Has backend changes: $HAS_BACKEND_CHANGES"

          echo "has-frontend-changes=$HAS_FRONTEND_CHANGES" >> $GITHUB_OUTPUT
          echo "has-backend-changes=$HAS_BACKEND_CHANGES" >> $GITHUB_OUTPUT

          # Determine if we should release
          if [ "$FORCE_RELEASE" == "true" ]; then
            echo "Force release enabled, proceeding with release"
            echo "should-release=true" >> $GITHUB_OUTPUT
          elif [ "$CANARY" == "true" ]; then
            echo "Canary release candidate requested; proceeding regardless of detected changes"
            echo "should-release=true" >> $GITHUB_OUTPUT
          elif [ -n "$REQUESTED_VERSION" ]; then
            echo "Exact version requested ($REQUESTED_VERSION); proceeding with release regardless of detected changes"
            echo "should-release=true" >> $GITHUB_OUTPUT
          elif [ "$FIRST_RELEASE" == "true" ]; then
            echo "No previous release tag found, proceeding with initial release"
            echo "should-release=true" >> $GITHUB_OUTPUT
          elif [ "$HAS_FRONTEND_CHANGES" == "true" ] || [ "$HAS_BACKEND_CHANGES" == "true" ]; then
            echo "Changes detected in frontend or backend, proceeding with release"
            echo "should-release=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected in frontend or backend, skipping release"
            echo "should-release=false" >> $GITHUB_OUTPUT
            echo "## ⏭️ Release Skipped - No Changes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No changes were detected in \`apps/frontend\` or \`apps/backend\` since the last release." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To force a release anyway, trigger the workflow manually with \`forceRelease: true\`" >> $GITHUB_STEP_SUMMARY
          fi

  auth-namefi-bot:
    name: Get NameFi Bot Info
    needs: [check-auto-deploy, detect-changes]
    if: needs.check-auto-deploy.outputs.should-deploy == 'true' && needs.detect-changes.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    outputs:
      app-slug: ${{ steps.app-token.outputs.app-slug }}
      user-id: ${{ steps.get-user-id.outputs.user-id }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.NAMEFI_BOT_APP_ID }}
          private-key: ${{ secrets.NAMEFI_BOT_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  check-deployment-status:
    name: Check Deploy Backend Workflow Status
    needs: auth-namefi-bot
    runs-on: ubuntu-latest
    outputs:
      deployment_run_url: ${{ steps.check-deployment.outputs.deployment_run_url }}
      deployment_run_id: ${{ steps.check-deployment.outputs.deployment_run_id }}
      deployment_sha: ${{ steps.check-deployment.outputs.deployment_sha }}
      failure_reason: ${{ steps.check-deployment.outputs.failure_reason }}
      failed_deployment_url: ${{ steps.check-deployment.outputs.failed_deployment_url }}
      failed_deployment_conclusion: ${{ steps.check-deployment.outputs.failed_deployment_conclusion }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.NAMEFI_BOT_APP_ID }}
          private-key: ${{ secrets.NAMEFI_BOT_PRIVATE_KEY }}

      - name: Check Deploy Backend Workflow Status
        id: check-deployment
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            console.log('🔍 Checking latest Deploy Backend workflow status on main branch...');

            // Get the latest workflow runs for Deploy Backend on main branch
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-backend-vercel.yml',
              branch: 'main',
              status: 'completed',
              per_page: 1
            });

            if (runs.workflow_runs.length === 0) {
              const errorMsg = `❌ No completed Deploy Backend workflow runs found on main branch.

              This release requires at least one successful deployment to main before proceeding.
              Please ensure the Deploy Backend workflow has run successfully on the main branch.`;

              core.setFailed(errorMsg);
              core.setOutput('failure_reason', 'no_deployment_found');
              return;
            }

            const latestRun = runs.workflow_runs[0];
            console.log(`Found workflow run: ${latestRun.html_url}`);
            console.log(`Status: ${latestRun.status}, Conclusion: ${latestRun.conclusion}`);

            if (latestRun.conclusion !== 'success') {
              const errorMsg = `❌ Latest Deploy Backend workflow on main branch failed.

              Workflow conclusion: ${latestRun.conclusion}
              Workflow URL: ${latestRun.html_url}
              Run ID: ${latestRun.id}
              Commit SHA: ${latestRun.head_sha}

              The release process cannot continue until the main branch has a successful deployment.
              Please fix the deployment issues and try again.`;

              core.setFailed(errorMsg);
              core.setOutput('failure_reason', 'deployment_failed');
              core.setOutput('failed_deployment_url', latestRun.html_url);
              core.setOutput('failed_deployment_conclusion', latestRun.conclusion);
              return;
            }

            console.log(`✅ Latest Deploy Backend workflow succeeded!`);
            console.log(`   Run ID: ${latestRun.id}`);
            console.log(`   Commit SHA: ${latestRun.head_sha}`);
            console.log(`   URL: ${latestRun.html_url}`);

            core.setOutput('deployment_run_url', latestRun.html_url);
            core.setOutput('deployment_run_id', latestRun.id);
            core.setOutput('deployment_sha', latestRun.head_sha);

  update-versions:
    name: Update Package Versions
    needs: [auth-namefi-bot, check-deployment-status, detect-changes]
    runs-on: 'blacksmith-4vcpu-ubuntu-2204'
    outputs:
      backend_version: ${{ steps.version.outputs.backend_version }}
      frontend_version: ${{ steps.version.outputs.frontend_version }}
      old_backend_version: ${{ steps.version.outputs.old_backend_version }}
      old_frontend_version: ${{ steps.version.outputs.old_frontend_version }}
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
      tag_name: ${{ steps.commit.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.NAMEFI_BOT_APP_ID }}
          private-key: ${{ secrets.NAMEFI_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 32

      - name: Read and increment versions
        id: version
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            console.log('📦 Reading current package versions...');

            // Helper function to increment patch version
            function incrementPatchVersion(version) {
              // Handle versions with suffixes (e.g., 0.3.0-beta)
              const suffixMatch = version.match(/^(.+?)-(.+)$/);
              let baseVersion, suffix;

              if (suffixMatch) {
                baseVersion = suffixMatch[1];
                suffix = suffixMatch[2];
              } else {
                baseVersion = version;
                suffix = null;
              }

              const [major, minor, patch] = baseVersion.split('.').map(Number);
              const newVersion = `${major}.${minor}.${patch + 1}`;

              return suffix ? `${newVersion}-${suffix}` : newVersion;
            }

            // Optional exact-version override for minor/major releases (e.g. 3.5.0, 4.0.0).
            // Read from the event payload rather than string-interpolating the input, so an
            // attacker-controlled value cannot inject code into this script. Empty on schedule runs.
            const requestedVersion = ((context.payload.inputs && context.payload.inputs.version) || '').trim();
            if (requestedVersion && !/^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$/.test(requestedVersion)) {
              core.setFailed(`Invalid 'version' input: "${requestedVersion}". Expected semver like 3.5.0 or 4.0.0-beta1.`);
              return;
            }
            if (requestedVersion) {
              console.log(`🎯 Exact version requested via workflow input: ${requestedVersion}`);
            }

            // Resolve the next version: explicit override when provided, else patch increment.
            const resolveNewVersion = (oldVersion) => requestedVersion || incrementPatchVersion(oldVersion);

            // Read and resolve backend version
            const backendPkgPath = path.join(process.env.GITHUB_WORKSPACE, 'apps/backend/package.json');
            const backendPkg = JSON.parse(fs.readFileSync(backendPkgPath, 'utf8'));
            const oldBackendVersion = backendPkg.version;
            const newBackendVersion = resolveNewVersion(oldBackendVersion);

            console.log(`📈 Backend version: ${oldBackendVersion} → ${newBackendVersion}`);

            // Read and resolve frontend version
            const frontendPkgPath = path.join(process.env.GITHUB_WORKSPACE, 'apps/frontend/package.json');
            const frontendPkg = JSON.parse(fs.readFileSync(frontendPkgPath, 'utf8'));
            const oldFrontendVersion = frontendPkg.version;
            const newFrontendVersion = resolveNewVersion(oldFrontendVersion);

            console.log(`📈 Frontend version: ${oldFrontendVersion} → ${newFrontendVersion}`);

            // Guard against a no-op release (e.g. the requested version equals the current one),
            // which would make the later "git commit" fail with nothing to commit.
            if (newBackendVersion === oldBackendVersion && newFrontendVersion === oldFrontendVersion) {
              core.setFailed(`Requested version "${requestedVersion}" matches the current version; nothing to release.`);
              return;
            }

            // For an explicit override, refuse downgrades and already-released tags. Without this,
            // a stale/duplicate value would commit a version bump to main and only then fail at the
            // tag push, leaving main pointing at a bad version.
            if (requestedVersion) {
              const baseTuple = (v) => v.split('-')[0].split('.').map(Number);
              const compareBase = (a, b) => {
                const [aMaj, aMin, aPat] = baseTuple(a);
                const [bMaj, bMin, bPat] = baseTuple(b);
                return aMaj - bMaj || aMin - bMin || aPat - bPat;
              };
              // The override exists to cut a new minor/major, so require a strictly greater
              // major.minor.patch than the current version. Besides blocking downgrades, this
              // avoids creating a stable tag that shares a base with an existing prerelease
              // (e.g. astra/v3.4.9 next to astra/v3.4.9-beta2), which git's version:refname tag
              // sort mis-ranks — corrupting later latest-tag detection and changelog ranges.
              // New prereleases on the same base come from the default patch auto-increment.
              for (const current of [oldBackendVersion, oldFrontendVersion]) {
                if (compareBase(requestedVersion, current) <= 0) {
                  core.setFailed(`Requested version "${requestedVersion}" must have a greater major.minor.patch than the current "${current}". Use a new minor/major (e.g. 3.5.0); leave 'version' blank to auto-increment the patch.`);
                  return;
                }
              }
              const newTag = `astra/v${requestedVersion}`;
              try {
                await github.rest.git.getRef({ owner: context.repo.owner, repo: context.repo.repo, ref: `tags/${newTag}` });
                core.setFailed(`Tag ${newTag} already exists; pick a version that has not been released yet.`);
                return;
              } catch (err) {
                if (err.status !== 404) throw err;
              }
            }

            // Canary release candidate: turn the resolved version into the next
            // astra/v<base>-rc.N. This tags current HEAD (deploys to canary only)
            // without committing a version bump to main, so the eventual stable
            // release still cuts the same base from the unchanged main version.
            const canaryRequested = String((context.payload.inputs && context.payload.inputs.canary) || '').trim() === 'true';
            core.setOutput('is_canary', canaryRequested ? 'true' : 'false');

            let finalBackendVersion = newBackendVersion;
            let finalFrontendVersion = newFrontendVersion;

            if (canaryRequested) {
              // Drop any prerelease suffix from the resolved base before appending -rc.N.
              const base = newBackendVersion.split('-')[0];
              const { data: matches } = await github.rest.git.listMatchingRefs({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/astra/v${base}-rc`,
              });
              let maxRc = 0;
              for (const m of matches) {
                const mm = m.ref.match(/-rc\.(\d+)$/);
                if (mm) maxRc = Math.max(maxRc, Number(mm[1]));
              }
              const rcVersion = `${base}-rc.${maxRc + 1}`;
              console.log(`🐤 Canary release candidate requested → ${rcVersion}`);
              finalBackendVersion = rcVersion;
              finalFrontendVersion = rcVersion;
            }

            // Log summary
            console.log('\n✅ Version increments calculated successfully:');
            console.log(`   Backend:  ${oldBackendVersion} → ${finalBackendVersion}`);
            console.log(`   Frontend: ${oldFrontendVersion} → ${finalFrontendVersion}`);

            // Set outputs
            core.setOutput('backend_version', finalBackendVersion);
            core.setOutput('frontend_version', finalFrontendVersion);
            core.setOutput('old_backend_version', oldBackendVersion);
            core.setOutput('old_frontend_version', oldFrontendVersion);

      - name: Update package versions
        # Canary cuts a prerelease tag on current HEAD and must NOT bump main's baseline.
        if: steps.version.outputs.is_canary != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const backendVersion = '${{ steps.version.outputs.backend_version }}';
            const frontendVersion = '${{ steps.version.outputs.frontend_version }}';

            // Update backend package.json
            const backendPkgPath = path.join(process.env.GITHUB_WORKSPACE, 'apps/backend/package.json');
            const backendPkg = JSON.parse(fs.readFileSync(backendPkgPath, 'utf8'));
            backendPkg.version = backendVersion;
            fs.writeFileSync(backendPkgPath, JSON.stringify(backendPkg, null, 2) + '\n');
            console.log(`✅ Updated backend version to ${backendVersion}`);

            // Update frontend package.json
            const frontendPkgPath = path.join(process.env.GITHUB_WORKSPACE, 'apps/frontend/package.json');
            const frontendPkg = JSON.parse(fs.readFileSync(frontendPkgPath, 'utf8'));
            frontendPkg.version = frontendVersion;
            fs.writeFileSync(frontendPkgPath, JSON.stringify(frontendPkg, null, 2) + '\n');
            console.log(`✅ Updated frontend version to ${frontendVersion}`);

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: |
          bun install # required to update bun.lock

      - name: Format files
        run: |
          bun biome format --write ./apps/backend || true
          bun biome format --write ./apps/frontend || true
          bunx sherif@latest -f || true

      - name: Configure git
        run: |
          git config --global user.name '${{ needs.auth-namefi-bot.outputs.app-slug }}[bot]'
          git config --global user.email '${{ needs.auth-namefi-bot.outputs.user-id }}+${{ needs.auth-namefi-bot.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Commit version changes and create release tag
        id: commit
        run: |
          # Canary: tag current HEAD as a release candidate and push only the tag.
          # No package.json bump, no commit to main — keeps main's baseline intact
          # so the eventual stable release cuts the same base cleanly.
          if [[ "${{ steps.version.outputs.is_canary }}" == "true" ]]; then
            TAG_NAME="astra/v${{ steps.version.outputs.backend_version }}"
            echo "🐤 Canary release candidate: tagging current HEAD as $TAG_NAME (main untouched)"
            git tag -a "$TAG_NAME" -m "Canary release candidate: ${{ steps.version.outputs.backend_version }}"
            git push origin "$TAG_NAME"
            COMMIT_SHA=$(git rev-parse HEAD)
            echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "✅ Canary tag $TAG_NAME pushed (points at $COMMIT_SHA)"
            exit 0
          fi

          echo "📝 Committing version changes..."

          git add apps/backend/package.json apps/frontend/package.json ./bun.lock

          # Create commit message
          VERSION_STRING="frontend ${{ steps.version.outputs.frontend_version }} backend ${{ steps.version.outputs.backend_version }}"
          COMMIT_MESSAGE="chore(v${{ steps.version.outputs.backend_version }}): $VERSION_STRING"
          TAG_NAME="astra/v${{ steps.version.outputs.backend_version }}"

          git commit -m "$COMMIT_MESSAGE"

          echo "✅ Changes committed locally"

          git tag -a "$TAG_NAME" -m "Release: $VERSION_STRING"


          echo "✅ Created release tag: $TAG_NAME"

          # Push to main
          echo "🚀 Pushing to main branch..."
          git push origin main
          git push origin "$TAG_NAME"

          # Get the commit SHA
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          echo "✅ Version bump committed and pushed successfully"
          echo "   Commit SHA: $COMMIT_SHA"

      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ steps.commit.outputs.tag_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.backend_version }}
          RELEASE_REPO: ${{ github.repository }}
          # Previous astra/v* tag (empty on first release) — pins the changelog range.
          PREVIOUS_ASTRA_TAG: ${{ needs.detect-changes.outputs.previous-astra-tag }}
        run: |
          # Auto-generate release notes from PRs merged since the previous astra release.
          # GitHub derives the notes from PR titles + labels; the repo squash-merges,
          # so each PR title becomes one changelog line. No conventional-commit format required.
          notes_args=(--generate-notes)
          if [[ -n "$PREVIOUS_ASTRA_TAG" ]]; then
            # This repo also maintains an astra-resources/v* tag stream; pin the start tag so
            # GitHub doesn't auto-pick a resources tag as the comparison point.
            notes_args+=(--notes-start-tag "$PREVIOUS_ASTRA_TAG")
            echo "📝 Generating notes since previous astra tag: $PREVIOUS_ASTRA_TAG"
          fi

          # Mark suffixed versions (e.g. 3.4.10-beta2) as prereleases so GitHub does not
          # surface them as the "Latest" stable release.
          prerelease_flag=()
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            prerelease_flag=(--prerelease)
            echo "🏷️  $RELEASE_VERSION has a prerelease suffix → marking the GitHub Release as prerelease"
          fi

          # The tag and prod deploy have already happened by now, so make Release creation robust
          # to a partial failure: succeed if it already exists (idempotent), and retry transient
          # API errors. A persistent failure here is recoverable by hand and does not undo the
          # tag/deploy — re-running the whole workflow is intentionally blocked by the version
          # guards, so this step must not leave a half-done state of its own.
          if gh release view "$RELEASE_TAG" --repo "$RELEASE_REPO" >/dev/null 2>&1; then
            echo "ℹ️  GitHub Release $RELEASE_TAG already exists; nothing to do."
            exit 0
          fi

          for attempt in 1 2 3; do
            if gh release create "$RELEASE_TAG" \
              --repo "$RELEASE_REPO" \
              --title "$RELEASE_TAG" \
              --verify-tag \
              "${notes_args[@]}" \
              "${prerelease_flag[@]}"; then
              echo "✅ Created GitHub Release: $RELEASE_TAG"
              exit 0
            fi
            echo "⚠️  Release creation attempt $attempt failed; retrying..." >&2
            sleep "$((attempt * 5))"
          done

          echo "::error::Failed to create GitHub Release $RELEASE_TAG after 3 attempts. The tag and deploy already succeeded — create it by hand: gh release create $RELEASE_TAG --generate-notes" >&2
          exit 1

  release-summary:
    name: Release Summary
    needs:
      - check-auto-deploy
      - detect-changes
      - auth-namefi-bot
      - check-deployment-status
      - update-versions
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Release Summary
        run: |
          # Check if release was skipped due to auto-deploy config
          if [[ "${{ needs.check-auto-deploy.outputs.should-deploy }}" != "true" ]]; then
            echo "## ⏭️ Release Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The scheduled release was skipped because auto-deploy is disabled." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable automatic releases, set the repository variable \`AUTO_DEPLOY=true\`" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Check if release was skipped due to no changes
          if [[ "${{ needs.detect-changes.outputs.should-release }}" != "true" ]]; then
            echo "## ⏭️ Release Skipped - No Changes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No changes were detected in \`apps/frontend\` or \`apps/backend\` since the last release." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend changes**: ${{ needs.detect-changes.outputs.has-frontend-changes }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Backend changes**: ${{ needs.detect-changes.outputs.has-backend-changes }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To force a release anyway, trigger the workflow manually with \`forceRelease: true\`" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Check if any critical job failed
          if [[ "${{ needs.check-deployment-status.result }}" == "failure" ]]; then
            echo "## ❌ Release Failed - Deployment Check" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            FAILURE_REASON="${{ needs.check-deployment-status.outputs.failure_reason }}"
            if [[ "$FAILURE_REASON" == "no_deployment_found" ]]; then
              echo "### No Deployment Found" >> $GITHUB_STEP_SUMMARY
              echo "No completed Deploy Backend workflow runs were found on the main branch." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Action Required:** Run the Deploy Backend workflow on main branch before creating a release." >> $GITHUB_STEP_SUMMARY
            elif [[ "$FAILURE_REASON" == "deployment_failed" ]]; then
              echo "### Deployment Failed" >> $GITHUB_STEP_SUMMARY
              echo "The latest Deploy Backend workflow on main branch did not succeed." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "- **Conclusion:** ${{ needs.check-deployment-status.outputs.failed_deployment_conclusion }}" >> $GITHUB_STEP_SUMMARY
              echo "- **Failed workflow:** [${{ needs.check-deployment-status.outputs.failed_deployment_url }}](${{ needs.check-deployment-status.outputs.failed_deployment_url }})" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Action Required:** Fix the deployment issues and ensure main branch deploys successfully before creating a release." >> $GITHUB_STEP_SUMMARY
            fi
            exit 0
          fi

          if [[ "${{ needs.update-versions.result }}" == "failure" ]]; then
            echo "## ❌ Release Failed - Version Update" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Failed to update package versions and commit changes." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required:** Check the workflow logs for details about what went wrong." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Success case
          echo "## 🎉 Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Release Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ github.event_name == 'schedule' && '⏰ Automated (Daily @ 11:00 UTC)' || '🔧 Manual' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.event_name == 'schedule' && '🤖 Scheduled Job' || github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Version updates (if available)
          if [[ -n "${{ needs.update-versions.outputs.backend_version }}" ]]; then
            echo "### Version Updates" >> $GITHUB_STEP_SUMMARY
            echo "- **Frontend**: ${{ needs.update-versions.outputs.old_frontend_version }} → ${{ needs.update-versions.outputs.frontend_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Backend**: ${{ needs.update-versions.outputs.old_backend_version }} → ${{ needs.update-versions.outputs.backend_version }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Release tag
          if [[ -n "${{ needs.update-versions.outputs.tag_name }}" ]]; then
            echo "### Release Tag" >> $GITHUB_STEP_SUMMARY
            echo "- **Tag**: \`${{ needs.update-versions.outputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Deployment verification
          if [[ -n "${{ needs.check-deployment-status.outputs.deployment_run_url }}" ]]; then
            echo "### Pre-release Verification" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Deploy Backend on main: [Successful](${{ needs.check-deployment-status.outputs.deployment_run_url }})" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Version commit: [\`${{ needs.update-versions.outputs.commit_sha }}\`](https://github.com/${{ github.repository }}/commit/${{ needs.update-versions.outputs.commit_sha }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. The release tag \`${{ needs.update-versions.outputs.tag_name }}\` triggers the production deployment (\`astra/v*\` tag push)" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify production deployment in the Deploy Backend workflow" >> $GITHUB_STEP_SUMMARY
