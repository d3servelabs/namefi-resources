name: Auto Merge Resources Data PRs

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: number

jobs:
  auto-merge:
    name: Auto merge resources data PR
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    steps:
      - name: Create NameFi bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.NAMEFI_MERGE_BOT_APP_ID }}
          private-key: ${{ secrets.NAMEFI_MERGE_BOT_PRIVATE_KEY }}

      - name: Get PR info
        id: pr-info
        uses: actions/github-script@v7
        env:
          EXPECTED_AUTHORS: ${{ vars.NAMEFI_BOT_LOGINS || vars.NAMEFI_BOT_LOGIN || 'namefi-bot[bot],app/namefi-bot' }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = context.payload.pull_request?.number || ${{ inputs.pr_number || 0 }};

            if (!prNumber) {
              core.setFailed('No PR number provided');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log(`PR #${prNumber}: ${pr.title}`);
            console.log(`Branch: ${pr.head.ref}`);
            console.log(`SHA: ${pr.head.sha}`);
            console.log(`State: ${pr.state}`);
            console.log(`Mergeable: ${pr.mergeable}`);
            console.log(`Base: ${pr.base.ref}`);
            console.log(`Author: ${pr.user.login}`);

            const expectedAuthors = process.env.EXPECTED_AUTHORS
              .split(',')
              .map((value) => value.trim())
              .filter(Boolean);
            const repository = `${context.repo.owner}/${context.repo.repo}`;

            if (pr.state !== 'open') {
              core.setFailed(`PR is not open (state: ${pr.state})`);
              return;
            }

            if (pr.draft) {
              core.setFailed('PR is still a draft');
              return;
            }

            if (pr.base.ref !== 'main') {
              core.setFailed(`PR base must be main, got '${pr.base.ref}'`);
              return;
            }

            if (pr.head.repo.full_name !== repository) {
              core.setFailed(`PR head repo must be ${repository}, got ${pr.head.repo.full_name}`);
              return;
            }

            if (pr.head.ref !== 'chore/resources-data/sync') {
              core.setFailed(`Branch '${pr.head.ref}' must be 'chore/resources-data/sync'`);
              return;
            }

            if (!expectedAuthors.includes(pr.user.login)) {
              core.setFailed(`PR author must be one of ${expectedAuthors.join(', ')}, got ${pr.user.login}`);
              return;
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);

      - name: Validate changed files
        id: validate-files
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = ${{ steps.pr-info.outputs.pr_number }};
            const allowedExactPaths = ['apps/resources/data'];

            console.log(`Checking files changed in PR #${prNumber}`);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            console.log(`Found ${files.length} changed files:`);
            files.forEach(f => console.log(`  - ${f.filename}`));

            const isAllowedFile = (filename) => allowedExactPaths.includes(filename);

            const allFilesValid = files.length > 0 && files.every(file => isAllowedFile(file.filename));

            if (!allFilesValid) {
              const invalidFiles = files
                .filter(file => !isAllowedFile(file.filename))
                .map(f => f.filename);
              console.log(`Invalid files found: ${invalidFiles.join(', ')}`);
              core.setFailed('PR contains files outside allowed paths');
              return;
            }

            console.log('All changed files are within allowed paths');

      - name: Wait for all checks to complete
        id: wait-checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = ${{ steps.pr-info.outputs.pr_number }};
            const headSha = '${{ steps.pr-info.outputs.head_sha }}';
            const timeout = 240_000; // 4 minutes
            const pollInterval = 10_000; // 10 seconds

            const maxAttempts = timeout / pollInterval;
            const passingCheckConclusions = ['success', 'skipped', 'neutral'];

            // Workflows to exclude from check validation
            const excludedChecks = [
              'Auto approve resources data PR',
              'Auto merge resources data PR'
            ];

            const latestBy = (items, keyFn, timeFn) => {
              const latest = new Map();
              for (const item of items) {
                const key = keyFn(item);
                if (!key) continue;

                const current = latest.get(key);
                if (!current || timeFn(item) >= timeFn(current)) {
                  latest.set(key, item);
                }
              }
              return [...latest.values()];
            };

            const timestamp = (value) => {
              const parsed = Date.parse(value || '');
              return Number.isNaN(parsed) ? 0 : parsed;
            };

            const getRequiredContexts = async () => {
              const contexts = new Set();
              const readSources = [];
              const readErrors = [];

              try {
                const rulesResponse = await github.request(
                  'GET /repos/{owner}/{repo}/rules/branches/{branch}',
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    branch: 'main',
                  },
                );
                readSources.push('rulesets');

                for (const rule of rulesResponse.data || []) {
                  if (rule.type !== 'required_status_checks') continue;
                  for (const check of rule.parameters?.required_status_checks || []) {
                    if (check.context) contexts.add(check.context);
                  }
                }
              } catch (error) {
                console.log(`Could not read repository rulesets: ${error.message}`);
                readErrors.push(`rulesets: ${error.message}`);
              }

              try {
                const { data: protection } = await github.rest.repos.getBranchProtection({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch: 'main',
                });
                readSources.push('branch protection');

                for (const status of protection.required_status_checks?.contexts || []) {
                  contexts.add(status);
                }
                for (const check of protection.required_status_checks?.checks || []) {
                  if (check.context) contexts.add(check.context);
                }
              } catch (error) {
                console.log(`Could not read branch protection: ${error.message}`);
                readErrors.push(`branch protection: ${error.message}`);
              }

              if (readSources.length === 0) {
                throw new Error(`Could not read required status contexts for main. ${readErrors.join('; ')}`);
              }

              const requiredContexts = [...contexts].filter((contextName) => !excludedChecks.includes(contextName));
              if (requiredContexts.length === 0) {
                throw new Error(`No required status contexts discovered for main from ${readSources.join(', ')}.`);
              }

              return requiredContexts;
            };

            const requiredContexts = await getRequiredContexts();

            console.log(`Waiting for checks to complete on PR #${prNumber} (SHA: ${headSha})`);
            console.log(`Required contexts: ${requiredContexts.join(', ')}`);

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`\nAttempt ${attempt}/${maxAttempts}`);

              // Get all check runs for the commit
              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: headSha,
                  per_page: 100,
                },
                (response) => response.data.check_runs,
              );

              // Get combined commit status (for external CI systems)
              const { data: combinedStatus } = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });

              // Filter out this workflow's own check and the approve workflow, then
              // evaluate only the latest run for each check name. Concurrency can
              // leave older cancelled runs attached to the same head SHA.
              const latestChecks = latestBy(
                checkRuns.filter(run => !excludedChecks.includes(run.name)),
                run => run.name,
                run => timestamp(run.started_at || run.completed_at || run.created_at)
              );
              const latestStatuses = latestBy(
                combinedStatus.statuses,
                status => status.context,
                status => timestamp(status.updated_at || status.created_at)
              );

              const otherChecks = requiredContexts.length > 0
                ? latestChecks.filter(run => requiredContexts.includes(run.name))
                : latestChecks;
              const relevantStatuses = requiredContexts.length > 0
                ? latestStatuses.filter(status => requiredContexts.includes(status.context))
                : latestStatuses;

              const observedContexts = new Set([
                ...otherChecks.map(run => run.name),
                ...relevantStatuses.map(status => status.context),
              ]);
              const missingRequiredContexts = requiredContexts.filter(
                contextName => !observedContexts.has(contextName)
              );

              const pendingChecks = otherChecks.filter(run => run.status !== 'completed');
              const failedChecks = otherChecks.filter(run =>
                run.status === 'completed' &&
                !passingCheckConclusions.includes(run.conclusion)
              );

              const pendingStatuses = relevantStatuses.filter(s => s.state === 'pending');
              const failedStatuses = relevantStatuses.filter(s =>
                !['success', 'pending'].includes(s.state)
              );

              console.log(`Check runs: ${otherChecks.length} total, ${pendingChecks.length} pending, ${failedChecks.length} failed`);
              console.log(`Commit statuses: ${relevantStatuses.length} total, ${pendingStatuses.length} pending, ${failedStatuses.length} failed`);
              console.log(`Missing required contexts: ${missingRequiredContexts.length}`);

              // If any checks failed, fail immediately
              if (failedChecks.length > 0 || failedStatuses.length > 0) {
                console.log('\nFailed checks:');
                failedChecks.forEach(run => console.log(`  - ${run.name}: ${run.conclusion}`));
                failedStatuses.forEach(s => console.log(`  - ${s.context}: ${s.state}`));
                core.setFailed('Some required checks failed');
                return;
              }

              // If all checks completed successfully
              if (pendingChecks.length === 0 && pendingStatuses.length === 0 && missingRequiredContexts.length === 0) {
                console.log('\nAll checks completed successfully!');
                otherChecks.forEach(run => console.log(`  - ${run.name}: ${run.conclusion}`));
                return;
              }

              // Still waiting
              console.log('Pending checks:');
              pendingChecks.forEach(run => console.log(`  - ${run.name}: ${run.status}`));
              pendingStatuses.forEach(s => console.log(`  - ${s.context}: ${s.state}`));
              missingRequiredContexts.forEach(contextName => console.log(`  - ${contextName}: missing`));

              if (attempt < maxAttempts) {
                console.log(`Waiting ${pollInterval / 1000} seconds before next check...`);
                await new Promise(resolve => setTimeout(resolve, pollInterval));
              }
            }

            core.setFailed('Timed out waiting for checks to complete');

      - name: Merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = ${{ steps.pr-info.outputs.pr_number }};
            const headSha = '${{ steps.pr-info.outputs.head_sha }}';

            console.log(`Merging PR #${prNumber}`);

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              sha: headSha,
              merge_method: 'rebase'
            });

            console.log(`PR #${prNumber} merged successfully`);
