name: Preview PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches-ignore:
      - prod
      - gtmq_spec_*
      - "*_nopreview_*"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to deploy preview for"
        required: true
        type: number
      force_preview:
        description: "Force all preview targets"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPO_NAME: ${{ vars.REPOSITORY_NAME }}

jobs:
  detect:
    name: Plan App Previews
    needs: preview-label-gate
    if: |-
      needs.preview-label-gate.outputs.pr_number != '' &&
      needs.preview-label-gate.outputs.is_same_repo == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          (
            github.event.action != 'labeled' ||
            needs.preview-label-gate.outputs.should_run == 'true'
          )
        )
      )
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      frontend_changed: ${{ steps.evaluate.outputs.frontend_changed }}
      park_changed: ${{ steps.evaluate.outputs.park_changed }}
      resources_changed: ${{ steps.evaluate.outputs.resources_changed }}
      docs_changed: ${{ steps.evaluate.outputs.docs_changed }}
      resources_only_sync: ${{ steps.resources-only.outputs.result || 'false' }}
    steps:
      - name: Evaluate head branch
        id: head-branch-gate
        env:
          HEAD_REF: ${{ needs.preview-label-gate.outputs.head_ref }}
        shell: bash
        run: |
          set -euo pipefail

          case "$HEAD_REF" in
            prod|gtmq_spec_*|*_nopreview_*)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Detect resources-only sync PR
        id: resources-only
        if: steps.head-branch-gate.outputs.should_run == 'true'
        uses: actions/github-script@v8
        env:
          HEAD_REF: ${{ needs.preview-label-gate.outputs.head_ref }}
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            // Submodule pointer updates appear as a single file entry at the
            // submodule path, so this intentionally uses exact path equality.
            const resourcesOnly =
              process.env.HEAD_REF === 'chore/resources-data/sync' &&
              files.length > 0 &&
              files.every((file) => file.filename === 'apps/resources/data');

            core.info(`Changed files: ${files.map((file) => file.filename).join(', ') || '(none)'}`);
            core.info(`Resources-only sync PR: ${resourcesOnly}`);
            core.setOutput('result', resourcesOnly ? 'true' : 'false');

      - name: Checkout repository
        if: steps.head-branch-gate.outputs.should_run == 'true' && steps.resources-only.outputs.result != 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}
          fetch-depth: 0
          filter: blob:none

      - name: Determine comparison SHAs
        # We capture both the PR merge-base and the incremental `before` SHA.
        # Per target, we only use incremental detection after that target
        # already has a preview on this PR branch; otherwise we bootstrap
        # from the true PR diff so base-branch drift does not trigger
        # unrelated preview deploys.
        id: comparison
        if: steps.head-branch-gate.outputs.should_run == 'true' && steps.resources-only.outputs.result != 'true'
        env:
          EVENT_ACTION: ${{ github.event.action }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ needs.preview-label-gate.outputs.base_sha }}
          HEAD_SHA: ${{ needs.preview-label-gate.outputs.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if ! git cat-file -e "$HEAD_SHA" 2>/dev/null; then
            echo "Missing PR head commit: $HEAD_SHA" >&2
            exit 1
          fi

          PR_BASE_SHA="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"

          if [[ -z "$PR_BASE_SHA" ]]; then
            echo "Unable to determine merge-base for $BASE_SHA and $HEAD_SHA" >&2
            exit 1
          fi

          echo "base_sha=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "has_incremental=false" >> "$GITHUB_OUTPUT"

          if [[ "$EVENT_ACTION" == "synchronize" && -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "$BEFORE_SHA" 2>/dev/null && [[ "$BEFORE_SHA" != "$HEAD_SHA" ]]; then
              echo "incremental_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
              echo "has_incremental=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Detect existing previews
        id: preview-state
        if: steps.head-branch-gate.outputs.should_run == 'true' && steps.resources-only.outputs.result != 'true' && steps.comparison.outputs.has_incremental == 'true' && needs.preview-label-gate.outputs.is_same_repo == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          HEAD_REF: ${{ needs.preview-label-gate.outputs.head_ref }}
          FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PROJECT_ID }}
          PARK_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PARK_PROJECT_ID }}
          RESOURCES_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_RESOURCES_PROJECT_ID }}
          DOCS_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_API_CLIENT_DOCS_PROJECT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          url_encode() {
            jq -rn --arg value "$1" '$value|@uri'
          }

          preview_exists() {
            local project_id="$1"

            if [[ -z "$VERCEL_TOKEN" || -z "$VERCEL_TEAM_ID" || -z "$project_id" ]]; then
              echo "false"
              return
            fi

            local encoded_branch
            encoded_branch="$(url_encode "$HEAD_REF")"
            local response
            response="$(
              curl --silent --show-error --fail \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v6/deployments?projectId=$project_id&teamId=$VERCEL_TEAM_ID&branch=$encoded_branch&state=QUEUED,INITIALIZING,BUILDING,READY&limit=1"
            )" || {
              echo "false"
              return
            }

            if jq -e '.deployments | length > 0' <<<"$response" >/dev/null; then
              echo "true"
            else
              echo "false"
            fi
          }

          FRONTEND_EXISTS="$(preview_exists "$FRONTEND_PROJECT_ID")"
          PARK_EXISTS="$(preview_exists "$PARK_PROJECT_ID")"
          RESOURCES_EXISTS="$(preview_exists "$RESOURCES_PROJECT_ID")"
          DOCS_EXISTS="$(preview_exists "$DOCS_PROJECT_ID")"

          {
            echo "frontend_exists=$FRONTEND_EXISTS"
            echo "park_exists=$PARK_EXISTS"
            echo "resources_exists=$RESOURCES_EXISTS"
            echo "docs_exists=$DOCS_EXISTS"
          } >> "$GITHUB_OUTPUT"

          if [[ "$FRONTEND_EXISTS" == "true" || "$PARK_EXISTS" == "true" || "$RESOURCES_EXISTS" == "true" || "$DOCS_EXISTS" == "true" ]]; then
            echo "any_preview_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_preview_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect preview target changes
        id: base-changes
        if: steps.head-branch-gate.outputs.should_run == 'true' && steps.resources-only.outputs.result != 'true'
        uses: ./.github/actions/detect-turbo-changes
        with:
          base-ref: ${{ steps.comparison.outputs.base_sha }}
          head-ref: ${{ needs.preview-label-gate.outputs.head_sha }}
          packages: |
            @namefi-astra/frontend
            @namefi-astra/park
            @namefi-astra/resources
            api-client-docs
          fallback-files: |
            bun.lock
            package.json
            bunfig.toml
            .bun-version

      - name: Detect incremental preview target changes
        id: incremental-changes
        if: steps.head-branch-gate.outputs.should_run == 'true' && steps.resources-only.outputs.result != 'true' && steps.comparison.outputs.has_incremental == 'true' && steps.preview-state.outputs.any_preview_exists == 'true'
        uses: ./.github/actions/detect-turbo-changes
        with:
          base-ref: ${{ steps.comparison.outputs.incremental_sha }}
          head-ref: ${{ needs.preview-label-gate.outputs.head_sha }}
          packages: |
            @namefi-astra/frontend
            @namefi-astra/park
            @namefi-astra/resources
            api-client-docs
          fallback-files: |
            bun.lock
            package.json
            bunfig.toml
            .bun-version

      - name: Evaluate deployment targets
        id: evaluate
        if: always()
        env:
          SHOULD_RUN: ${{ steps.head-branch-gate.outputs.should_run }}
          RESOURCES_ONLY: ${{ steps.resources-only.outputs.result || 'false' }}
          HAS_INCREMENTAL: ${{ steps.comparison.outputs.has_incremental }}
          BASE_CHANGED_PACKAGES: ${{ steps.base-changes.outputs.changed-packages || '[]' }}
          INCREMENTAL_CHANGED_PACKAGES: ${{ steps.incremental-changes.outputs.changed-packages || '[]' }}
          FRONTEND_EXISTS: ${{ steps.preview-state.outputs.frontend_exists || 'false' }}
          PARK_EXISTS: ${{ steps.preview-state.outputs.park_exists || 'false' }}
          RESOURCES_EXISTS: ${{ steps.preview-state.outputs.resources_exists || 'false' }}
          DOCS_EXISTS: ${{ steps.preview-state.outputs.docs_exists || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          package_changed() {
            local package_name="$1"
            local preview_exists="$2"
            local changed_packages="$BASE_CHANGED_PACKAGES"

            if [[ "$HAS_INCREMENTAL" == "true" && "$preview_exists" == "true" ]]; then
              changed_packages="$INCREMENTAL_CHANGED_PACKAGES"
            fi

            if jq -e --arg package_name "$package_name" 'index($package_name) != null' <<<"$changed_packages" >/dev/null; then
              echo "true"
            else
              echo "false"
            fi
          }

          if [[ "$SHOULD_RUN" != "true" || "$RESOURCES_ONLY" == "true" ]]; then
            {
              echo "frontend_changed=false"
              echo "park_changed=false"
              echo "resources_changed=false"
              echo "docs_changed=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "frontend_changed=$(package_changed '@namefi-astra/frontend' "$FRONTEND_EXISTS")"
            echo "park_changed=$(package_changed '@namefi-astra/park' "$PARK_EXISTS")"
            echo "resources_changed=$(package_changed '@namefi-astra/resources' "$RESOURCES_EXISTS")"
            echo "docs_changed=$(package_changed 'api-client-docs' "$DOCS_EXISTS")"
          } >> "$GITHUB_OUTPUT"

  publish-preview-progress:
    name: Publish Preview Progress
    if: |-
      !cancelled() &&
      needs.preview-label-gate.outputs.pr_number != '' &&
      needs.preview-label-gate.outputs.is_same_repo == 'true' &&
      needs.detect.outputs.resources_only_sync != 'true' &&
      needs.preview-label-gate.outputs.head_branch_should_run == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.action != 'labeled' ||
        needs.preview-label-gate.outputs.should_run == 'true'
      )
    needs:
      - detect
      - preview-label-gate
      - detect-backend-changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Publish preview progress comment
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FRONTEND_CHANGED: ${{ needs.detect.outputs.frontend_changed || 'false' }}
          PARK_CHANGED: ${{ needs.detect.outputs.park_changed || 'false' }}
          RESOURCES_CHANGED: ${{ needs.detect.outputs.resources_changed || 'false' }}
          DOCS_CHANGED: ${{ needs.detect.outputs.docs_changed || 'false' }}
          PREVIEW_REQUESTED: ${{ needs.preview-label-gate.outputs.should_run || 'false' }}
          PARK_REQUESTED: ${{ needs.preview-label-gate.outputs.park_preview || 'false' }}
          RESOURCES_REQUESTED: ${{ needs.preview-label-gate.outputs.resources_preview || 'false' }}
          DOCS_REQUESTED: ${{ needs.preview-label-gate.outputs.docs_preview || 'false' }}
          HAS_BACKEND_CHANGES: ${{ needs.detect-backend-changes.outputs.has-backend-changes || 'false' }}
        with:
          script: |
            const marker = '<!-- preview-surface-status:v1 -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const runUrl = process.env.RUN_URL;
            const updatedAt = new Date().toISOString();
            const isTrue = (value) => value === 'true';
            const linkCell = (links) => links.length > 0 ? links.join('<br>') : '—';
            const row = (surface, status, links, notes) =>
              `| ${surface} | ${status} | ${linkCell(links)} | ${notes} |`;
            const buildLink = `[Build](${runUrl})`;
            const frontendChanged = isTrue(process.env.FRONTEND_CHANGED);
            const parkChanged = isTrue(process.env.PARK_CHANGED);
            const resourcesChanged = isTrue(process.env.RESOURCES_CHANGED);
            const docsChanged = isTrue(process.env.DOCS_CHANGED);
            const parkRequested = isTrue(process.env.PARK_REQUESTED);
            const resourcesRequested = isTrue(process.env.RESOURCES_REQUESTED);
            const docsRequested = isTrue(process.env.DOCS_REQUESTED);
            const previewRequested = isTrue(process.env.PREVIEW_REQUESTED);
            const hasBackendChanges = isTrue(process.env.HAS_BACKEND_CHANGES);
            const frontendUsesPreviewBackend = previewRequested && hasBackendChanges;
            const frontendPendingBackendDecision =
              !frontendChanged && frontendUsesPreviewBackend;

            const rows = [
              frontendChanged
                ? row(
                    'Frontend',
                    '🟡 Building',
                    [buildLink],
                    frontendUsesPreviewBackend ? 'Preview backend' : 'Dev backend',
                  )
                : frontendPendingBackendDecision
                  ? row(
                      'Frontend',
                      '🟡 Pending',
                      [buildLink],
                      'Awaiting backend preview context',
                    )
                  : row('Frontend', '⚪ Not affected', [], 'No relevant changes'),
              parkChanged
                ? parkRequested
                  ? row('Park', '🟡 Building', [buildLink], 'Label-gated')
                  : row('Park', '⚪ Not requested', [], 'Add `preview-park` label')
                : row('Park', '⚪ Not affected', [], 'No relevant changes'),
              resourcesChanged
                ? resourcesRequested
                  ? row('Resources', '🟡 Building', [buildLink], 'Label-gated')
                  : row('Resources', '⚪ Not requested', [], 'Add `preview-resources` label')
                : row('Resources', '⚪ Not affected', [], 'No relevant changes'),
              docsChanged
                ? docsRequested
                  ? row('API Client Docs', '🟡 Building', [buildLink], 'Label-gated')
                  : row('API Client Docs', '⚪ Not requested', [], 'Add `preview-docs` label')
                : row('API Client Docs', '⚪ Not affected', [], 'No relevant changes'),
              !previewRequested
                ? row('Backend', '⚪ Not requested', [], 'Label-gated')
                : hasBackendChanges
                  ? row('Backend', '🟡 Building', [buildLink], 'Label-gated')
                  : row('Backend', '⚪ Not affected', [], 'Label-gated'),
            ];

            const body = [
              marker,
              '### Preview Surfaces',
              '',
              `- PR: #${prNumber}`,
              `- Run: [Workflow run](${runUrl})`,
              `- Updated: \`${updatedAt}\``,
              '',
              '| Surface | Status | Links | Notes |',
              '|---|---|---|---|',
              ...rows,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existingComment = [...comments]
              .reverse()
              .find((comment) => comment.body?.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  deploy-frontend:
    name: "Frontend Preview"
    # Single frontend deployment that runs early, in parallel with the backend
    # deploy. The backend URL is resolved deterministically by the deploy-ledger
    # job (templated preview URL or the shared API), so the frontend never waits
    # for the Cloud Run deploy to finish.
    needs: [detect, preview-label-gate, deploy-ledger]
    if: |-
      !cancelled() &&
      needs.detect.result == 'success' &&
      needs.deploy-ledger.result == 'success' &&
      needs.preview-label-gate.outputs.is_same_repo == 'true' &&
      needs.preview-label-gate.outputs.head_branch_should_run == 'true' &&
      needs.deploy-ledger.outputs.frontend_deployed != 'true' &&
      (
        needs.detect.outputs.frontend_changed == 'true' ||
        needs.deploy-ledger.outputs.has_backend_preview == 'true'
      )
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}

      - name: Deploy frontend preview
        id: deploy
        uses: ./.github/actions/vercel-preview-deploy
        with:
          turbo_prune_scope: "@namefi-astra/frontend"
          head_ref: ${{ needs.preview-label-gate.outputs.head_ref }}
          head_sha: ${{ needs.preview-label-gate.outputs.head_sha }}
          pr_number: ${{ needs.preview-label-gate.outputs.pr_number }}
          additional_meta_json: |
            {
              "previewMode": "${{ needs.deploy-ledger.outputs.has_backend_preview == 'true' && 'backend-preview' || 'standard' }}",
              "backendPreviewUrl": "${{ needs.deploy-ledger.outputs.has_backend_preview == 'true' && needs.deploy-ledger.outputs.target_backend_url || '' }}"
            }
          build_env_json: |
            {
              "ENVIRONMENT": "preview",
              "BACKEND_URL": "${{ needs.deploy-ledger.outputs.target_backend_url }}",
              "RESOURCES_URL": "https://r.namefi.dev",
              "DOCS_URL": "https://docs.namefi.dev"
            }
          runtime_env_json: |
            {
              "ENVIRONMENT": "preview",
              "BACKEND_URL": "${{ needs.deploy-ledger.outputs.target_backend_url }}",
              "RESOURCES_URL": "https://r.namefi.dev",
              "DOCS_URL": "https://docs.namefi.dev"
            }
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_ASTRA_PROJECT_ID }}
          vercel_token: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}

  frontend-preview-dev-backend-context:
    name: "Frontend Preview (Dev Backend)"
    needs: [deploy-frontend]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Mirror unified frontend preview result
        env:
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
        run: |
          case "$FRONTEND_RESULT" in
            success|skipped)
              echo "Unified Frontend Preview completed with result: $FRONTEND_RESULT"
              ;;
            *)
              echo "Unified Frontend Preview did not pass: $FRONTEND_RESULT" >&2
              exit 1
              ;;
          esac

  frontend-preview-preview-backend-context:
    name: "Frontend Preview (Preview Backend)"
    needs: [deploy-frontend]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Mirror unified frontend preview result
        env:
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
        run: |
          case "$FRONTEND_RESULT" in
            success|skipped)
              echo "Unified Frontend Preview completed with result: $FRONTEND_RESULT"
              ;;
            *)
              echo "Unified Frontend Preview did not pass: $FRONTEND_RESULT" >&2
              exit 1
              ;;
          esac

  deploy-park:
    name: Deploy Park Preview
    needs: [detect, preview-label-gate, deploy-ledger]
    if: needs.detect.result == 'success' && needs.preview-label-gate.outputs.is_same_repo == 'true' && needs.detect.outputs.park_changed == 'true' && needs.preview-label-gate.outputs.park_preview == 'true' && needs.deploy-ledger.outputs.park_deployed != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}

      - name: Deploy park preview
        id: deploy
        uses: ./.github/actions/vercel-preview-deploy
        with:
          turbo_prune_scope: "@namefi-astra/park"
          head_ref: ${{ needs.preview-label-gate.outputs.head_ref }}
          head_sha: ${{ needs.preview-label-gate.outputs.head_sha }}
          pr_number: ${{ needs.preview-label-gate.outputs.pr_number }}
          build_env_json: |
            {
              "ENVIRONMENT": "preview"
            }
          runtime_env_json: |
            {
              "ENVIRONMENT": "preview"
            }
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_ASTRA_PARK_PROJECT_ID }}
          vercel_token: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}

  deploy-resources:
    name: Deploy Resources Preview
    needs: [detect, preview-label-gate, deploy-ledger]
    if: needs.detect.result == 'success' && needs.preview-label-gate.outputs.is_same_repo == 'true' && needs.detect.outputs.resources_changed == 'true' && needs.preview-label-gate.outputs.resources_preview == 'true' && needs.deploy-ledger.outputs.resources_deployed != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}
          submodules: recursive

      - name: Deploy resources preview
        id: deploy
        uses: ./.github/actions/vercel-preview-deploy
        with:
          turbo_prune_scope: "@namefi-astra/resources"
          head_ref: ${{ needs.preview-label-gate.outputs.head_ref }}
          head_sha: ${{ needs.preview-label-gate.outputs.head_sha }}
          pr_number: ${{ needs.preview-label-gate.outputs.pr_number }}
          build_env_json: |
            {
              "ENVIRONMENT": "preview",
              "BACKEND_URL": "https://backend.astra.namefi.dev",
              "CANONICAL_SITE_URL": "https://namefi.dev",
              "FIRST_PARTY_DEPLOYMENT_URL": "https://namefi.dev",
              "NEXT_PUBLIC_FIRST_PARTY_DEPLOYMENT_URL": "https://namefi.dev"
            }
          runtime_env_json: |
            {
              "ENVIRONMENT": "preview",
              "BACKEND_URL": "https://backend.astra.namefi.dev",
              "CANONICAL_SITE_URL": "https://namefi.dev",
              "FIRST_PARTY_DEPLOYMENT_URL": "https://namefi.dev",
              "NEXT_PUBLIC_FIRST_PARTY_DEPLOYMENT_URL": "https://namefi.dev"
            }
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_ASTRA_RESOURCES_PROJECT_ID }}
          vercel_token: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}

  deploy-api-client-docs:
    name: Deploy Docs Preview
    needs: [detect, preview-label-gate, deploy-ledger]
    if: needs.detect.result == 'success' && needs.preview-label-gate.outputs.is_same_repo == 'true' && needs.detect.outputs.docs_changed == 'true' && needs.preview-label-gate.outputs.docs_preview == 'true' && needs.deploy-ledger.outputs.docs_deployed != 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}

      - name: Deploy API client docs preview
        id: deploy
        uses: ./.github/actions/vercel-preview-deploy
        with:
          turbo_prune_scope: "api-client-docs"
          head_ref: ${{ needs.preview-label-gate.outputs.head_ref }}
          head_sha: ${{ needs.preview-label-gate.outputs.head_sha }}
          pr_number: ${{ needs.preview-label-gate.outputs.pr_number }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_ASTRA_API_CLIENT_DOCS_PROJECT_ID }}
          vercel_token: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}

  deploy-ledger:
    name: Resolve Backend State & Deploy Ledger
    # Merged job. Step 1 resolves whether this PR gets a preview backend and the
    # deterministic URL the frontend should target (the preview backend is a
    # Cloud Run tagged revision `pr-<number>`, whose URL is the persistent host
    # with a `pr-<number>---` prefix — known ahead of the deploy, no lookup).
    # Step 2 reads the per-PR deploy-ledger comment so a later label-triggered
    # run skips surfaces already deployed at the current head SHA (frontend is
    # keyed by SHA *and* its backend target so a shared→preview-backend switch
    # still redeploys). The ledger is written once per run by the Preview
    # Summary job (single writer, no races).
    needs: [preview-label-gate, detect-backend-changes]
    if: needs.preview-label-gate.outputs.pr_number != '' && needs.preview-label-gate.outputs.is_same_repo == 'true' && needs.preview-label-gate.outputs.head_branch_should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      # Persistent Cloud Run host of the namefi-astra-backend-preview service.
      # Tagged preview URLs are `https://pr-<number>---<this host>`.
      BACKEND_PREVIEW_HOST: namefi-astra-backend-preview-ixzjobhowq-uc.a.run.app
      # Shared backend used when this PR has no preview backend.
      SHARED_BACKEND_URL: https://api.namefi.dev
    outputs:
      has_backend_preview: ${{ steps.state.outputs.has_backend_preview }}
      target_backend_url: ${{ steps.state.outputs.target_backend_url }}
      frontend_deployed: ${{ steps.ledger.outputs.frontend_deployed }}
      backend_deployed: ${{ steps.ledger.outputs.backend_deployed }}
      park_deployed: ${{ steps.ledger.outputs.park_deployed }}
      resources_deployed: ${{ steps.ledger.outputs.resources_deployed }}
      docs_deployed: ${{ steps.ledger.outputs.docs_deployed }}
      frontend_url: ${{ steps.ledger.outputs.frontend_url }}
      backend_url: ${{ steps.ledger.outputs.backend_url }}
      park_url: ${{ steps.ledger.outputs.park_url }}
      resources_url: ${{ steps.ledger.outputs.resources_url }}
      docs_url: ${{ steps.ledger.outputs.docs_url }}
    steps:
      - name: Resolve backend URL
        id: state
        env:
          BACKEND_PREVIEW_REQUESTED: ${{ needs.preview-label-gate.outputs.backend_preview }}
          HAS_BACKEND_CHANGES: ${{ needs.detect-backend-changes.outputs.has-backend-changes }}
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
        shell: bash
        run: |
          set -euo pipefail

          # A preview backend is deployed only when the backend preview label is
          # active and the backend actually changed (a force preview is reported
          # by detect-backend-changes as a change). This decision needs no Cloud
          # Run lookup, so the frontend can deploy in parallel with the backend.
          if [[ "$BACKEND_PREVIEW_REQUESTED" == "true" && "$HAS_BACKEND_CHANGES" == "true" ]]; then
            echo "has_backend_preview=true" >> "$GITHUB_OUTPUT"
            echo "target_backend_url=https://pr-${PR_NUMBER}---${BACKEND_PREVIEW_HOST}" >> "$GITHUB_OUTPUT"
          else
            echo "has_backend_preview=false" >> "$GITHUB_OUTPUT"
            echo "target_backend_url=${SHARED_BACKEND_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read deploy ledger
        id: ledger
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
          HEAD_SHA: ${{ needs.preview-label-gate.outputs.head_sha }}
          BACKEND_URL: ${{ steps.state.outputs.target_backend_url }}
          IS_FORCE_PREVIEW: ${{ needs.preview-label-gate.outputs.is_force_preview }}
        with:
          script: |
            const marker = '<!-- preview-deploy-ledger:v1 -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const headSha = process.env.HEAD_SHA || '';
            const backendUrl = process.env.BACKEND_URL || '';
            const isForcePreview = process.env.IS_FORCE_PREVIEW === 'true';

            const surfaces = ['frontend', 'backend', 'park', 'resources', 'docs'];
            // Each ledger entry is { sha, url, backend? }; an absent entry (or a
            // SHA mismatch) means the surface must (re)deploy this run.
            const reportNone = () => {
              for (const surface of surfaces) {
                core.setOutput(`${surface}_deployed`, 'false');
                core.setOutput(`${surface}_url`, '');
              }
            };

            // A force preview must redeploy everything, so report nothing as
            // already-deployed. On any read error, fail open (report false) so
            // we deploy rather than wrongly skip.
            if (isForcePreview) {
              reportNone();
              return;
            }

            let ledger = {};
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const existing = [...comments]
                .reverse()
                .find((comment) => comment.body?.includes(marker));
              const match = existing?.body?.match(/<!-- ledger-data:\s*(\{.*?\})\s*-->/s);
              if (match) {
                ledger = JSON.parse(match[1]);
              }
            } catch (error) {
              core.warning(`Failed to read deploy ledger, deploying all surfaces: ${error}`);
              reportNone();
              return;
            }

            const report = (surface, deployed, url) => {
              core.setOutput(`${surface}_deployed`, deployed ? 'true' : 'false');
              core.setOutput(`${surface}_url`, deployed ? url || '' : '');
            };

            // Frontend is deployed only if the recorded SHA AND backend target
            // both match the current run; the others key on SHA alone.
            const frontend = ledger.frontend || {};
            report(
              'frontend',
              Boolean(headSha) && frontend.sha === headSha && frontend.backend === backendUrl,
              frontend.url,
            );
            for (const surface of ['backend', 'park', 'resources', 'docs']) {
              const entry = ledger[surface] || {};
              report(surface, Boolean(headSha) && entry.sha === headSha, entry.url);
            }

  preview-label-gate:
    name: Check Backend Preview Label
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      should_run: ${{ steps.check-label.outputs.should_run }}
      backend_preview: ${{ steps.check-label.outputs.backend_preview }}
      is_force_preview: ${{ steps.check-label.outputs.is_force_preview }}
      is_same_repo: ${{ steps.check-label.outputs.is_same_repo }}
      pr_number: ${{ steps.check-label.outputs.pr_number }}
      checkout_ref: ${{ steps.check-label.outputs.checkout_ref }}
      head_sha: ${{ steps.check-label.outputs.head_sha }}
      base_sha: ${{ steps.check-label.outputs.base_sha }}
      head_ref: ${{ steps.check-label.outputs.head_ref }}
      park_preview: ${{ steps.check-label.outputs.park_preview }}
      resources_preview: ${{ steps.check-label.outputs.resources_preview }}
      docs_preview: ${{ steps.check-label.outputs.docs_preview }}
      head_branch_should_run: ${{ steps.head-branch.outputs.should_run }}
    steps:
      - name: Check preview label
        id: check-label
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          INPUT_FORCE_PREVIEW: ${{ github.event.inputs.force_preview || 'true' }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number || '' }}
          HEAD_SHA_FROM_EVENT: ${{ github.event.pull_request.head.sha || '' }}
          BASE_SHA_FROM_EVENT: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_REF_FROM_EVENT: ${{ github.event.pull_request.head.ref || '' }}
          HEAD_REPO_FULL_NAME_FROM_EVENT: ${{ github.event.pull_request.head.repo.full_name || '' }}
          LABEL_NAME_FROM_EVENT: ${{ github.event.label.name || '' }}
          HAS_FORCE_PREVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'force-preview') }}
          HAS_PREVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'preview-backend') }}
          HAS_PARK_PREVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'preview-park') }}
          HAS_RESOURCES_PREVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'preview-resources') }}
          HAS_DOCS_PREVIEW_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'preview-docs') }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Event name: $EVENT_NAME"
          echo "Event action: $EVENT_ACTION"

          # Emit per-target preview opt-in outputs. Each of Park / Resources /
          # Docs requires its own explicit label (preview-park /
          # preview-resources / preview-docs); force preview enables all three.
          emit_surface_targets() {
            local force_all="$1"
            local park resources docs
            if [[ "$force_all" == "true" ]]; then
              park="true"
              resources="true"
              docs="true"
            else
              park="$HAS_PARK_PREVIEW_LABEL"
              resources="$HAS_RESOURCES_PREVIEW_LABEL"
              docs="$HAS_DOCS_PREVIEW_LABEL"
            fi
            {
              echo "park_preview=$park"
              echo "resources_preview=$resources"
              echo "docs_preview=$docs"
            } >> "$GITHUB_OUTPUT"
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            FORCE_PREVIEW="$INPUT_FORCE_PREVIEW"
            if [[ "$FORCE_PREVIEW" != "true" ]]; then
              FORCE_PREVIEW="false"
            fi
            echo "Workflow dispatch triggered for PR #$PR_NUMBER"

            # A dispatch only carries the PR number + force flag (it is how a
            # `labeled` event reaches this workflow). The label set is the source
            # of truth for which surfaces to deploy, so resolve it from the API.
            PR_DATA=$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq '{head_sha: .head.sha, base_sha: .base.sha, head_ref: .head.ref, head_repo_full_name: .head.repo.full_name, labels: [.labels[].name]}')
            HEAD_SHA=$(echo "$PR_DATA" | jq -r '.head_sha')
            BASE_SHA=$(echo "$PR_DATA" | jq -r '.base_sha')
            HEAD_REF=$(echo "$PR_DATA" | jq -r '.head_ref')
            HEAD_REPO_FULL_NAME=$(echo "$PR_DATA" | jq -r '.head_repo_full_name')
            LABELS_JSON=$(echo "$PR_DATA" | jq -c '.labels')

            has_label() {
              jq -e --arg name "$1" 'index($name) != null' <<<"$LABELS_JSON" >/dev/null 2>&1
            }

            # `force_preview` input (or the force-preview label) enables every
            # surface; otherwise each surface is opt-in via its own label.
            if [[ "$FORCE_PREVIEW" == "true" ]] || has_label force-preview; then
              FORCE_ALL="true"
            else
              FORCE_ALL="false"
            fi

            # Backend preview (should_run) is driven only by preview-backend /
            # force-preview — never by the app-surface labels, so adding
            # preview-park/-resources/-docs does not spin up the backend.
            if [[ "$FORCE_ALL" == "true" ]] || has_label preview-backend; then
              BACKEND_PREVIEW="true"
            else
              BACKEND_PREVIEW="false"
            fi

            if [[ "$BACKEND_PREVIEW" == "true" ]] || has_label preview-park || has_label preview-resources || has_label preview-docs; then
              PROCESS_PREVIEW="true"
            else
              PROCESS_PREVIEW="false"
            fi

            # Per-surface labels feed emit_surface_targets via these globals.
            HAS_PARK_PREVIEW_LABEL="false"; has_label preview-park && HAS_PARK_PREVIEW_LABEL="true"
            HAS_RESOURCES_PREVIEW_LABEL="false"; has_label preview-resources && HAS_RESOURCES_PREVIEW_LABEL="true"
            HAS_DOCS_PREVIEW_LABEL="false"; has_label preview-docs && HAS_DOCS_PREVIEW_LABEL="true"

            {
              echo "pr_number=$PR_NUMBER"
              echo "checkout_ref=refs/pull/$PR_NUMBER/merge"
              echo "head_sha=$HEAD_SHA"
              echo "base_sha=$BASE_SHA"
              echo "head_ref=$HEAD_REF"
            } >> "$GITHUB_OUTPUT"
            if [[ "$HEAD_REPO_FULL_NAME" == "$REPOSITORY" ]]; then
              echo "is_same_repo=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_same_repo=false" >> "$GITHUB_OUTPUT"
            fi
            {
              echo "should_run=$PROCESS_PREVIEW"
              echo "backend_preview=$BACKEND_PREVIEW"
              echo "is_force_preview=$FORCE_ALL"
            } >> "$GITHUB_OUTPUT"
            emit_surface_targets "$FORCE_ALL"
            exit 0
          fi

          PR_NUMBER="$PR_NUMBER_FROM_EVENT"
          HEAD_SHA="$HEAD_SHA_FROM_EVENT"
          BASE_SHA="$BASE_SHA_FROM_EVENT"
          HEAD_REF="$HEAD_REF_FROM_EVENT"
          HEAD_REPO_FULL_NAME="$HEAD_REPO_FULL_NAME_FROM_EVENT"

          {
            echo "pr_number=$PR_NUMBER"
            echo "checkout_ref=refs/pull/$PR_NUMBER/merge"
            echo "head_sha=$HEAD_SHA"
            echo "base_sha=$BASE_SHA"
            echo "head_ref=$HEAD_REF"
          } >> "$GITHUB_OUTPUT"
          if [[ "$HEAD_REPO_FULL_NAME" == "$REPOSITORY" ]]; then
            echo "is_same_repo=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_same_repo=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$EVENT_ACTION" == "labeled" ]]; then
            LABEL_NAME="$LABEL_NAME_FROM_EVENT"
            echo "Label added: $LABEL_NAME"
            # Process any preview label, but keep backend preview opt-in separate
            # from app-surface previews.
            if [[ "$LABEL_NAME" == "force-preview" ]]; then
              {
                echo "should_run=true"
                echo "backend_preview=true"
                echo "is_force_preview=true"
              } >> "$GITHUB_OUTPUT"
            elif [[ "$LABEL_NAME" == "preview-backend" ]]; then
              {
                echo "should_run=true"
                echo "backend_preview=true"
                echo "is_force_preview=false"
              } >> "$GITHUB_OUTPUT"
            elif [[ "$LABEL_NAME" == "preview-park" || "$LABEL_NAME" == "preview-resources" || "$LABEL_NAME" == "preview-docs" ]]; then
              {
                echo "should_run=true"
                echo "backend_preview=false"
                echo "is_force_preview=false"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "should_run=false"
                echo "backend_preview=false"
                echo "is_force_preview=false"
              } >> "$GITHUB_OUTPUT"
            fi
            emit_surface_targets "$HAS_FORCE_PREVIEW_LABEL"
            exit 0
          fi

          if [[ "$HAS_FORCE_PREVIEW_LABEL" == "true" ]]; then
            {
              echo "should_run=true"
              echo "backend_preview=true"
              echo "is_force_preview=true"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$HAS_PREVIEW_LABEL" == "true" ]]; then
            {
              echo "should_run=true"
              echo "backend_preview=true"
              echo "is_force_preview=false"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$HAS_PARK_PREVIEW_LABEL" == "true" || "$HAS_RESOURCES_PREVIEW_LABEL" == "true" || "$HAS_DOCS_PREVIEW_LABEL" == "true" ]]; then
            {
              echo "should_run=true"
              echo "backend_preview=false"
              echo "is_force_preview=false"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "should_run=false"
              echo "backend_preview=false"
              echo "is_force_preview=false"
            } >> "$GITHUB_OUTPUT"
          fi

          emit_surface_targets "$HAS_FORCE_PREVIEW_LABEL"

      # Folded-in head-branch gate (formerly the head-branch-gate job): previews
      # are suppressed on protected / opt-out branches. Exposed to other jobs as
      # the head_branch_should_run output.
      - name: Evaluate head branch
        id: head-branch
        env:
          HEAD_REF: ${{ steps.check-label.outputs.head_ref }}
        shell: bash
        run: |
          set -euo pipefail

          case "$HEAD_REF" in
            prod|gtmq_spec_*|*_nopreview_*)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  detect-backend-changes:
    name: Resolve Compare Base & Backend Changes
    timeout-minutes: 2
    # Merged job: a single full checkout serves both the compare-base resolution
    # and the backend turbo-diff (they were previously two sequential jobs that
    # each did the same fetch-depth:0 checkout).
    needs: [preview-label-gate]
    if: needs.preview-label-gate.outputs.should_run == 'true' && needs.preview-label-gate.outputs.head_branch_should_run == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      is_new_commit: ${{ steps.detect-type.outputs.is_new_commit }}
      is_force_push: ${{ steps.detect-type.outputs.is_force_push }}
      comparison_sha: ${{ steps.detect-type.outputs.comparison_sha }}
      has-backend-changes: ${{ steps.check.outputs.has-backend-changes }}
      backend-changed: ${{ steps.check.outputs.backend-changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}
          fetch-depth: 0
          filter: blob:none

      - name: Detect synchronize event type
        id: detect-type
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ needs.preview-label-gate.outputs.base_sha }}
          HEAD_SHA: ${{ needs.preview-label-gate.outputs.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if ! git cat-file -e "$HEAD_SHA" 2>/dev/null; then
            echo "Missing PR head commit: $HEAD_SHA" >&2
            exit 1
          fi

          PR_BASE_SHA="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"

          if [[ -z "$PR_BASE_SHA" ]]; then
            echo "Unable to determine merge-base for $BASE_SHA and $HEAD_SHA" >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_ACTION" == "labeled" ]]; then
            {
              echo "is_new_commit=false"
              echo "is_force_push=false"
              echo "comparison_sha=$PR_BASE_SHA"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA_EXISTS="false"
          if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
              BEFORE_SHA_EXISTS="true"
            fi
          fi

          if [[ "$EVENT_ACTION" == "synchronize" && "$BEFORE_SHA_EXISTS" == "true" && "$BEFORE_SHA" != "$HEAD_SHA" ]] && git merge-base --is-ancestor "$BEFORE_SHA" "$HEAD_SHA"; then
            {
              echo "is_new_commit=true"
              echo "is_force_push=false"
              echo "comparison_sha=$BEFORE_SHA"
            } >> "$GITHUB_OUTPUT"
          else
            if [[ "$EVENT_ACTION" == "synchronize" ]]; then
              IS_FORCE_PUSH="true"
            else
              IS_FORCE_PUSH="false"
            fi
            {
              echo "is_force_push=$IS_FORCE_PUSH"
              echo "is_new_commit=false"
              echo "comparison_sha=$PR_BASE_SHA"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Check if preview is unconditional
        id: preview-mode
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.preview-label-gate.outputs.is_force_preview }}" == "true" ]]; then
            echo "skip-detection=true" >> "$GITHUB_OUTPUT"
            echo "reason=force preview" >> "$GITHUB_OUTPUT"
          else
            echo "skip-detection=false" >> "$GITHUB_OUTPUT"
            echo "reason=change detection required" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Turbo changes
        id: turbo-changes
        if: steps.preview-mode.outputs.skip-detection != 'true'
        uses: ./.github/actions/detect-turbo-changes
        with:
          base-ref: ${{ steps.detect-type.outputs.comparison_sha }}
          head-ref: ${{ needs.preview-label-gate.outputs.head_sha }}
          packages: "@namefi-astra/backend"
          fallback-files: |
            bun.lock
            package.json
            bunfig.toml
            .bun-version

      - name: Check backend changes
        id: check
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.preview-label-gate.outputs.is_force_preview }}" == "true" ]]; then
            echo "has-backend-changes=true" >> "$GITHUB_OUTPUT"
            echo "backend-changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_BACKEND_CHANGES="${{ contains(fromJSON(steps.turbo-changes.outputs.changed-packages || '[]'), '@namefi-astra/backend' ) }}"
          echo "has-backend-changes=$HAS_BACKEND_CHANGES" >> "$GITHUB_OUTPUT"
          echo "backend-changed=$HAS_BACKEND_CHANGES" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Build Backend Image
    needs: [preview-label-gate, detect-backend-changes, deploy-ledger]
    if: needs.preview-label-gate.outputs.is_same_repo == 'true' && needs.deploy-ledger.outputs.has_backend_preview == 'true' && needs.detect-backend-changes.outputs.has-backend-changes == 'true' && needs.deploy-ledger.outputs.backend_deployed != 'true'
    runs-on: "blacksmith-8vcpu-ubuntu-2404"
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
      image_digest: ${{ steps.resolve-digest.outputs.image_digest }}
      new_image: ${{ steps.resolve-digest.outputs.new_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev"

      - name: Set Docker tag
        id: set-tag
        run: |
          IMAGE_SHA="$(git rev-parse HEAD)"
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api:${IMAGE_SHA}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve backend version metadata
        id: version-meta
        run: |
          DEPLOY_SHA="$(git rev-parse HEAD)"
          {
            echo "version=$(jq -r .version apps/backend/package.json)"
            echo "commit_sha=$DEPLOY_SHA"
            echo "commit_date=$(git show -s --format=%cI "$DEPLOY_SHA")"
          } >> "$GITHUB_OUTPUT"

      - name: Check if Docker image exists
        id: check-image
        run: |
          {
            IMAGE_TAG="${{ steps.set-tag.outputs.image_tag }}"
            IMAGE_DETAILS="$(gcloud artifacts docker images describe "$IMAGE_TAG" --format="json" 2>/dev/null)"
            DIGEST="$(echo "$IMAGE_DETAILS" | jq .image_summary.digest)"
            if [[ -n "$DIGEST" && "$DIGEST" != "null" ]]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          } || {
            echo "exists=false" >> "$GITHUB_OUTPUT"
          }

      - name: Set up Docker Buildx
        if: steps.check-image.outputs.exists != 'true'
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build and Push Container
        if: steps.check-image.outputs.exists != 'true'
        uses: useblacksmith/build-push-action@v2
        with:
          tags: ${{ steps.set-tag.outputs.image_tag }}
          push: true
          context: .
          file: ./apps/backend/Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api-base-image:latest
            BASE_PRUNER=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api-base-pruner:latest
            DEPS_BUILD=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api-deps-build:latest
            BUILD_VERSION=${{ steps.version-meta.outputs.version }}
            BUILD_COMMIT_SHA=${{ steps.version-meta.outputs.commit_sha }}
            BUILD_COMMIT_DATE=${{ steps.version-meta.outputs.commit_date }}


      - name: Resolve image digest
        id: resolve-digest
        run: |
          IMAGE_TAG="${{ steps.set-tag.outputs.image_tag }}"
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api"
          DIGEST="$(gcloud artifacts docker images describe "$IMAGE_TAG" --format="value(image_summary.digest)")"
          if [[ -z "$DIGEST" ]]; then
            exit 1
          fi
          NEW_IMAGE="${IMAGE_BASE}@${DIGEST}"
          {
            echo "image_digest=$DIGEST"
            echo "new_image=$NEW_IMAGE"
          } >> "$GITHUB_OUTPUT"

  prepare-database:
    name: Prepare Preview DB
    timeout-minutes: 5
    needs: [preview-label-gate, detect-backend-changes, deploy-ledger]
    if: needs.preview-label-gate.outputs.is_same_repo == 'true' && needs.deploy-ledger.outputs.has_backend_preview == 'true' && needs.detect-backend-changes.outputs.has-backend-changes == 'true' && needs.deploy-ledger.outputs.backend_deployed != 'true'
    runs-on: "blacksmith-4vcpu-ubuntu-2404"
    outputs:
      branch_id: ${{ steps.branch-name.outputs.branch_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}
          fetch-depth: 32

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install

      - name: Set Neon branch name
        id: branch-name
        run: echo "branch_id=pr-${{ needs.preview-label-gate.outputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Create Neon branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          BRANCH_ID="${{ steps.branch-name.outputs.branch_id }}"
          EXISTING_BRANCH=$(./apps/backend/node_modules/.bin/neonctl branches list --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY" | grep -w "$BRANCH_ID" || true)
          if [ -n "$EXISTING_BRANCH" ]; then
            ./apps/backend/node_modules/.bin/neonctl branches delete "$BRANCH_ID" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY" --force
          fi
          ./apps/backend/node_modules/.bin/neonctl branches create --name "$BRANCH_ID" --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY"

      - name: Check for SQL migration changes
        id: check-sql-changes
        run: |
          echo "has_sql_changes=true" >> "$GITHUB_OUTPUT"
          # COMPARE_BASE=$(git merge-base ${{ needs.preview-label-gate.outputs.base_sha }} ${{ needs.preview-label-gate.outputs.head_sha }})
          # SQL_FILES=$(git diff --name-only "$COMPARE_BASE" ${{ needs.preview-label-gate.outputs.head_sha }} | grep -E '\.sql$' || true)
          # if [[ -n "$SQL_FILES" ]]; then
          #   echo "has_sql_changes=true" >> $GITHUB_OUTPUT
          # else
          #   echo "has_sql_changes=false" >> $GITHUB_OUTPUT
          # fi

      - name: Get connection string for PR branch
        id: connection-string
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          CS=$(./apps/backend/node_modules/.bin/neonctl connection-string --role-name neondb_owner --branch "${{ steps.branch-name.outputs.branch_id }}" --database-name neondb --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY")
          echo "::add-mask::$CS"
          echo "database_url=$CS" >> "$GITHUB_OUTPUT"

      - name: Run migrations on PR branch
        if: steps.check-sql-changes.outputs.has_sql_changes == 'true'
        working-directory: ./packages/db
        env:
          DATABASE_URL: ${{ steps.connection-string.outputs.database_url }}
        run: bun db:migrate

  deploy-preview:
    name: Deploy Backend Preview
    needs: [preview-label-gate, detect-backend-changes, build-backend, prepare-database, deploy-ledger]
    if: needs.preview-label-gate.outputs.is_same_repo == 'true' && needs.deploy-ledger.outputs.has_backend_preview == 'true' && needs.detect-backend-changes.outputs.has-backend-changes == 'true' && needs.deploy-ledger.outputs.backend_deployed != 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      revision_tag_url: ${{ steps.tagged-url.outputs.revision_tag_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.preview-label-gate.outputs.checkout_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Neon CLI
        run: bun add --global neonctl@latest

      - name: Get connection string for PR branch
        id: connection-string
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          CS=$(neonctl connection-string --role-name neondb_owner --branch "${{ needs.prepare-database.outputs.branch_id }}" --database-name neondb --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY")
          echo "::add-mask::$CS"
          echo "database_url=$CS" >> "$GITHUB_OUTPUT"

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: "beta"

      - name: Deploy preview revision
        id: deploy
        env:
          NEW_IMAGE: ${{ needs.build-backend.outputs.new_image }}
          DATABASE_URL: ${{ steps.connection-string.outputs.database_url }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_DEV_SERVICE_TOKEN }}
          GCP_HSM_KEYRING_RESOURCE_NAME: ${{ secrets.GCP_HSM_KEYRING_RESOURCE_NAME }}
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
        run: |
          gcloud config set core/disable_prompts True
          gcloud beta config set core/disable_prompts True

          TAG="pr-$PR_NUMBER"
          DEPLOY_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="${DEPLOY_SHA::7}"
          REVISION_SUFFIX="pr-$PR_NUMBER-$SHORT_SHA"
          gcloud beta run deploy namefi-astra-backend-preview \
            --container "gate-proxy" \
            --image "us-central1-docker.pkg.dev/d3serve-labs/cloud-run-source-deploy/namefi-astra/preview-ngnix-proxy:latest" \
            --port='80' --no-traffic \
            --container "temporal" \
            --image "us-central1-docker.pkg.dev/d3serve-labs/cloud-run-source-deploy/temporalio/temporal:1.5.1" \
            --args="server,start-dev,--ip,0.0.0.0" \
            --container "api" \
            --image "$NEW_IMAGE" \
            --set-env-vars="MANAGED_NFT_INDEX=true,DATABASE_URL=$DATABASE_URL,ENVIRONMENT=preview,INFISICAL_TOKEN=$INFISICAL_TOKEN,GCP_HSM_KEYRING_RESOURCE_NAME=$GCP_HSM_KEYRING_RESOURCE_NAME" \
            --container "workers" \
            --image "$NEW_IMAGE" \
            --set-env-vars="MANAGED_NFT_INDEX=true,DATABASE_URL=$DATABASE_URL,ENVIRONMENT=preview,INFISICAL_TOKEN=$INFISICAL_TOKEN,GCP_HSM_KEYRING_RESOURCE_NAME=$GCP_HSM_KEYRING_RESOURCE_NAME" \
            --revision-suffix "$REVISION_SUFFIX" \
            --no-traffic \
            --tag "$TAG" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --quiet --async

          REVISION_NAME="namefi-astra-backend-preview-$REVISION_SUFFIX"
          while true; do
            READY_CONDITION=$(gcloud run revisions describe "$REVISION_NAME" --project "${{ env.PROJECT_ID }}" --region "${{ env.REGION }}" --format='json' | jq -r '.status.conditions[] | select(.type == "Ready")')
            READY_STATUS=$(echo "$READY_CONDITION" | jq -r '.status')
            READY_REASON=$(echo "$READY_CONDITION" | jq -r '.reason // empty')
            READY_MESSAGE=$(echo "$READY_CONDITION" | jq -r '.message // empty')

            if [[ "$READY_STATUS" == "True" ]]; then
              break
            elif [[ "$READY_STATUS" == "False" ]]; then
              echo "Reason: $READY_REASON"
              echo "Message: $READY_MESSAGE"
              exit 1
            else
              sleep 5
            fi
          done

      - name: Get tagged URL
        id: tagged-url
        env:
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
        run: |
          TAG="pr-$PR_NUMBER"
          REVISION_TAG_URL=$(gcloud run services describe namefi-astra-backend-preview --region "${{ env.REGION }}" --project "${{ env.PROJECT_ID }}" --format="json" | jq -r ".status.traffic.[] | select(.tag == \"$TAG\") | .url" )
          if [[ -z "$REVISION_TAG_URL" ]]; then
            exit 1
          fi
          echo "revision_tag_url=$REVISION_TAG_URL" >> "$GITHUB_OUTPUT"

  workflow-summary:
    name: Preview Summary
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    if: always()
    needs:
      - detect
      - deploy-frontend
      - deploy-park
      - deploy-resources
      - deploy-api-client-docs
      - preview-label-gate
      - detect-backend-changes
      - build-backend
      - prepare-database
      - deploy-preview
      - deploy-ledger
    steps:
      - name: Generate workflow summary
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action || github.event_name }}
          DETECT_APPS_RESULT: ${{ needs.detect.result }}
          FRONTEND_CHANGED: ${{ needs.detect.outputs.frontend_changed || 'false' }}
          PARK_CHANGED: ${{ needs.detect.outputs.park_changed || 'false' }}
          RESOURCES_CHANGED: ${{ needs.detect.outputs.resources_changed || 'false' }}
          DOCS_CHANGED: ${{ needs.detect.outputs.docs_changed || 'false' }}
          FRONTEND_PREVIEW_RESULT: ${{ needs.deploy-frontend.result }}
          FRONTEND_PREVIEW_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
          PARK_PREVIEW_RESULT: ${{ needs.deploy-park.result }}
          PARK_PREVIEW_URL: ${{ needs.deploy-park.outputs.deployment_url }}
          RESOURCES_PREVIEW_RESULT: ${{ needs.deploy-resources.result }}
          RESOURCES_PREVIEW_URL: ${{ needs.deploy-resources.outputs.deployment_url }}
          DOCS_PREVIEW_RESULT: ${{ needs.deploy-api-client-docs.result }}
          DOCS_PREVIEW_URL: ${{ needs.deploy-api-client-docs.outputs.deployment_url }}
          SHOULD_RUN: ${{ needs.preview-label-gate.outputs.should_run }}
          IS_FORCE_PREVIEW: ${{ needs.preview-label-gate.outputs.is_force_preview }}
          PARK_REQUESTED: ${{ needs.preview-label-gate.outputs.park_preview || 'false' }}
          RESOURCES_REQUESTED: ${{ needs.preview-label-gate.outputs.resources_preview || 'false' }}
          DOCS_REQUESTED: ${{ needs.preview-label-gate.outputs.docs_preview || 'false' }}
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
          HEAD_REF: ${{ needs.preview-label-gate.outputs.head_ref }}
          HEAD_BRANCH_ALLOWED: ${{ needs.preview-label-gate.outputs.head_branch_should_run }}
          IS_NEW_COMMIT: ${{ needs.detect-backend-changes.outputs.is_new_commit }}
          IS_FORCE_PUSH: ${{ needs.detect-backend-changes.outputs.is_force_push }}
          COMPARISON_SHA: ${{ needs.detect-backend-changes.outputs.comparison_sha }}
          HAS_BACKEND_CHANGES: ${{ needs.detect-backend-changes.outputs.has-backend-changes }}
          BACKEND_CHANGED: ${{ needs.detect-backend-changes.outputs.backend-changed }}
          BACKEND_PREVIEW_URL: ${{ needs.deploy-preview.outputs.revision_tag_url }}
          HAS_BACKEND_PREVIEW: ${{ needs.deploy-ledger.outputs.has_backend_preview }}
          PREVIEW_LABEL_GATE_RESULT: ${{ needs.preview-label-gate.result }}
          HEAD_BRANCH_GATE_RESULT: ${{ needs.preview-label-gate.result }}
          DETECT_SYNC_TYPE_RESULT: ${{ needs.detect-backend-changes.result }}
          DETECT_BACKEND_CHANGES_RESULT: ${{ needs.detect-backend-changes.result }}
          RESOLVE_BACKEND_STATE_RESULT: ${{ needs.deploy-ledger.result }}
          BUILD_BACKEND_RESULT: ${{ needs.build-backend.result }}
          PREPARE_DATABASE_RESULT: ${{ needs.prepare-database.result }}
          DEPLOY_PREVIEW_RESULT: ${{ needs.deploy-preview.result }}
        run: |
          set -euo pipefail

          short_sha() {
            local value="${1:-}"
            if [[ -z "$value" ]]; then
              echo "—"
            else
              echo "${value:0:7}"
            fi
          }

          row() {
            printf '| %s | %s | %s | %s | %s |\n' "$1" "$2" "$3" "$4" "$5" >> "$GITHUB_STEP_SUMMARY"
          }

          format_result() {
            case "${1:-}" in
              success) echo "deployed" ;;
              skipped) echo "skipped" ;;
              failure|cancelled|timed_out) echo "failed" ;;
              "") echo "—" ;;
              *) echo "$1" ;;
            esac
          }

          frontend_result="$(format_result "$FRONTEND_PREVIEW_RESULT")"
          frontend_url="${FRONTEND_PREVIEW_URL:-}"

          if [[ "$HAS_BACKEND_PREVIEW" == "true" ]]; then
            frontend_mode="preview backend"
            frontend_note="backend preview active"
          else
            frontend_mode="shared backend"
            if [[ "$FRONTEND_CHANGED" != "true" ]]; then
              frontend_note="not affected"
            else
              frontend_note="affected-only"
            fi
          fi

          surface_note() {
            local changed="$1" requested="$2" label="$3"
            if [[ "$changed" != "true" ]]; then
              echo "not affected"
            elif [[ "$requested" != "true" ]]; then
              echo "not requested (add \`$label\` label)"
            else
              echo "label-gated"
            fi
          }

          park_note="$(surface_note "$PARK_CHANGED" "$PARK_REQUESTED" "preview-park")"
          resources_note="$(surface_note "$RESOURCES_CHANGED" "$RESOURCES_REQUESTED" "preview-resources")"
          docs_note="$(surface_note "$DOCS_CHANGED" "$DOCS_REQUESTED" "preview-docs")"

          {
            echo "## Preview Summary"
            echo
            echo "- PR: #$PR_NUMBER"
            echo "- Event: \`$EVENT_NAME / $EVENT_ACTION\`"
            echo "- Head branch: \`$HEAD_REF\`"
            echo "- Compare base: \`$(short_sha "$COMPARISON_SHA")\`"
            echo "- Backend preview label active: \`$SHOULD_RUN\`"
            echo "- Force preview: \`$IS_FORCE_PREVIEW\`"
            echo
            echo "### Preview Surfaces"
            echo
            echo "| Surface | Mode | Result | URL | Notes |"
            echo "|---|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          row "Frontend" "$frontend_mode" "$frontend_result" "${frontend_url:-—}" "$frontend_note"
          row "Park" "label-gated" "$(format_result "$PARK_PREVIEW_RESULT")" "${PARK_PREVIEW_URL:-—}" "$park_note"
          row "Resources" "label-gated" "$(format_result "$RESOURCES_PREVIEW_RESULT")" "${RESOURCES_PREVIEW_URL:-—}" "$resources_note"
          row "API Client Docs" "label-gated" "$(format_result "$DOCS_PREVIEW_RESULT")" "${DOCS_PREVIEW_URL:-—}" "$docs_note"
          backend_note="not requested or unchanged"
          if [[ "$IS_FORCE_PREVIEW" == "true" ]]; then
            backend_note="forced preview"
          elif [[ "$BACKEND_CHANGED" == "true" ]]; then
            backend_note="changes detected"
          fi

          row "Backend" "label-gated" "$(format_result "$DEPLOY_PREVIEW_RESULT")" "${BACKEND_PREVIEW_URL:-—}" "$backend_note"

          {
            echo
            echo "### Orchestration"
            echo
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| App planning | $DETECT_APPS_RESULT |"
            echo "| Backend label check | $PREVIEW_LABEL_GATE_RESULT |"
            echo "| Preview branch check | $HEAD_BRANCH_GATE_RESULT |"
            echo "| Compare base resolution | $DETECT_SYNC_TYPE_RESULT |"
            echo "| Backend change check | $DETECT_BACKEND_CHANGES_RESULT |"
            echo "| Backend state resolution | $RESOLVE_BACKEND_STATE_RESULT |"
            echo "| Backend image build | $BUILD_BACKEND_RESULT |"
            echo "| Preview database | $PREPARE_DATABASE_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish preview results comment
        # Gated at the step level (the step summary above always runs): only
        # post/refresh the PR comment for same-repo PRs on a preview-eligible
        # branch that actually requested a preview.
        if: |-
          !cancelled() &&
          needs.preview-label-gate.outputs.pr_number != '' &&
          needs.preview-label-gate.outputs.is_same_repo == 'true' &&
          needs.detect.outputs.resources_only_sync != 'true' &&
          needs.preview-label-gate.outputs.head_branch_should_run == 'true' &&
          (
            github.event_name == 'workflow_dispatch' ||
            github.event.action != 'labeled' ||
            needs.preview-label-gate.outputs.should_run == 'true'
          )
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FRONTEND_CHANGED: ${{ needs.detect.outputs.frontend_changed || 'false' }}
          PARK_CHANGED: ${{ needs.detect.outputs.park_changed || 'false' }}
          RESOURCES_CHANGED: ${{ needs.detect.outputs.resources_changed || 'false' }}
          DOCS_CHANGED: ${{ needs.detect.outputs.docs_changed || 'false' }}
          PREVIEW_REQUESTED: ${{ needs.preview-label-gate.outputs.should_run || 'false' }}
          PARK_REQUESTED: ${{ needs.preview-label-gate.outputs.park_preview || 'false' }}
          RESOURCES_REQUESTED: ${{ needs.preview-label-gate.outputs.resources_preview || 'false' }}
          DOCS_REQUESTED: ${{ needs.preview-label-gate.outputs.docs_preview || 'false' }}
          HAS_BACKEND_CHANGES: ${{ needs.detect-backend-changes.outputs.has-backend-changes || 'false' }}
          HAS_BACKEND_PREVIEW: ${{ needs.deploy-ledger.outputs.has_backend_preview || 'false' }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
          PARK_RESULT: ${{ needs.deploy-park.result }}
          PARK_URL: ${{ needs.deploy-park.outputs.deployment_url }}
          RESOURCES_RESULT: ${{ needs.deploy-resources.result }}
          RESOURCES_URL: ${{ needs.deploy-resources.outputs.deployment_url }}
          DOCS_RESULT: ${{ needs.deploy-api-client-docs.result }}
          DOCS_URL: ${{ needs.deploy-api-client-docs.outputs.deployment_url }}
          BUILD_BACKEND_RESULT: ${{ needs.build-backend.result }}
          PREPARE_DATABASE_RESULT: ${{ needs.prepare-database.result }}
          DEPLOY_PREVIEW_RESULT: ${{ needs.deploy-preview.result }}
          BACKEND_PREVIEW_URL: ${{ needs.deploy-preview.outputs.revision_tag_url }}
          FRONTEND_ALREADY: ${{ needs.deploy-ledger.outputs.frontend_deployed || 'false' }}
          BACKEND_ALREADY: ${{ needs.deploy-ledger.outputs.backend_deployed || 'false' }}
          PARK_ALREADY: ${{ needs.deploy-ledger.outputs.park_deployed || 'false' }}
          RESOURCES_ALREADY: ${{ needs.deploy-ledger.outputs.resources_deployed || 'false' }}
          DOCS_ALREADY: ${{ needs.deploy-ledger.outputs.docs_deployed || 'false' }}
          FRONTEND_LEDGER_URL: ${{ needs.deploy-ledger.outputs.frontend_url }}
          BACKEND_LEDGER_URL: ${{ needs.deploy-ledger.outputs.backend_url }}
          PARK_LEDGER_URL: ${{ needs.deploy-ledger.outputs.park_url }}
          RESOURCES_LEDGER_URL: ${{ needs.deploy-ledger.outputs.resources_url }}
          DOCS_LEDGER_URL: ${{ needs.deploy-ledger.outputs.docs_url }}
        with:
          script: |
            const marker = '<!-- preview-surface-status:v1 -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const runUrl = process.env.RUN_URL;
            const updatedAt = new Date().toISOString();

            const isTrue = (value) => value === 'true';
            const isFailure = (value) =>
              ['failure', 'cancelled', 'timed_out'].includes(value ?? '');
            const previewLink = (url) => `[Preview](${url})`;
            const buildLink = `[Build](${runUrl})`;
            const linkCell = (links) => links.filter(Boolean).join('<br>') || '—';
            const row = (surface, status, links, notes) =>
              `| ${surface} | ${status} | ${linkCell(links)} | ${notes} |`;

            const frontendChanged = isTrue(process.env.FRONTEND_CHANGED);
            const parkChanged = isTrue(process.env.PARK_CHANGED);
            const resourcesChanged = isTrue(process.env.RESOURCES_CHANGED);
            const docsChanged = isTrue(process.env.DOCS_CHANGED);
            const parkRequested = isTrue(process.env.PARK_REQUESTED);
            const resourcesRequested = isTrue(process.env.RESOURCES_REQUESTED);
            const docsRequested = isTrue(process.env.DOCS_REQUESTED);
            const previewRequested = isTrue(process.env.PREVIEW_REQUESTED);
            const hasBackendChanges = isTrue(process.env.HAS_BACKEND_CHANGES);
            const hasBackendPreview = isTrue(process.env.HAS_BACKEND_PREVIEW);

            const frontendResult = process.env.FRONTEND_RESULT || '';
            const frontendUrl = process.env.FRONTEND_URL || '';

            const parkResult = process.env.PARK_RESULT || '';
            const parkUrl = process.env.PARK_URL || '';
            const resourcesResult = process.env.RESOURCES_RESULT || '';
            const resourcesUrl = process.env.RESOURCES_URL || '';
            const docsResult = process.env.DOCS_RESULT || '';
            const docsUrl = process.env.DOCS_URL || '';

            const buildBackendResult = process.env.BUILD_BACKEND_RESULT || '';
            const prepareDatabaseResult = process.env.PREPARE_DATABASE_RESULT || '';
            const deployPreviewResult = process.env.DEPLOY_PREVIEW_RESULT || '';
            const backendPreviewUrl = process.env.BACKEND_PREVIEW_URL || '';

            // A surface skipped this run because the ledger shows it is already
            // deployed at the current head SHA (so it is up to date, not failed).
            const frontendAlready = isTrue(process.env.FRONTEND_ALREADY);
            const backendAlready = isTrue(process.env.BACKEND_ALREADY);
            const parkAlready = isTrue(process.env.PARK_ALREADY);
            const resourcesAlready = isTrue(process.env.RESOURCES_ALREADY);
            const docsAlready = isTrue(process.env.DOCS_ALREADY);
            const frontendLedgerUrl = process.env.FRONTEND_LEDGER_URL || '';
            const backendLedgerUrl = process.env.BACKEND_LEDGER_URL || '';
            const parkLedgerUrl = process.env.PARK_LEDGER_URL || '';
            const resourcesLedgerUrl = process.env.RESOURCES_LEDGER_URL || '';
            const docsLedgerUrl = process.env.DOCS_LEDGER_URL || '';

            const backendAttempted = previewRequested && hasBackendChanges;
            const backendPreparationFailed =
              isFailure(buildBackendResult) || isFailure(prepareDatabaseResult);

            const readyOrFailedRow = (surface, changed, requested, requestNote, result, url, affectedNote, already, ledgerUrl) => {
              if (!changed) {
                return row(surface, '⚪ Not affected', [], 'No relevant changes');
              }

              if (!requested) {
                return row(surface, '⚪ Not requested', [], requestNote);
              }

              if (result === 'success') {
                return row(surface, '🟢 Ready', url ? [previewLink(url)] : [], affectedNote);
              }

              if (already) {
                return row(
                  surface,
                  '🟢 Ready',
                  ledgerUrl ? [previewLink(ledgerUrl)] : [],
                  'Already deployed at this commit',
                );
              }

              return row(surface, '🔴 Failed', [buildLink], affectedNote);
            };

            // Single frontend deployment: it runs whenever the frontend changed
            // or a preview backend is active. Its backend target (templated
            // preview URL vs the shared API) is resolved up front, so the note
            // just reflects which backend it points at.
            const frontendBackendNote = hasBackendPreview
              ? 'Preview backend'
              : 'Shared backend';

            let frontendRow;
            if (!frontendChanged && !hasBackendPreview) {
              frontendRow = row('Frontend', '⚪ Not affected', [], 'No relevant changes');
            } else if (frontendResult === 'success') {
              frontendRow = row(
                'Frontend',
                '🟢 Ready',
                frontendUrl ? [previewLink(frontendUrl)] : [],
                frontendBackendNote,
              );
            } else if (frontendAlready) {
              frontendRow = row(
                'Frontend',
                '🟢 Ready',
                frontendLedgerUrl ? [previewLink(frontendLedgerUrl)] : [],
                'Already deployed at this commit',
              );
            } else if (isFailure(frontendResult)) {
              frontendRow = row('Frontend', '🔴 Failed', [buildLink], frontendBackendNote);
            } else {
              frontendRow = row('Frontend', '⚪ Not affected', [], 'No relevant changes');
            }

            let backendRow;
            if (!previewRequested) {
              backendRow = row('Backend', '⚪ Not requested', [], 'Label-gated');
            } else if (backendAlready) {
              backendRow = row(
                'Backend',
                '🟢 Ready',
                backendLedgerUrl ? [previewLink(backendLedgerUrl)] : [],
                'Already deployed at this commit',
              );
            } else if (
              backendAttempted &&
              (backendPreparationFailed ||
                isFailure(deployPreviewResult) ||
                deployPreviewResult === 'skipped')
            ) {
              backendRow = row('Backend', '🔴 Failed', [buildLink], 'Label-gated');
            } else if (backendPreviewUrl) {
              backendRow = row(
                'Backend',
                '🟢 Ready',
                [previewLink(backendPreviewUrl)],
                'Label-gated',
              );
            } else if (backendAttempted) {
              backendRow =
                deployPreviewResult === 'success'
                  ? row('Backend', '🟢 Ready', [], 'Label-gated')
                  : row('Backend', '🔴 Failed', [buildLink], 'Label-gated');
            } else {
              backendRow = row('Backend', '⚪ Not affected', [], 'Label-gated');
            }

            const rows = [
              frontendRow,
              readyOrFailedRow(
                'Park',
                parkChanged,
                parkRequested,
                'Add `preview-park` label',
                parkResult,
                parkUrl,
                'Label-gated',
                parkAlready,
                parkLedgerUrl,
              ),
              readyOrFailedRow(
                'Resources',
                resourcesChanged,
                resourcesRequested,
                'Add `preview-resources` label',
                resourcesResult,
                resourcesUrl,
                'Label-gated',
                resourcesAlready,
                resourcesLedgerUrl,
              ),
              readyOrFailedRow(
                'API Client Docs',
                docsChanged,
                docsRequested,
                'Add `preview-docs` label',
                docsResult,
                docsUrl,
                'Label-gated',
                docsAlready,
                docsLedgerUrl,
              ),
              backendRow,
            ];

            const body = [
              marker,
              '### Preview Surfaces',
              '',
              `- PR: #${prNumber}`,
              `- Run: [Workflow run](${runUrl})`,
              `- Updated: \`${updatedAt}\``,
              '',
              '| Surface | Status | Links | Notes |',
              '|---|---|---|---|',
              ...rows,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existingComment = [...comments]
              .reverse()
              .find((comment) => comment.body?.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Update deploy ledger comment
        if: |-
          !cancelled() &&
          needs.preview-label-gate.outputs.pr_number != '' &&
          needs.preview-label-gate.outputs.is_same_repo == 'true' &&
          needs.detect.outputs.resources_only_sync != 'true' &&
          needs.preview-label-gate.outputs.head_branch_should_run == 'true' &&
          (
            github.event_name == 'workflow_dispatch' ||
            github.event.action != 'labeled' ||
            needs.preview-label-gate.outputs.should_run == 'true'
          )
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
          HEAD_SHA: ${{ needs.preview-label-gate.outputs.head_sha }}
          BACKEND_URL: ${{ needs.deploy-ledger.outputs.target_backend_url }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          PARK_RESULT: ${{ needs.deploy-park.result }}
          RESOURCES_RESULT: ${{ needs.deploy-resources.result }}
          DOCS_RESULT: ${{ needs.deploy-api-client-docs.result }}
          DEPLOY_PREVIEW_RESULT: ${{ needs.deploy-preview.result }}
          FRONTEND_DEPLOY_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
          PARK_DEPLOY_URL: ${{ needs.deploy-park.outputs.deployment_url }}
          RESOURCES_DEPLOY_URL: ${{ needs.deploy-resources.outputs.deployment_url }}
          DOCS_DEPLOY_URL: ${{ needs.deploy-api-client-docs.outputs.deployment_url }}
          BACKEND_DEPLOY_URL: ${{ needs.deploy-preview.outputs.revision_tag_url }}
        with:
          script: |
            // Single writer for the per-PR deploy ledger (read by the
            // deploy-ledger job on later runs to skip redundant redeploys).
            // Records the head SHA each surface was last successfully deployed
            // at; surfaces skipped or not run this run keep their prior value,
            // so a SHA stays "deployed" across follow-up label runs.
            const marker = '<!-- preview-deploy-ledger:v1 -->';
            const prNumber = Number(process.env.PR_NUMBER);
            const headSha = process.env.HEAD_SHA || '';
            const backendUrl = process.env.BACKEND_URL || '';
            const updatedAt = new Date().toISOString();
            const succeeded = (value) => value === 'success';

            if (!headSha) {
              core.info('No head SHA resolved; skipping deploy ledger update.');
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = [...comments]
              .reverse()
              .find((comment) => comment.body?.includes(marker));

            let ledger = {};
            const match = existing?.body?.match(/<!-- ledger-data:\s*(\{.*?\})\s*-->/s);
            if (match) {
              try {
                ledger = JSON.parse(match[1]);
              } catch (error) {
                core.warning(`Could not parse existing deploy ledger, rewriting: ${error}`);
                ledger = {};
              }
            }

            // Each entry is { sha, url } (frontend also stores the backend it
            // targeted, so a shared->preview-backend switch at the same SHA
            // still redeploys). Surfaces not deployed this run keep their prior
            // entry, so a SHA stays "deployed" across follow-up label runs.
            if (succeeded(process.env.FRONTEND_RESULT)) {
              ledger.frontend = {
                sha: headSha,
                backend: backendUrl,
                url: process.env.FRONTEND_DEPLOY_URL || '',
              };
            }
            if (succeeded(process.env.DEPLOY_PREVIEW_RESULT)) {
              ledger.backend = { sha: headSha, url: process.env.BACKEND_DEPLOY_URL || '' };
            }
            if (succeeded(process.env.PARK_RESULT)) {
              ledger.park = { sha: headSha, url: process.env.PARK_DEPLOY_URL || '' };
            }
            if (succeeded(process.env.RESOURCES_RESULT)) {
              ledger.resources = { sha: headSha, url: process.env.RESOURCES_DEPLOY_URL || '' };
            }
            if (succeeded(process.env.DOCS_RESULT)) {
              ledger.docs = { sha: headSha, url: process.env.DOCS_DEPLOY_URL || '' };
            }

            const shortSha = (value) => (value ? value.slice(0, 7) : '-');
            const ledgerRow = (surface, entry) =>
              `| ${surface} | \`${shortSha(entry?.sha)}\` | ${entry?.url ? `[Preview](${entry.url})` : '—'} |`;
            const body = [
              marker,
              `<!-- ledger-data: ${JSON.stringify(ledger)} -->`,
              '### Preview Deploy Ledger',
              '',
              'Tracks the head SHA each surface was last successfully deployed at,',
              'so adding a label later does not redeploy surfaces already current.',
              '',
              `- Head SHA: \`${shortSha(headSha)}\``,
              `- Updated: \`${updatedAt}\``,
              '',
              '| Surface | Last deployed SHA | Preview |',
              '|---|---|---|',
              ledgerRow('Frontend', ledger.frontend),
              ledgerRow('Backend', ledger.backend),
              ledgerRow('Park', ledger.park),
              ledgerRow('Resources', ledger.resources),
              ledgerRow('API Client Docs', ledger.docs),
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
