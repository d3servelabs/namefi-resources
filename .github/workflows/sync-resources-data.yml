name: Sync Resources Data

on:
  repository_dispatch:
    types:
      - resources-updated
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref in d3servelabs/namefi-resources to sync (branch, tag, or SHA)'
        required: false
        default: 'main'
      sha:
        description: 'Exact commit SHA in d3servelabs/namefi-resources to sync (optional)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-resources-data
  cancel-in-progress: false

jobs:
  sync:
    name: Update data submodule and open PR
    runs-on: ubuntu-latest
    steps:
      - name: Create NameFi bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.NAMEFI_BOT_APP_ID }}
          private-key: ${{ secrets.NAMEFI_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          submodules: recursive

      - name: Determine target ref
        id: target
        env:
          RAW_TARGET_REF: ${{ github.event.client_payload.sha || github.event.client_payload.ref || github.event.inputs.sha || github.event.inputs.ref || 'main' }}
        run: |
          set -euo pipefail

          validate_ref_or_sha() {
            local value="$1"
            local label="$2"

            if [[ "$value" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              return 0
            fi

            if git check-ref-format --allow-onelevel "$value" || git check-ref-format "$value"; then
              return 0
            fi

            echo "::error::$label is not a valid git ref or SHA: $value"
            exit 1
          }

          REF_INPUT="$RAW_TARGET_REF"
          validate_ref_or_sha "$REF_INPUT" "target ref"
          echo "ref=$REF_INPUT" >> "$GITHUB_OUTPUT"
          echo "target ref: $REF_INPUT"

      - name: Update data submodule
        id: update-submodule
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.event.client_payload.ref || github.event.inputs.ref }}
          DISPATCH_SHA: ${{ github.event.client_payload.sha || github.event.inputs.sha }}
          INPUT_SHA: ${{ github.event.inputs.sha || '' }}
          TARGET_REF: ${{ steps.target.outputs.ref }}
        run: |
          set -euo pipefail

          validate_ref_or_sha() {
            local value="$1"
            local label="$2"

            if [ -z "$value" ]; then
              return 0
            fi

            if [[ "$value" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              return 0
            fi

            if git check-ref-format --allow-onelevel "$value" || git check-ref-format "$value"; then
              return 0
            fi

            echo "::error::$label is not a valid git ref or SHA: $value"
            exit 1
          }

          validate_sha() {
            local value="$1"
            local label="$2"

            if [ -z "$value" ]; then
              return 0
            fi

            if [[ "$value" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              return 0
            fi

            echo "::error::$label is not a valid SHA: $value"
            exit 1
          }

          validate_ref_or_sha "$TARGET_REF" "target ref"
          validate_ref_or_sha "$DISPATCH_REF" "dispatch ref"
          validate_sha "$DISPATCH_SHA" "dispatch SHA"
          validate_sha "$INPUT_SHA" "manual input SHA"

          MANUAL_EXACT_SHA="false"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_SHA" ]; then
            MANUAL_EXACT_SHA="true"
          fi

          git submodule update --init apps/resources/data

          pushd apps/resources/data
          if [ "$MANUAL_EXACT_SHA" = "true" ]; then
            git fetch origin "$TARGET_REF" --tags || git fetch origin --tags
          elif [ -n "$DISPATCH_REF" ]; then
            git fetch origin "$DISPATCH_REF" --tags
          else
            git fetch origin "$TARGET_REF" --tags
          fi
          git checkout "$TARGET_REF"
          TARGET_SHA=$(git rev-parse HEAD)

          # Because all sync runs reuse a single PR branch, a stale repository_dispatch
          # or workflow_dispatch can serialize behind a newer one and regress the
          # submodule pointer. Skip the update when the dispatched ref no longer points
          # at the dispatched SHA — the newer dispatch will produce the authoritative update.
          if [ "$MANUAL_EXACT_SHA" != "true" ] && [ -n "$DISPATCH_REF" ] && [ -n "$DISPATCH_SHA" ]; then
            REMOTE_HEAD_SHA=$(git ls-remote origin "$DISPATCH_REF" | awk '{print $1}' | head -n 1)
            if [ -z "$REMOTE_HEAD_SHA" ]; then
              REMOTE_HEAD_SHA=$(git ls-remote origin "refs/heads/$DISPATCH_REF" | awk '{print $1}' | head -n 1)
            fi

            if [ -n "$REMOTE_HEAD_SHA" ] && [ "$DISPATCH_SHA" != "$REMOTE_HEAD_SHA" ]; then
              echo "Stale dispatch: $DISPATCH_SHA on $DISPATCH_REF is behind current tip $REMOTE_HEAD_SHA; skipping."
              {
                echo "sha=$TARGET_SHA"
                echo "changed=false"
                echo "stale=true"
              } >> "$GITHUB_OUTPUT"
              popd
              exit 0
            fi
          fi

          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          popd

          git add apps/resources/data

          if git diff --quiet --cached -- apps/resources/data; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.update-submodule.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        if: steps.update-submodule.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        if: steps.update-submodule.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Validate resources data
        if: steps.update-submodule.outputs.changed == 'true'
        run: bun run --cwd apps/resources data:validate

      - name: Create or update pull request
        id: cpr
        if: steps.update-submodule.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: |
            chore: bump resources data to ${{ steps.update-submodule.outputs.sha }}
          title: "chore: sync resources data to ${{ steps.update-submodule.outputs.sha }}"
          body: |
            Automated update from d3servelabs/namefi-resources.

            - Source ref: `${{ steps.target.outputs.ref }}`
            - Source commit: `${{ steps.update-submodule.outputs.sha }}`
            - Trigger: `${{ github.event_name }}`

            This PR is automatically force-updated whenever a new resources submodule
            commit is published. Each update replaces the previous content so only one
            open PR exists at a time.
          branch: chore/resources-data/sync
          base: main
          labels: |
            resources
            automation
          add-paths: |
            apps/resources/data

      - name: Enable auto-merge (rebase)
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = Number("${{ steps.cpr.outputs.pull-request-number }}");
            const mergeMethod = 'rebase'; // merge commits not allowed in this repo

            try {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              const mutation = `
                mutation($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest {
                      autoMergeRequest {
                        enabledAt
                        mergeMethod
                      }
                    }
                  }
                }
              `;

              const variables = {
                pullRequestId: pr.node_id,
                mergeMethod: mergeMethod.toUpperCase(),
              };

              const result = await github.graphql(mutation, variables);

              console.log(`✅ Auto-merge enabled on PR #${prNumber} with ${mergeMethod} method`);
              console.log('Auto-merge details:', result.enablePullRequestAutoMerge.pullRequest.autoMergeRequest);
            } catch (error) {
              console.log(`⚠️ Could not enable auto-merge on PR #${prNumber}: ${error.message}`);
              console.log('The PR will need manual merge once checks pass.');
            }

      - name: No changes
        if: steps.update-submodule.outputs.changed != 'true'
        run: |
          if [ "${{ steps.update-submodule.outputs.stale }}" = "true" ]; then
            echo "Skipped: dispatch payload is stale; a newer dispatch will handle this update."
          else
            echo "Submodule already up to date; nothing to do."
          fi

      - name: PR details
        if: steps.cpr.outputs.pull-request-url != ''
        run: |
          echo "Pull request opened: ${{ steps.cpr.outputs.pull-request-url }}"
