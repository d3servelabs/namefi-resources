name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - apps/resources/data
  pull_request:
    paths-ignore:
      - apps/resources/data
  workflow_dispatch: # Allow manual triggering from GitHub UI or CLI
    inputs:
      package_filter:
        description: 'Filter for specific package to test (e.g., "@namefi-astra/backend")'
        required: false
        default: ""
env:
  ENVIRONEMNT: test

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Setup test environment
        run: |
          # Copy the .env.test file to the root directory to ensure it's available for all packages
          cp apps/backend/.env.test .env.test || echo "No .env.test file found"

      - name: Run tests with filter and coverage
        if: ${{ github.event.inputs.package_filter != '' }}
        run: bun test:coverage --filter="${{ github.event.inputs.package_filter }}"

      - name: Run all tests with coverage
        if: ${{ github.event.inputs.package_filter == '' }}
        run: bun test:coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: d3servelabs/namefi-astra
          fail_ci_if_error: false
          verbose: true
        if: ${{ env.CODECOV_TOKEN != '' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
