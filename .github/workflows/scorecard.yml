name: Scorecard Supply-Chain

# Weekly OpenSSF Scorecard run — trends the repo's supply-chain posture
# (branch protection, token permissions, pinned dependencies, dangerous
# workflows, etc.). This repo is private and has no GitHub Advanced Security,
# so results are NOT published to the public dashboard and are NOT uploaded to
# the Security tab — they are saved as a SARIF artifact for internal review.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 09:23 UTC.
    - cron: "23 9 * * 1"

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # security-events/id-token are declared per the canonical Scorecard example;
      # they are harmless here since we neither upload SARIF nor publish results.
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # A classic PAT with `repo` read scope widens private-repo coverage
          # (e.g. the Branch-Protection check). Falls back to GITHUB_TOKEN.
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
          publish_results: false

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 14
