name: Security Scan

# Recurrent software-composition-analysis (SCA) + supply-chain monitoring for the
# Bun workspace and Dockerfiles. Report-only: findings are surfaced to the run
# summary, uploaded as an artifact, and posted to Slack. It does NOT gate PRs yet
# — flip the scanner exit codes to gate once the signal is trusted.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 09:17 UTC — off the hour to reduce scheduled-workflow contention.
    - cron: "17 9 * * 1"
  pull_request:
    paths:
      - "bun.lock"
      - "**/package.json"
      - ".github/workflows/security-scan.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Prefer a dedicated security channel; fall back to the release channel until
  # SLACK_WEBHOOK_SECURITY_CHANNEL_URL is set. If neither exists, Slack steps no-op.
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SECURITY_CHANNEL_URL || secrets.SLACK_WEBHOOK_RELEASE_CHANNEL_URL }}

jobs:
  scan:
    name: Dependency & filesystem vulnerabilities
    # GitHub-hosted runner so step-security/harden-runner is fully supported.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: bun audit (GitHub advisory DB)
        id: bun_audit
        shell: bash
        run: |
          set -uo pipefail
          echo "## bun audit (high+)" >> "$GITHUB_STEP_SUMMARY"
          # Capture the exact exit code: 0 = clean, 1 = advisories found (npm/bun
          # convention), anything else = tool/network error. Distinguishing them
          # avoids a transient failure masquerading as a vulnerability alert.
          rc=0
          bun audit --audit-level=high > bun-audit.txt 2>&1 || rc=$?
          cat bun-audit.txt
          case "$rc" in
            0)
              echo "found=false" >> "$GITHUB_OUTPUT"
              echo "No high/critical advisories." >> "$GITHUB_STEP_SUMMARY"
              ;;
            1)
              echo "found=true" >> "$GITHUB_OUTPUT"
              { echo '```'; cat bun-audit.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              echo "found=false" >> "$GITHUB_OUTPUT"
              echo "::warning::bun audit exited $rc (tool error, not advisories)"
              { echo "> bun audit tool error (exit $rc):"; echo '```'; cat bun-audit.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

      - name: OSV-Scanner (lockfile)
        id: osv
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          # JSON output lets the evaluate step below tell real findings from a
          # tool/network error, instead of treating any non-zero exit as a hit.
          scan-args: |-
            --lockfile=bun.lock
            --format=json
            --output=osv-results.json

      - name: Trivy filesystem (vuln + misconfig + secret)
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # exit-code 0: the evaluate step decides findings by parsing the JSON,
          # so a Trivy crash doesn't masquerade as a finding. continue-on-error
          # is kept as a belt-and-braces guard. Report-only: never fails the job.
          exit-code: "0"
          format: json
          output: trivy-results.json

      - name: Evaluate scanner results
        id: eval
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          osv_found=false
          trivy_found=false

          # A finding is decided by the presence of entries in the result file —
          # not by step outcome — so transient OSV/Trivy errors don't alert.
          if jq -e '[.results[]?.packages[]?.vulnerabilities[]?] | length > 0' osv-results.json >/dev/null 2>&1; then
            osv_found=true
          elif [ "${{ steps.osv.outcome }}" = "failure" ]; then
            echo "::warning::OSV-Scanner failed without parseable findings (likely a tool error, not a vulnerability)"
          fi

          if jq -e '[.Results[]? | (.Vulnerabilities // [])[], (.Misconfigurations // [])[], (.Secrets // [])[]] | length > 0' trivy-results.json >/dev/null 2>&1; then
            trivy_found=true
          elif [ "${{ steps.trivy.outcome }}" = "failure" ]; then
            echo "::warning::Trivy failed without parseable findings (likely a tool error, not a finding)"
          fi

          echo "osv_found=$osv_found" >> "$GITHUB_OUTPUT"
          echo "trivy_found=$trivy_found" >> "$GITHUB_OUTPUT"
          echo "OSV findings: $osv_found · Trivy findings: $trivy_found" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-scan-results
          path: |
            bun-audit.txt
            osv-results.json
            trivy-results.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Build Slack payload
        id: notify_gate
        if: always() && env.SLACK_WEBHOOK_URL != '' && (steps.bun_audit.outputs.found == 'true' || steps.eval.outputs.osv_found == 'true' || steps.eval.outputs.trivy_found == 'true')
        shell: bash
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          jq -n --arg url "$run_url" \
            '{text: (":warning: *namefi-astra security scan found issues* — review " + $url)}' \
            > slack-payload.json

      - name: Notify Slack
        if: always() && steps.notify_gate.outcome == 'success'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ env.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: slack-payload.json
          errors: true
          retries: RAPID
