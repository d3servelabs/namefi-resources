name: Frontend Dev Benchmark

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_RELEASE_CHANNEL_URL }}

jobs:
  trigger-gate:
    name: Check Benchmark Trigger
    runs-on: ubuntu-latest
    outputs:
      needs_rate_limit: ${{ steps.check.outputs.needs_rate_limit }}
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Evaluate event
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            core.info(`Event name: ${context.eventName}`);
            core.info(`Event action: ${context.payload.action ?? ''}`);

            if (context.eventName === 'push') {
              core.info('Push to main detected; proceeding.');
              core.setOutput('needs_rate_limit', 'true');
              core.setOutput('should_run', 'true');
              return;
            }

            if (context.payload.action === 'labeled') {
              const labelName = context.payload.label?.name ?? '';
              core.info(`Label added: ${labelName}`);

              if (labelName === 'fe-benchmark') {
                core.info('fe-benchmark label added; proceeding.');
                core.setOutput('needs_rate_limit', 'false');
                core.setOutput('should_run', 'true');
              } else {
                core.info('Non-benchmark label added; skipping.');
                core.setOutput('needs_rate_limit', 'false');
                core.setOutput('should_run', 'false');
              }
              return;
            }

            const hasBenchmarkLabel = (context.payload.pull_request?.labels ?? []).some(
              label => label.name === 'fe-benchmark'
            );
            core.info(`PR has fe-benchmark label: ${hasBenchmarkLabel}`);
            core.setOutput('needs_rate_limit', 'false');
            core.setOutput('should_run', hasBenchmarkLabel ? 'true' : 'false');

  rate-limit:
    name: Check Rate Limit
    needs: trigger-gate
    if: needs.trigger-gate.outputs.should_run == 'true' && needs.trigger-gate.outputs.needs_rate_limit == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check recent workflow runs
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const workflowFile = 'frontend-dev-benchmark.yml';
            const currentRunId = context.runId;
            const now = Date.now();
            const oneHourAgo = new Date(now - 60 * 60 * 1000).toISOString();
            const twentyFourHoursAgo = new Date(now - 24 * 60 * 60 * 1000).toISOString();

            // Fetch completed and in-progress runs in the last 24 hours
            const [completedRes, inProgressRes] = await Promise.all([
              github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                branch: 'main',
                status: 'completed',
                per_page: 100,
                created: `>=${twentyFourHoursAgo}`,
              }),
              github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                branch: 'main',
                status: 'in_progress',
                per_page: 100,
                created: `>=${twentyFourHoursAgo}`,
              }),
            ]);

            const allRuns = [
              ...completedRes.data.workflow_runs,
              ...inProgressRes.data.workflow_runs,
            ].filter(run => run.id !== currentRunId);

            const lastHourCount = allRuns.filter(
              run => new Date(run.created_at) >= new Date(oneHourAgo)
            ).length;
            const last24hCount = allRuns.length;

            core.info(`Runs in last hour (excl. current): ${lastHourCount}`);
            core.info(`Runs in last 24h (excl. current): ${last24hCount}`);

            if (lastHourCount >= 1) {
              core.info('Skipping: workflow already ran in the last hour.');
              core.setOutput('should_skip', 'true');
            } else if (last24hCount >= 10) {
              core.info(`Skipping: workflow already ran ${last24hCount} times in the last 24 hours.`);
              core.setOutput('should_skip', 'true');
            } else {
              core.info('Rate limit OK - proceeding.');
              core.setOutput('should_skip', 'false');
            }

  benchmark:
    name: Run Frontend Dev Benchmark
    needs: [trigger-gate, rate-limit]
    if: |
      always() &&
      needs.trigger-gate.outputs.should_run == 'true' &&
      (
        needs.trigger-gate.outputs.needs_rate_limit != 'true' ||
        (
          needs.rate-limit.result == 'success' &&
          needs.rate-limit.outputs.should_skip != 'true'
        )
      )
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: |
          # required because infisical binary is not linked on the first run
          bun install
          bun install

      - name: Run dev benchmark
        env:
          INFISICAL_SERVICE_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
        run: |
          BENCH_REPORT="apps/frontend/.benchmarks/next-dev-bench-ci-${{ github.run_id }}.md"
          echo "BENCH_REPORT=$BENCH_REPORT" >> "$GITHUB_ENV"
          bun scripts/bench-frontend-dev.ts --runs 3 --log-dev-output --output "$BENCH_REPORT"

      - name: Post averages to Slack
        if: ${{ success() }}
        env:
          BENCH_REPORT: ${{ env.BENCH_REPORT }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          report_path = os.environ.get("BENCH_REPORT")
          if not report_path or not os.path.exists(report_path):
            raise SystemExit("Benchmark report missing")

          with open(report_path, "r", encoding="utf-8") as handle:
            lines = handle.read().splitlines()

          start_index = None
          for idx, line in enumerate(lines):
            if line.strip() == "## Averages":
              start_index = idx + 1
              break

          if start_index is None:
            raise SystemExit("Averages section not found")

          avg_lines = []
          for line in lines[start_index:]:
            if line.startswith("## "):
              break
            avg_lines.append(line)

          while avg_lines and avg_lines[0].strip() == "":
            avg_lines.pop(0)
          while avg_lines and avg_lines[-1].strip() == "":
            avg_lines.pop()

          avg_table = "\n".join(avg_lines).strip()

          header_columns = None
          rows = []
          if avg_table:
            for line in avg_table.splitlines():
              if not line.startswith("|"):
                continue
              if line.strip().startswith("| ---"):
                continue
              columns = [col.strip() for col in line.split("|") if col.strip()]
              if not columns:
                continue
              if columns[0].lower() == "route":
                header_columns = columns
                continue
              rows.append(columns)

          cold_headers = (
            header_columns[1:4]
            if header_columns and len(header_columns) >= 4
            else ["Cold total", "Cold Next.js", "Cold Application code"]
          )
          hot_headers = (
            header_columns[4:7]
            if header_columns and len(header_columns) >= 7
            else ["Hot total", "Hot Next.js", "Hot Application code"]
          )

          runs = ""
          for line in lines:
            if line.strip().startswith("- Runs:"):
              runs = line.split(":", 1)[-1].strip()
              break

          machine = {}
          machine_start = None
          for idx, line in enumerate(lines):
            if line.strip() == "## Machine":
              machine_start = idx + 1
              break
          if machine_start is not None:
            for line in lines[machine_start:]:
              if line.startswith("## "):
                break
              if not line.strip().startswith("- "):
                continue
              key, _, value = line[2:].partition(":")
              if key and value:
                machine[key.strip()] = value.strip()

          full_sha = os.environ.get("GITHUB_SHA", "")
          sha = full_sha[:7]
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          server_url = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_url = os.environ.get("PR_URL", "")
          head_ref = os.environ.get("HEAD_REF", "")
          run_url = f"{server_url}/{repo}/actions/runs/{run_id}" if repo and run_id else ""

          if event_name == "pull_request" and pr_number:
            header = f"Frontend dev benchmark (PR #{pr_number})"
          else:
            header = "Frontend dev benchmark (main)"

          meta_bits = []
          if repo:
            repo_url = f"{server_url}/{repo}"
            meta_bits.append(f"*Repo:* <{repo_url}|{repo}>")
          if pr_number:
            if pr_url:
              meta_bits.append(f"*PR:* <{pr_url}|#{pr_number}>")
            else:
              meta_bits.append(f"*PR:* #{pr_number}")
          if head_ref and event_name == "pull_request":
            meta_bits.append(f"*Branch:* `{head_ref}`")
          if runs:
            meta_bits.append(f"*Runs:* {runs}")
          if sha:
            if full_sha and repo:
              commit_url = f"{server_url}/{repo}/commit/{full_sha}"
              meta_bits.append(f"*Commit:* <{commit_url}|{sha}>")
            else:
              meta_bits.append(f"*Commit:* {sha}")
          if run_url:
            meta_bits.append(f"*Run:* <{run_url}|View run>")

          blocks = [
            {"type": "section", "text": {"type": "mrkdwn", "text": f"*{header}*"}},
          ]
          if meta_bits:
            blocks.append(
              {
                "type": "context",
                "elements": [{"type": "mrkdwn", "text": " • ".join(meta_bits)}],
              }
            )
          cpu_bits = []
          if machine.get("CPU"):
            cpu_bits.append(f"*CPU:* {machine['CPU']}")
          if machine.get("Cores"):
            cpu_bits.append(f"*Cores:* {machine['Cores']}")
          if machine.get("RAM"):
            cpu_bits.append(f"*RAM:* {machine['RAM']}")
          if cpu_bits:
            blocks.append(
              {
                "type": "context",
                "elements": [{"type": "mrkdwn", "text": " • ".join(cpu_bits)}],
              }
            )
          if rows:
            blocks.append({"type": "divider"})
            blocks.append(
              {"type": "section", "text": {"type": "mrkdwn", "text": "*Averages*"}}
            )
            for row in rows:
              padded = row + ["n/a"] * (7 - len(row))
              cold = f"{padded[1]} | {padded[2]} | {padded[3]}"
              hot = f"{padded[4]} | {padded[5]} | {padded[6]}"
              blocks.append(
                {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": f"*Route:* {padded[0]}"},
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": f"*{' | '.join(cold_headers)}*\n{cold}",
                    },
                    {
                      "type": "mrkdwn",
                      "text": f"*{' | '.join(hot_headers)}*\n{hot}",
                    },
                  ],
                }
              )

          payload = json.dumps({"text": header, "blocks": blocks})
          webhook = os.environ.get("SLACK_WEBHOOK_URL")
          if not webhook:
            print("SLACK_WEBHOOK_URL not configured, skipping notification")
            raise SystemExit(0)

          req = urllib.request.Request(
            webhook,
            data=payload.encode("utf-8"),
            headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req) as response:
            response.read()
          PY
