name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches-ignore:
      - prod
    paths-ignore:
      - apps/resources/data

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Detect which apps changed using Turbo
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: "blacksmith-4vcpu-ubuntu-2204"
    outputs:
      park: ${{ steps.check.outputs.park }}
      frontend: ${{ steps.check.outputs.frontend }}
      api-client-docs: ${{ steps.check.outputs.api-client-docs }}
      resources: ${{ steps.check.outputs.resources }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect Turbo changes
        id: turbo-changes
        uses: ./.github/actions/detect-turbo-changes
        with:
          filter: "...[origin/${{ github.base_ref }}]"

      - name: Check which apps changed
        id: check
        run: |
          CHANGED='${{ steps.turbo-changes.outputs.changed-packages }}'
          echo "Changed packages: $CHANGED"

          check_package() {
            local pkg="$1"
            local output_name="$2"
            if echo "$CHANGED" | jq -e --arg p "$pkg" 'fromjson | index($p)' > /dev/null 2>&1; then
              echo "$output_name=true" >> "$GITHUB_OUTPUT"
              echo "$output_name ($pkg): will deploy"
            else
              echo "$output_name=false" >> "$GITHUB_OUTPUT"
              echo "$output_name ($pkg): skipped"
            fi
          }

          check_package "@namefi-astra/park"      "park"
          check_package "@namefi-astra/frontend"   "frontend"
          check_package "api-client-docs"           "api-client-docs"
          check_package "@namefi-astra/resources"   "resources"

  # ---------------------------------------------------------------------------
  # 2. Preview deploy – apps/park
  # ---------------------------------------------------------------------------
  preview-park:
    name: "Preview: park"
    needs: detect-changes
    if: needs.detect-changes.outputs.park == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Park preview deployed: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PARK_PROJECT_ID }}

      - name: Comment preview URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const body = `**Preview: park** deployed to: ${process.env.DEPLOY_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Preview: park**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # 3. Preview deploy – apps/frontend
  # ---------------------------------------------------------------------------
  preview-frontend:
    name: "Preview: frontend"
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Frontend preview deployed: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PROJECT_ID }}

      - name: Comment preview URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const body = `**Preview: frontend** deployed to: ${process.env.DEPLOY_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Preview: frontend**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # 4. Preview deploy – apps/api-client-docs
  # ---------------------------------------------------------------------------
  preview-api-client-docs:
    name: "Preview: api-client-docs"
    needs: detect-changes
    if: needs.detect-changes.outputs.api-client-docs == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "API Client Docs preview deployed: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_API_CLIENT_DOCS_PROJECT_ID }}

      - name: Comment preview URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const body = `**Preview: api-client-docs** deployed to: ${process.env.DEPLOY_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Preview: api-client-docs**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # 5. Preview deploy – apps/resources
  # ---------------------------------------------------------------------------
  preview-resources:
    name: "Preview: resources"
    needs: detect-changes
    if: needs.detect-changes.outputs.resources == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }})
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Resources preview deployed: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_RESOURCES_PROJECT_ID }}

      - name: Comment preview URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const body = `**Preview: resources** deployed to: ${process.env.DEPLOY_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Preview: resources**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # 6. Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Preview Deploy Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [detect-changes, preview-park, preview-frontend, preview-api-client-docs, preview-resources]
    steps:
      - name: Generate summary
        run: |
          echo "## Preview Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Changes Detected | Deploy Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-----------------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| park | ${{ needs.detect-changes.outputs.park }} | ${{ needs.preview-park.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | ${{ needs.detect-changes.outputs.frontend }} | ${{ needs.preview-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| api-client-docs | ${{ needs.detect-changes.outputs.api-client-docs }} | ${{ needs.preview-api-client-docs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| resources | ${{ needs.detect-changes.outputs.resources }} | ${{ needs.preview-resources.result }} |" >> $GITHUB_STEP_SUMMARY
