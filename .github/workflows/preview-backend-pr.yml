name: Preview Backend (PR)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches-ignore:
    - prod
    - gtmq_spec_* # GraphiteMergeQueue
    - "*_nopreview_*"
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy preview for'
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPO_NAME: ${{ vars.REPOSITORY_NAME }}

jobs:
  preview-label-gate:
    name: Check Preview Label
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check-label.outputs.should_run }}
      is_force_preview: ${{ steps.check-label.outputs.is_force_preview }}
      pr_number: ${{ steps.check-label.outputs.pr_number }}
      head_sha: ${{ steps.check-label.outputs.head_sha }}
      base_sha: ${{ steps.check-label.outputs.base_sha }}
      head_ref: ${{ steps.check-label.outputs.head_ref }}
    steps:
      - name: Check preview label
        id: check-label
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"
          EVENT_ACTION="${{ github.event.action }}"

          echo "Event name: $EVENT_NAME"
          echo "Event action: $EVENT_ACTION"

          # For workflow_dispatch, fetch PR details using the provided PR number
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            echo "Workflow dispatch triggered for PR #$PR_NUMBER"

            # Fetch PR details using GitHub API
            PR_DATA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '{head_sha: .head.sha, base_sha: .base.sha, head_ref: .head.ref}')
            HEAD_SHA=$(echo "$PR_DATA" | jq -r '.head_sha')
            BASE_SHA=$(echo "$PR_DATA" | jq -r '.base_sha')
            HEAD_REF=$(echo "$PR_DATA" | jq -r '.head_ref')

            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
            echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "is_force_preview=true" >> "$GITHUB_OUTPUT"
            echo "Workflow dispatch - proceeding with deployment (force preview)"
            exit 0
          fi

          # For pull_request events
          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

          # For labeled events, check if the label added is 'preview' or 'force-preview'
          if [[ "$EVENT_ACTION" == "labeled" ]]; then
            LABEL_NAME="${{ github.event.label.name }}"
            echo "Label added: $LABEL_NAME"
            if [[ "$LABEL_NAME" == "force-preview" ]]; then
              echo "Force-preview label added - proceeding with forced deployment"
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "is_force_preview=true" >> "$GITHUB_OUTPUT"
            elif [[ "$LABEL_NAME" == "preview" ]]; then
              echo "Preview label added - proceeding with deployment"
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "is_force_preview=false" >> "$GITHUB_OUTPUT"
            else
              echo "Non-preview label added - skipping"
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "is_force_preview=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # For other events (opened, synchronize, reopened), check if PR has 'preview' or 'force-preview' label
          HAS_FORCE_PREVIEW_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'force-preview') }}"
          HAS_PREVIEW_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'preview') }}"
          echo "PR has force-preview label: $HAS_FORCE_PREVIEW_LABEL"
          echo "PR has preview label: $HAS_PREVIEW_LABEL"

          if [[ "$HAS_FORCE_PREVIEW_LABEL" == "true" ]]; then
            echo "PR has force-preview label - proceeding with forced deployment"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "is_force_preview=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HAS_PREVIEW_LABEL" == "true" ]]; then
            echo "PR has preview label - proceeding"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "is_force_preview=false" >> "$GITHUB_OUTPUT"
          else
            echo "PR does not have preview or force-preview label - skipping"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "is_force_preview=false" >> "$GITHUB_OUTPUT"
          fi

  head-branch-gate:
    name: Check Head Branch Ignore Rules
    needs: preview-label-gate
    timeout-minutes: 2
    if: needs.preview-label-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Evaluate head branch
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          HEAD_REF="${{ needs.preview-label-gate.outputs.head_ref }}"

          case "$HEAD_REF" in
            prod|gtmq_spec_*|*_nopreview_*)
              echo "Head branch '$HEAD_REF' matches ignore rules; skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Head branch '$HEAD_REF' allowed; continuing."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  detect-synchronize-type:
    name: Detect Synchronize Event Type
    needs: [preview-label-gate, head-branch-gate]
    if: needs.head-branch-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      is_new_commit: ${{ steps.detect-type.outputs.is_new_commit }}
      is_force_push: ${{ steps.detect-type.outputs.is_force_push }}
      comparison_sha: ${{ steps.detect-type.outputs.comparison_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 32

      - name: Detect synchronize event type
        id: detect-type
        shell: bash
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"
          EVENT_ACTION="${{ github.event.action }}"
          BEFORE_SHA="${{ github.event.before }}"
          # Use base_sha from preview-label-gate (supports both PR events and workflow_dispatch)
          BASE_SHA="${{ needs.preview-label-gate.outputs.base_sha }}"

          echo "Event name: $EVENT_NAME"
          echo "Event action: $EVENT_ACTION"
          echo "Before SHA: $BEFORE_SHA"
          echo "Base SHA: $BASE_SHA"

          # For workflow_dispatch or labeled events, always compare against base SHA
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_ACTION" == "labeled" ]]; then
            echo "Event type: $EVENT_NAME/$EVENT_ACTION - will compare against base SHA"
            echo "is_new_commit=false" >> "$GITHUB_OUTPUT"
            echo "is_force_push=false" >> "$GITHUB_OUTPUT"
            echo "comparison_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For synchronize events, determine if it's a new commit or force push
          # New commit: before SHA exists, is different from base SHA, and the commit exists in the repo
          # Force push: before SHA is empty, equals base SHA, is all zeros, or the commit doesn't exist
          #
          # The comparison_sha is the SHA to compare against for turbo detection:
          # - New commit: compare against before SHA (incremental change detection)
          # - Force push / opened / reopened: compare against base SHA (full change detection)

          # Check if before SHA is valid and the commit exists in the repository
          BEFORE_SHA_EXISTS="false"
          if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
              BEFORE_SHA_EXISTS="true"
              echo "Before SHA commit exists in repository"
            else
              echo "Before SHA commit does NOT exist in repository (likely force-pushed away)"
            fi
          fi

          if [[ "$EVENT_ACTION" == "synchronize" && "$BEFORE_SHA_EXISTS" == "true" && "$BEFORE_SHA" != "$BASE_SHA" ]]; then
            echo "Synchronize event detected as NEW COMMIT - will compare against before SHA"
            echo "is_new_commit=true" >> "$GITHUB_OUTPUT"
            echo "is_force_push=false" >> "$GITHUB_OUTPUT"
            echo "comparison_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          else
            if [[ "$EVENT_ACTION" == "synchronize" ]]; then
              echo "Synchronize event detected as FORCE PUSH - will compare against base SHA"
              echo "is_force_push=true" >> "$GITHUB_OUTPUT"
            else
              echo "Event type: $EVENT_ACTION - will compare against base SHA"
              echo "is_force_push=false" >> "$GITHUB_OUTPUT"
            fi
            echo "is_new_commit=false" >> "$GITHUB_OUTPUT"
            echo "comparison_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          fi

  detect-changes:
    name: Detect Backend Changes
    timeout-minutes: 2
    needs: [preview-label-gate, head-branch-gate, detect-synchronize-type]
    if: needs.head-branch-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      has-backend-changes: ${{ steps.check.outputs.has-backend-changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 32

      - name: Detect Turbo changes
        id: turbo-changes
        if: needs.preview-label-gate.outputs.is_force_preview != 'true'
        uses: ./.github/actions/detect-turbo-changes
        with:
          filter: "...[${{ needs.detect-synchronize-type.outputs.comparison_sha }}]"

      - name: Check backend changes
        id: check
        run: |
          IS_FORCE_PREVIEW="${{ needs.preview-label-gate.outputs.is_force_preview }}"
          COMPARISON_SHA="${{ needs.detect-synchronize-type.outputs.comparison_sha }}"
          IS_NEW_COMMIT="${{ needs.detect-synchronize-type.outputs.is_new_commit }}"

          echo "Is force preview: $IS_FORCE_PREVIEW"
          echo "Comparing against SHA: $COMPARISON_SHA"
          echo "Is new commit: $IS_NEW_COMMIT"

          # Force preview skips turbo detection and always deploys
          if [[ "$IS_FORCE_PREVIEW" == "true" ]]; then
            echo "Force preview enabled - skipping turbo detection, will deploy"
            echo "has-backend-changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          HAS_BACKEND_CHANGES="${{ contains(fromJSON(steps.turbo-changes.outputs.changed-packages), '@namefi-astra/backend' ) }}"

          echo "has-backend-changes=$HAS_BACKEND_CHANGES" >> $GITHUB_OUTPUT
          if [[ "$HAS_BACKEND_CHANGES" == "true" ]]; then
            echo "Backend changes detected - will proceed with deployment"
          else
            echo "No backend changes detected - will skip deployment"
          fi

  build-backend:
    name: Build Backend Container
    needs: detect-changes
    if: needs.detect-changes.outputs.has-backend-changes == 'true'
    runs-on: "blacksmith-8vcpu-ubuntu-2404"
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
      image_digest: ${{ steps.resolve-digest.outputs.image_digest }}
      new_image: ${{ steps.resolve-digest.outputs.new_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set Docker tag
        id: set-tag
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api:${{ github.sha }}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Check if Docker image exists
        id: check-image
        run: |
          {
            IMAGE_TAG="${{ steps.set-tag.outputs.image_tag }}"
            IMAGE_DETAILS="$(gcloud artifacts docker images describe "$IMAGE_TAG" --format="json" 2>/dev/null)"
            DIGEST="$(echo "$IMAGE_DETAILS" | jq .image_summary.digest)"
            if [[ -n "$DIGEST" && "$DIGEST" != "null" ]]; then
              echo "Image already exists: $IMAGE_TAG"
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "Image does not exist: $IMAGE_TAG"
              echo "exists=false" >> $GITHUB_OUTPUT
            fi
          } || {
            echo "Failed to check image: $IMAGE_TAG"
            echo "exists=false" >> $GITHUB_OUTPUT
          }

      - name: Set up Docker Buildx
        if: steps.check-image.outputs.exists != 'true'
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build and Push Container
        if: steps.check-image.outputs.exists != 'true'
        uses: useblacksmith/build-push-action@v2
        with:
          tags: ${{ steps.set-tag.outputs.image_tag }}
          push: true
          context: .
          file: ./apps/backend/Dockerfile

      - name: Resolve image digest
        id: resolve-digest
        run: |
          IMAGE_TAG="${{ steps.set-tag.outputs.image_tag }}"
          IMAGE_BASE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.REPO_NAME }}/namefi-astra-api"
          DIGEST="$(gcloud artifacts docker images describe "$IMAGE_TAG" --format="value(image_summary.digest)")"
          if [[ -z "$DIGEST" ]]; then
            echo "Failed to resolve digest for $IMAGE_TAG"
            exit 1
          fi
          NEW_IMAGE="${IMAGE_BASE}@${DIGEST}"
          echo "image_digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "new_image=$NEW_IMAGE" >> $GITHUB_OUTPUT

  prepare-database:
    name: Prepare Neon Branch
    timeout-minutes: 5
    needs: [preview-label-gate, detect-changes]
    if: needs.detect-changes.outputs.has-backend-changes == 'true'
    runs-on: "blacksmith-4vcpu-ubuntu-2404"
    outputs:
      branch_id: ${{ steps.branch-name.outputs.branch_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 32

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install

      - name: Set Neon branch name
        id: branch-name
        run: echo "branch_id=pr-${{ needs.preview-label-gate.outputs.pr_number }}" >> $GITHUB_OUTPUT

      - name: Create Neon branch
        run: |
          BRANCH_ID="${{ steps.branch-name.outputs.branch_id }}"
          EXISTING_BRANCH=$(bun run neonctl branches list --project-id ${{ secrets.NEON_PROJECT_ID }} --api-key ${{ secrets.NEON_API_KEY }} | grep -w "$BRANCH_ID" || true)
          if [ ! -z "$EXISTING_BRANCH" ]; then
            bun run neonctl branches delete "$BRANCH_ID" --project-id ${{ secrets.NEON_PROJECT_ID }} --api-key ${{ secrets.NEON_API_KEY }} --force
          fi
          bun run neonctl branches create --name "$BRANCH_ID" --project-id ${{ secrets.NEON_PROJECT_ID }} --api-key ${{ secrets.NEON_API_KEY }}

      - name: Check for SQL migration changes
        id: check-sql-changes
        run: |
          SQL_FILES=$(git diff --name-only ${{ needs.preview-label-gate.outputs.base_sha }} ${{ github.sha }} | grep -E '\.sql$' || true)
          if [[ -n "$SQL_FILES" ]]; then
            echo "SQL files changed in this diff:"
            echo "$SQL_FILES"
            echo "has_sql_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No SQL files changed, skipping migrations"
            echo "has_sql_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Get connection string for PR branch
        id: connection-string
        run: |
          CS=$(bun run neonctl connection-string --role-name neondb_owner --branch "${{ steps.branch-name.outputs.branch_id }}" --project-id ${{ secrets.NEON_PROJECT_ID }} --api-key ${{ secrets.NEON_API_KEY }})
          echo "database_url=$CS" >> $GITHUB_OUTPUT

      - name: Run migrations on PR branch
        if: steps.check-sql-changes.outputs.has_sql_changes == 'true'
        working-directory: ./packages/db
        env:
          DATABASE_URL: ${{ steps.connection-string.outputs.database_url }}
        run: |
          echo "Running migrations on branch: ${{ steps.branch-name.outputs.branch_id }}"
          bun db:migrate

  deploy-preview:
    name: Deploy Backend Preview
    needs: [preview-label-gate, detect-changes, build-backend, prepare-database]
    if: needs.detect-changes.outputs.has-backend-changes == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
    outputs:
      revision_tag_url: ${{ steps.tagged-url.outputs.revision_tag_url }}
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Neon CLI
        run: bun add --global neonctl@latest

      - name: Get connection string for PR branch
        id: connection-string
        run: |
          CS=$(bun run neonctl connection-string --role-name neondb_owner --branch "${{ needs.prepare-database.outputs.branch_id }}" --project-id ${{ secrets.NEON_PROJECT_ID }} --api-key ${{ secrets.NEON_API_KEY }})
          echo "database_url=$CS"
          echo "database_url=$CS" >> $GITHUB_OUTPUT

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          install_components: "beta"

      # - name: Remove existing tagged revision (manual)
      #   run: |
      #     TAG="pr-${{ needs.preview-label-gate.outputs.pr_number }}"
      #     gcloud run services update-traffic namefi-astra-backend-preview --region "${{ env.REGION }}" --project "${{ env.PROJECT_ID }}" --remove-tags "$TAG" --quiet
      #     REVISION_NAME=$(gcloud run services describe namefi-astra-backend-preview --region "${{ env.REGION }}" --project "${{ env.PROJECT_ID }}" --format="value(status.traffic[?tag='$TAG'].revisionName)")
      #     if [[ -n "$REVISION_NAME" ]]; then
      #       gcloud run revisions delete "$REVISION_NAME" --region "${{ env.REGION }}" --project "${{ env.PROJECT_ID }}" --quiet
      #     fi

      - name: Deploy preview revision
        id: deploy
        env:
          NEW_IMAGE: ${{ needs.build-backend.outputs.new_image }}
          DATABASE_URL: ${{ steps.connection-string.outputs.database_url }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_DEV_SERVICE_TOKEN }}
          GCP_HSM_KEYRING_RESOURCE_NAME: ${{ secrets.GCP_HSM_KEYRING_RESOURCE_NAME }}
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
        run: |
          # --quiet flag seems to be not working
          gcloud config set core/disable_prompts True
          gcloud beta config set core/disable_prompts True

          echo "NEW_IMAGE=\"$NEW_IMAGE\""
          echo "DATABASE_URL=\"$DATABASE_URL\""
          echo "INFISICAL_TOKEN=\"$INFISICAL_TOKEN\""
          echo "GCP_HSM_KEYRING_RESOURCE_NAME=\"$GCP_HSM_KEYRING_RESOURCE_NAME\""

          TAG="pr-$PR_NUMBER"
          SHORT_SHA="${GITHUB_SHA::7}"
          REVISION_SUFFIX="pr-$PR_NUMBER-$SHORT_SHA"
          gcloud beta run deploy namefi-astra-backend-preview \
            --container "gate-proxy" \
            --image "us-central1-docker.pkg.dev/d3serve-labs/cloud-run-source-deploy/namefi-astra/preview-ngnix-proxy:latest" \
            --port='80' --no-traffic \
            --container "temporal" \
            --image "us-central1-docker.pkg.dev/d3serve-labs/cloud-run-source-deploy/temporalio/temporal:1.5.1" \
            --args="server,start-dev,--ip,0.0.0.0" \
            --container "api" \
            --image "$NEW_IMAGE" \
            --set-env-vars="MANAGED_NFT_INDEX=true,DATABASE_URL=$DATABASE_URL,ENVIRONMENT=preview,INFISICAL_TOKEN=$INFISICAL_TOKEN,GCP_HSM_KEYRING_RESOURCE_NAME=$GCP_HSM_KEYRING_RESOURCE_NAME" \
            --container "workers" \
            --image "$NEW_IMAGE" \
            --set-env-vars="MANAGED_NFT_INDEX=true,DATABASE_URL=$DATABASE_URL,ENVIRONMENT=preview,INFISICAL_TOKEN=$INFISICAL_TOKEN,GCP_HSM_KEYRING_RESOURCE_NAME=$GCP_HSM_KEYRING_RESOURCE_NAME" \
            --revision-suffix "$REVISION_SUFFIX" \
            --no-traffic \
            --tag "$TAG" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --quiet --async
            RETURN_CODE=$?

            if [[ $RETURN_CODE -ne 0 ]]; then
              echo "Deployment failed"
              exit 1
            fi

            REVISION_NAME="namefi-astra-backend-preview-$REVISION_SUFFIX"

            while true; do
              READY_CONDITION=$(gcloud run revisions describe "$REVISION_NAME" --project "${{ env.PROJECT_ID }}" --region "${{ env.REGION }}" --format='json' | jq -r '.status.conditions[] | select(.type == "Ready")')
              READY_STATUS=$(echo "$READY_CONDITION" | jq -r '.status')
              READY_REASON=$(echo "$READY_CONDITION" | jq -r '.reason // empty')
              READY_MESSAGE=$(echo "$READY_CONDITION" | jq -r '.message // empty')

              if [[ "$READY_STATUS" == "True" ]]; then
                echo "Revision is ready!"
                break
              elif [[ "$READY_STATUS" == "False" ]]; then
                echo "Revision deployment failed!"
                echo "Reason: $READY_REASON"
                echo "Message: $READY_MESSAGE"
                exit 1
              else
                echo "Waiting for revision to be ready... (status: $READY_STATUS)"
                sleep 5
              fi
            done

      - name: Get tagged URL
        id: tagged-url
        env:
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
        run: |
          TAG="pr-$PR_NUMBER"
          REVISION_TAG_URL=$(gcloud run services describe namefi-astra-backend-preview --region "${{ env.REGION }}" --project "${{ env.PROJECT_ID }}" --format="json" | jq -r ".status.traffic.[] | select(.tag == \"$TAG\") | .url" )
          if [[ -z "$REVISION_TAG_URL" ]]; then
            echo "Failed to resolve tagged URL for $TAG"
            exit 1
          fi
          echo "revision_tag_url=$REVISION_TAG_URL" >> $GITHUB_OUTPUT

      - name: Comment revision URL on PR
        if: steps.tagged-url.outputs.revision_tag_url != ''
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
          REVISION_TAG_URL: ${{ steps.tagged-url.outputs.revision_tag_url }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const revisionUrl = process.env.REVISION_TAG_URL;
            const marker = '<!-- preview-backend-revision-url -->';

            if (!prNumber || !revisionUrl) {
              core.warning('Missing PR number or revision URL; skipping PR comment.');
              return;
            }

            const body = [
              marker,
              '## Backend Preview Deployed ✅',
              '',
              '<table>',
              '  <tr><td><strong>Service</strong></td><td>namefi-astra-backend-preview</td></tr>',
              `  <tr><td><strong>Revision URL</strong></td><td><a href="${revisionUrl}">Open backend preview</a></td></tr>`,
              `  <tr><td><strong>Control Center URL</strong></td><td><a href="${revisionUrl}?namefi_dev_mode_control=1">Open control center</a></td></tr>`,
              '</table>',
            ].join('\n');
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              });

              const existingComment = comments.find(
                (comment) =>
                  comment.user?.login === 'github-actions[bot]' &&
                  comment.body?.includes(marker)
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body,
                });
                core.info(`Updated backend preview comment on PR #${prNumber}`);
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
                core.info(`Created backend preview comment on PR #${prNumber}`);
              }
            }catch(error){
              core.error('Could not comment URL');

            }

  redeploy-vercel-preview:
    name: Redeploy Vercel Preview
    timeout-minutes: 10
    needs: [preview-label-gate, deploy-preview]
    if: needs.detect-changes.outputs.has-backend-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - name: Install Vercel CLI
        run: bun add --global vercel@latest
      - name: Update Vercel preview env
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PROJECT_ID }}
        run: |
          REVISION_TAG_URL="${{ needs.deploy-preview.outputs.revision_tag_url }}"
          BRANCH_NAME="${{ needs.preview-label-gate.outputs.head_ref }}"
          printf "%s" "$REVISION_TAG_URL" | vercel env add BACKEND_URL --force preview "$BRANCH_NAME" --scope="$VERCEL_ORG_ID" --token="${{ secrets.VERCEL_ACCOUNT_TOKEN }}"

      - name: Deploy Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_PROJECT_ID }}
        run: |
          # options from meta githubCommitRef, githubCommitSha
          DEPLOYMENT_URL="$(vercel ls --scope="$VERCEL_ORG_ID" --token="${{ secrets.VERCEL_ACCOUNT_TOKEN }}" -m githubCommitSha=${{ needs.preview-label-gate.outputs.head_sha }} --no-color --environment=preview 2>&1 | tail -1)"
          vercel redeploy --no-wait --scope="$VERCEL_ORG_ID" --token="${{ secrets.VERCEL_ACCOUNT_TOKEN }}" "$DEPLOYMENT_URL"

  workflow-summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [preview-label-gate, head-branch-gate, detect-synchronize-type, detect-changes, build-backend, prepare-database, deploy-preview, redeploy-vercel-preview]
    steps:
      - name: Generate workflow summary
        env:
          # Gate outputs
          SHOULD_RUN: ${{ needs.preview-label-gate.outputs.should_run }}
          IS_FORCE_PREVIEW: ${{ needs.preview-label-gate.outputs.is_force_preview }}
          PR_NUMBER: ${{ needs.preview-label-gate.outputs.pr_number }}
          HEAD_REF: ${{ needs.preview-label-gate.outputs.head_ref }}
          HEAD_BRANCH_ALLOWED: ${{ needs.head-branch-gate.outputs.should_run }}
          # Synchronize type outputs
          IS_NEW_COMMIT: ${{ needs.detect-synchronize-type.outputs.is_new_commit }}
          IS_FORCE_PUSH: ${{ needs.detect-synchronize-type.outputs.is_force_push }}
          COMPARISON_SHA: ${{ needs.detect-synchronize-type.outputs.comparison_sha }}
          # Change detection outputs
          HAS_BACKEND_CHANGES: ${{ needs.detect-changes.outputs.has-backend-changes }}
          # Deploy outputs
          REVISION_TAG_URL: ${{ needs.deploy-preview.outputs.revision_tag_url }}
          # Job results
          PREVIEW_LABEL_GATE_RESULT: ${{ needs.preview-label-gate.result }}
          HEAD_BRANCH_GATE_RESULT: ${{ needs.head-branch-gate.result }}
          DETECT_SYNC_TYPE_RESULT: ${{ needs.detect-synchronize-type.result }}
          DETECT_CHANGES_RESULT: ${{ needs.detect-changes.result }}
          BUILD_BACKEND_RESULT: ${{ needs.build-backend.result }}
          PREPARE_DATABASE_RESULT: ${{ needs.prepare-database.result }}
          DEPLOY_PREVIEW_RESULT: ${{ needs.deploy-preview.result }}
          REDEPLOY_VERCEL_RESULT: ${{ needs.redeploy-vercel-preview.result }}
        run: |
          set -euo pipefail

          echo "## Preview Backend Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build Summary Table
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preview Label Gate | $PREVIEW_LABEL_GATE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Head Branch Gate | $HEAD_BRANCH_GATE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Synchronize Type | $DETECT_SYNC_TYPE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Changes | $DETECT_CHANGES_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Backend | $BUILD_BACKEND_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Prepare Database | $PREPARE_DATABASE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Preview | $DEPLOY_PREVIEW_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Redeploy Vercel | $REDEPLOY_VERCEL_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Output Justification
          echo "### Deployment Justification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine why deployment happened or didn't happen
          if [[ "$SHOULD_RUN" != "true" ]]; then
            echo "**Deployment skipped**: PR does not have \`preview\` or \`force-preview\` label." >> $GITHUB_STEP_SUMMARY
          elif [[ "$HEAD_BRANCH_ALLOWED" != "true" ]]; then
            echo "**Deployment skipped**: Head branch \`$HEAD_REF\` matches ignore rules (prod, gtmq_spec_*, *_nopreview_*)." >> $GITHUB_STEP_SUMMARY
          elif [[ "$IS_FORCE_PREVIEW" == "true" ]]; then
            echo "**Deployment triggered**: Force preview enabled (via \`force-preview\` label or workflow_dispatch)." >> $GITHUB_STEP_SUMMARY
            echo "- Turbo change detection was **skipped**" >> $GITHUB_STEP_SUMMARY
            echo "- Deployment proceeds regardless of backend changes" >> $GITHUB_STEP_SUMMARY
          elif [[ "$HAS_BACKEND_CHANGES" == "true" ]]; then
            echo "**Deployment triggered**: Backend changes detected." >> $GITHUB_STEP_SUMMARY
            if [[ "$IS_NEW_COMMIT" == "true" ]]; then
              echo "- Event type: **New commit** (incremental change detection)" >> $GITHUB_STEP_SUMMARY
              echo "- Compared against: before SHA (\`$COMPARISON_SHA\`)" >> $GITHUB_STEP_SUMMARY
            elif [[ "$IS_FORCE_PUSH" == "true" ]]; then
              echo "- Event type: **Force push** (full change detection)" >> $GITHUB_STEP_SUMMARY
              echo "- Compared against: base SHA (\`$COMPARISON_SHA\`)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Event type: **PR opened/reopened/labeled** (full change detection)" >> $GITHUB_STEP_SUMMARY
              echo "- Compared against: base SHA (\`$COMPARISON_SHA\`)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Deployment skipped**: No backend changes detected." >> $GITHUB_STEP_SUMMARY
            if [[ "$IS_NEW_COMMIT" == "true" ]]; then
              echo "- Event type: **New commit** (incremental change detection)" >> $GITHUB_STEP_SUMMARY
              echo "- Compared against: before SHA (\`$COMPARISON_SHA\`)" >> $GITHUB_STEP_SUMMARY
            elif [[ "$IS_FORCE_PUSH" == "true" ]]; then
              echo "- Event type: **Force push** (full change detection)" >> $GITHUB_STEP_SUMMARY
              echo "- Compared against: base SHA (\`$COMPARISON_SHA\`)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Event type: **PR opened/reopened/labeled** (full change detection)" >> $GITHUB_STEP_SUMMARY
              echo "- Compared against: base SHA (\`$COMPARISON_SHA\`)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- Turbo detected no changes to \`@namefi-astra/backend\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Preview URL if deployed
          if [[ -n "$REVISION_TAG_URL" && "$REVISION_TAG_URL" != "" ]]; then
            echo "### Preview URL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Backend preview deployed at: $REVISION_TAG_URL" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_PR #$PR_NUMBER | Branch: \`$HEAD_REF\`_" >> $GITHUB_STEP_SUMMARY
