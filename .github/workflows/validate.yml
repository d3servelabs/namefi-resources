name: Validate

on:
  pull_request:
    branches-ignore:
      - prod
    paths-ignore:
      - apps/resources/data

env:
  ENVIRONMENT: test
  NODE_OPTIONS: --max-old-space-size=8192
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TYPECHECK_CONCURRENCY: 8
  TURBO_CHECKERROR_CONCURRENCY: 8

jobs:
  validate:
    runs-on: "blacksmith-8vcpu-ubuntu-2404"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: |
          # required because infisical binary is not linked on the first run
          bun install
          bun install

      - name: Run validation of secrets
        run: bun validate:secrets
        env:
          INFISICAL_SERVICE_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}

      - name: Run validation
        run: bun validate
