name: Validate Content

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate data
        run: bun data:validate

      - name: Test internal link checker
        run: bun links:test

      - name: Lint MDX
        run: bun lint:mdx

      # Audits every internal link across all discovered locales. Real 404s,
      # bare routes, wrong-locale prefixes, and translated relationship
      # substitutions are blocking; a missing translation remains an accepted
      # runtime-fallback warning.
      - name: Audit internal links
        run: bun links:audit
