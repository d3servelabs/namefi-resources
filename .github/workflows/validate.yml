name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches-ignore:
      - prod

env:
  ENVIRONMENT: test 
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: |
          # Intentional double install to ensure the infisical bin is linked
          bun install
          bun install

      - name: Run validation of secrets
        run: bun validate:secrets
        env:
          INFISICAL_SERVICE_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}

      - name: Run validation
        run: bun validate
