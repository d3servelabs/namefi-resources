name: Validate Content

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate data
        run: bun data:validate

      - name: Lint MDX
        run: bun lint:mdx

      # Audits every internal link across all locales: fails on a real 404
      # (BROKEN) or a bare link missing its locale prefix (MISSING_LOCALE).
      # Wrong-locale/missing-translation findings are warnings (exit 0).
      - name: Audit internal links
        run: bun links:audit
