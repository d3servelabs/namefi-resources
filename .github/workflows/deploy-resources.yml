name: Deploy Resources to Vercel

on:
  push:
    branches:
      - main    # Regular push to main branch deploys to dev
    tags:
      - 'astra-resources/v*'  # Tags like astra-resources/v1.0.0 for production deployment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_RELEASE_CHANNEL_URL }} # Slack webhook URL

jobs:
  # Detect if resources package has changed
  detect-changes:
    name: Detect Resources Changes
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.should-deploy.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine before commit
        id: determine-before-commit
        uses: ./.github/actions/determine-before-commit
  
      - name: Detect Turbo changes
        id: turbo-changes
        uses: ./.github/actions/detect-turbo-changes
        with:
          filter: "...[${{ steps.determine-before-commit.outputs.before-commit }}]"

      - name: Determine if should deploy
        id: should-deploy
        run: |
          # Deploy if:
          # 1. Manual workflow dispatch
          # 2. Tag push (astra-resources/v*)
          # 3. Main branch push AND resources has changes
          HAS_CHANGES="${{ contains((steps.turbo-changes.outputs.changed-packages), '@namefi-astra/resources' ) }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "Deploying: Manual workflow dispatch"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/astra-resources/v ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "Deploying: Tag push"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" && "$HAS_CHANGES" == "true" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "Deploying: Main branch push with resources changes"
          else
            echo "result=false" >> $GITHUB_OUTPUT
            echo "Skipping: No relevant changes or trigger"
          fi

  # Compute environment variables
  compute-env:
    name: Compute Environment Variables
    needs: detect-changes
    if: needs.detect-changes.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.compute.outputs.label }}
      vercel_env: ${{ steps.compute.outputs.vercel_env }}
    steps:
      - name: Compute environment values
        id: compute
        run: |
          # Simple logic:
          # - Tag push (astra-resources/v*) = production
          # - Manual dispatch with production = production
          # - Everything else = dev

          IS_PROD="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/astra-resources/v ]]; then
            IS_PROD="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.environment }}" == "production" ]]; then
            IS_PROD="true"
          fi

          # Set label (prod or dev)
          if [[ "$IS_PROD" == "true" ]]; then
            echo "label=prod" >> $GITHUB_OUTPUT
            echo "vercel_env=production" >> $GITHUB_OUTPUT
          else
            echo "label=dev" >> $GITHUB_OUTPUT
            echo "vercel_env=dev" >> $GITHUB_OUTPUT
          fi

          # Output for debugging
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Is Production: $IS_PROD"
          echo "Label: $([ "$IS_PROD" == "true" ] && echo "prod" || echo "dev")"
          echo "Vercel Env: $([ "$IS_PROD" == "true" ] && echo "production" || echo "dev")"

  # Deploy to Vercel
  deploy-vercel:
    name: Deploy Resources to Vercel
    needs: [compute-env]
    runs-on: 'ubuntu-latest'
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          # Deploy to Vercel - builds on Vercel and automatically routes traffic
          # Use --target=production or --target=dev based on environment
          if [[ "${{ needs.compute-env.outputs.label }}" == "prod" ]]; then
            echo "Deploying to production target"
            DEPLOYMENT_URL=$(vercel deploy --target=production --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }})
          else
            echo "Deploying to dev target"
            DEPLOYMENT_URL=$(vercel deploy --target=dev --token=${{ secrets.VERCEL_ACCOUNT_TOKEN }})
          fi

          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployment triggered: $DEPLOYMENT_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_RESOURCES_PROJECT_ID }}

      - name: Show Deployment URL
        run: |
          echo "🚀 Resources deployment triggered: ${{ steps.deploy.outputs.deployment_url }}"
          echo "Target environment: ${{ needs.compute-env.outputs.label }}"
          echo "Build will continue on Vercel"

  # Summary job
  deployment-summary:
    name: Deployment Summary
    needs: [compute-env,  deploy-vercel]
    if: always()
    runs-on: 'ubuntu-latest'
    steps:
      - name: Summary
        id: summary
        run: |
          echo "## 📊 Deployment Summary"
          echo ""
          echo "### Environment: ${{ needs.compute-env.outputs.label }}"
          echo "### Trigger: ${{ github.event_name }}"
          echo "### Ref: ${{ github.ref }}"
          echo ""
          echo "### Frontend Status:"
          echo "- Vercel Deploy: ${{ needs.deploy-vercel.result }}"

          # Determine overall status
          if [[ "${{ needs.deploy-vercel.result }}" == "success" ]]; then
            echo "### 🎉 Deployment Complete!"
            echo "status=success" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy-vercel.result }}" == "skipped" ]]; then
            echo "### Deployment skipped"
            echo "status=skipped" >> $GITHUB_OUTPUT
          else
            echo "### ⚠️ Deployment had issues, please check the logs"
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: always() && !(github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.summary.outputs.status != 'skipped'
        run: |
          # Determine status emoji and color
          if [[ "${{ steps.summary.outputs.status }}" == "success" ]]; then
            STATUS_EMOJI="🎉"
            STATUS_TEXT="Success"
            COLOR="good"
          else
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="Failed"
            COLOR="danger"
          fi

          # Build Slack message payload
          PAYLOAD=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "$COLOR",
                "title": "$STATUS_EMOJI Deployment $STATUS_TEXT",
                "fields": [
                  {
                    "title": "Environment",
                    "value": "${{ needs.compute-env.outputs.label }}",
                    "short": true
                  },
                  {
                    "title": "Trigger",
                    "value": "${{ github.event_name }}",
                    "short": true
                  },
                  {
                    "title": "Ref",
                    "value": "${{ github.ref }}",
                    "short": false
                  },
                  {
                    "title": "namefi-astra-resources (Vercel)",
                    "value": "${{ needs.deploy-vercel.result }}",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>",
                    "short": true
                  },
                  {
                    "title": "Workflow Run",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>",
                    "short": false
                  }
                ],
                "footer": "GitHub Actions",
                "ts": $(date +%s)
              }
            ]
          }
          EOF
          )

          # Send to Slack
          # Requires SLACK_WEBHOOK_URL secret to be set
          if [[ -n "${{ env.SLACK_WEBHOOK_URL }}" ]]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" \
              "${{ env.SLACK_WEBHOOK_URL }}"
            echo "Slack notification sent"
          else
            echo "SLACK_WEBHOOK_URL not configured, skipping notification"
          fi
