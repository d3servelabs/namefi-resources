name: Deploy Resources to Vercel

on:
  push:
    branches:
      - main    # Regular push to main branch deploys to dev
    tags:
      - 'astra-resources/v*'  # Release tags deploy to production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production
      confirm_production:
        description: 'Type deploy-resources-production to confirm a manual production deploy'
        required: false
        default: ''
        type: string

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_RELEASE_CHANNEL_URL }} # Slack webhook URL

jobs:
  # Detect if resources package has changed
  detect-changes:
    name: Detect Resources Changes
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.should-deploy.outputs.result }}
    steps:
      - name: Check if deploy is unconditional
        id: deploy-mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "skip-detection=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual workflow dispatch" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/astra-resources/v ]]; then
            echo "skip-detection=true" >> "$GITHUB_OUTPUT"
            echo "reason=release tag push" >> "$GITHUB_OUTPUT"
          else
            echo "skip-detection=false" >> "$GITHUB_OUTPUT"
            echo "reason=change detection required" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.deploy-mode.outputs.skip-detection != 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Determine before commit
        if: steps.deploy-mode.outputs.skip-detection != 'true'
        id: determine-before-commit
        uses: ./.github/actions/determine-before-commit
  
      - name: Detect Turbo changes
        if: steps.deploy-mode.outputs.skip-detection != 'true'
        id: turbo-changes
        uses: ./.github/actions/detect-turbo-changes
        with:
          base-ref: ${{ steps.determine-before-commit.outputs.before-commit }}
          head-ref: ${{ github.sha }}
          packages: "@namefi-astra/resources"
          fallback-files: |
            bun.lock
            package.json
            bunfig.toml
            .bun-version

      - name: Determine if should deploy
        id: should-deploy
        run: |
          # Deploy if:
          # 1. Manual workflow dispatch
          # 2. Release tag push (astra-resources/v*)
          # 3. Main branch push AND resources has changes
          SKIP_DETECTION="${{ steps.deploy-mode.outputs.skip-detection }}"
          HAS_CHANGES="${{ contains(fromJSON(steps.turbo-changes.outputs.changed-packages || '[]'), '@namefi-astra/resources' ) }}"

          echo "Detection mode: ${{ steps.deploy-mode.outputs.reason }}"

          if [[ "$SKIP_DETECTION" == "true" ]]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            echo "Deploying without change detection"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" && "$HAS_CHANGES" == "true" ]]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            echo "Deploying: Main branch push with resources changes"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: No relevant changes or trigger"
          fi

  # Compute environment variables
  compute-env:
    name: Compute Environment Variables
    needs: detect-changes
    if: needs.detect-changes.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.compute.outputs.label }}
      vercel_env: ${{ steps.compute.outputs.vercel_env }}
    steps:
      - name: Compute environment values
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || '' }}
          CONFIRM_PRODUCTION: ${{ github.event.inputs.confirm_production || '' }}
          GITHUB_REF_NAME_FULL: ${{ github.ref }}
        run: |
          # Production triggers:
          # - Release tag push (astra-resources/v*).
          # - Manual dispatch with environment=production from main or a resources release tag.
          # Other main branch pushes deploy to dev.

          IS_PROD="false"
          if [[ "$EVENT_NAME" == "push" && "$GITHUB_REF_NAME_FULL" =~ ^refs/tags/astra-resources/v ]]; then
            IS_PROD="true"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" && "$DEPLOY_ENVIRONMENT" == "production" ]]; then
            if [[ "$GITHUB_REF_NAME_FULL" != "refs/heads/main" && ! "$GITHUB_REF_NAME_FULL" =~ ^refs/tags/astra-resources/v ]]; then
              echo "Manual production resources deployments must be run from refs/heads/main or an astra-resources release tag, got $GITHUB_REF_NAME_FULL" >&2
              exit 1
            fi
            if [[ "$CONFIRM_PRODUCTION" != "deploy-resources-production" ]]; then
              echo "Manual production resources deployments require confirm_production=deploy-resources-production" >&2
              exit 1
            fi
            IS_PROD="true"
          fi

          # Set label (prod or dev)
          if [[ "$IS_PROD" == "true" ]]; then
            echo "label=prod" >> "$GITHUB_OUTPUT"
            echo "vercel_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev" >> "$GITHUB_OUTPUT"
            echo "vercel_env=dev" >> "$GITHUB_OUTPUT"
          fi

          # Output for debugging
          echo "Event: $EVENT_NAME"
          echo "Ref: $GITHUB_REF_NAME_FULL"
          echo "Is Production: $IS_PROD"
          echo "Label: $([ "$IS_PROD" == "true" ] && echo "prod" || echo "dev")"
          echo "Vercel Env: $([ "$IS_PROD" == "true" ] && echo "production" || echo "dev")"

  # Deploy to Vercel
  deploy-vercel:
    name: Deploy Resources to Vercel
    needs: compute-env
    runs-on: 'ubuntu-latest'
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}
      deployment_state: ${{ steps.inspect.outputs.deployment_state }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        shell: bash
        run: |
          set -euo pipefail

          # Deploy to Vercel - production builds are staged first, then promoted after readiness.
          # Use --target=production or --target=dev based on environment
          if [[ "${{ needs.compute-env.outputs.label }}" == "prod" ]]; then
            echo "Deploying to production target without routing traffic"
            DEPLOYMENT_URL="$(vercel deploy --yes --target=production --skip-domain --token="$VERCEL_ACCOUNT_TOKEN" --scope="$VERCEL_ORG_ID" | tail -n 1 | tr -d '\r')"
          else
            echo "Deploying to dev target"
            DEPLOYMENT_URL="$(vercel deploy --yes --target=dev --token="$VERCEL_ACCOUNT_TOKEN" --scope="$VERCEL_ORG_ID" | tail -n 1 | tr -d '\r')"
          fi

          if [[ -z "$DEPLOYMENT_URL" ]]; then
            echo "Failed to capture Vercel deployment URL" >&2
            exit 1
          fi

          DEPLOYMENT_ID="${DEPLOYMENT_URL#https://}"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployment triggered: $DEPLOYMENT_URL"
        env:
          VERCEL_ACCOUNT_TOKEN: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_RESOURCES_PROJECT_ID }}

      - name: Wait for Vercel deployment readiness
        id: inspect
        shell: bash
        env:
          VERCEL_ACCOUNT_TOKEN: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          set -euo pipefail

          INSPECT_JSON="$(
            vercel inspect "$DEPLOYMENT_URL" \
              --wait \
              --timeout 20m \
              --format=json \
              --token="$VERCEL_ACCOUNT_TOKEN" \
              --scope="$VERCEL_ORG_ID"
          )"

          READY_STATE="$(jq -r '.readyState // .state // empty' <<<"$INSPECT_JSON")"
          echo "Vercel deployment state: $READY_STATE"

          if [[ "$READY_STATE" != "READY" ]]; then
            echo "$INSPECT_JSON" | jq .
            echo "Vercel deployment did not become READY" >&2
            exit 1
          fi

          echo "deployment_state=$READY_STATE" >> "$GITHUB_OUTPUT"

      - name: Promote production deployment
        if: needs.compute-env.outputs.label == 'prod'
        shell: bash
        env:
          VERCEL_ACCOUNT_TOKEN: ${{ secrets.VERCEL_ACCOUNT_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ASTRA_RESOURCES_PROJECT_ID }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.deployment_id }}
        run: |
          set -euo pipefail

          echo "Promoting resources deployment to production: $DEPLOYMENT_ID"
          vercel promote --yes "$DEPLOYMENT_ID" --token="$VERCEL_ACCOUNT_TOKEN" --scope="$VERCEL_ORG_ID"
          echo "Production traffic routed successfully"

      - name: Show Deployment URL
        run: |
          echo "🚀 Resources deployment triggered: ${{ steps.deploy.outputs.deployment_url }}"
          echo "Target environment: ${{ needs.compute-env.outputs.label }}"
          echo "Deployment state: ${{ steps.inspect.outputs.deployment_state }}"

  # Summary job
  deployment-summary:
    name: Deployment Summary
    needs: [compute-env, deploy-vercel]
    if: always()
    runs-on: 'ubuntu-latest'
    steps:
      - name: Summary
        id: summary
        run: |
          echo "## 📊 Deployment Summary"
          echo ""
          echo "### Environment: ${{ needs.compute-env.outputs.label }}"
          echo "### Trigger: ${{ github.event_name }}"
          echo "### Ref: ${{ github.ref }}"
          echo ""
          echo "### Frontend Status:"
          echo "- Vercel Deploy: ${{ needs.deploy-vercel.result }}"
          echo "- Vercel State: ${{ needs.deploy-vercel.outputs.deployment_state }}"

          # Determine overall status
          if [[ "${{ needs.deploy-vercel.result }}" == "success" ]]; then
            echo "### 🎉 Deployment Complete!"
            echo "status=success" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.deploy-vercel.result }}" == "skipped" ]]; then
            echo "### Deployment skipped"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "### ⚠️ Deployment had issues, please check the logs"
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack
        if: always() && !(github.event_name == 'push' && github.ref == 'refs/heads/main') && steps.summary.outputs.status != 'skipped'
        run: |
          # Determine status emoji and color
          if [[ "${{ steps.summary.outputs.status }}" == "success" ]]; then
            STATUS_EMOJI="🎉"
            STATUS_TEXT="Success"
            COLOR="good"
          else
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="Failed"
            COLOR="danger"
          fi

          # Build Slack message payload
          PAYLOAD=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "$COLOR",
                "title": "$STATUS_EMOJI Deployment $STATUS_TEXT",
                "fields": [
                  {
                    "title": "Environment",
                    "value": "${{ needs.compute-env.outputs.label }}",
                    "short": true
                  },
                  {
                    "title": "Trigger",
                    "value": "${{ github.event_name }}",
                    "short": true
                  },
                  {
                    "title": "Ref",
                    "value": "${{ github.ref }}",
                    "short": false
                  },
                  {
                    "title": "namefi-astra-resources (Vercel)",
                    "value": "${{ needs.deploy-vercel.result }}",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>",
                    "short": true
                  },
                  {
                    "title": "Workflow Run",
                    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>",
                    "short": false
                  }
                ],
                "footer": "GitHub Actions",
                "ts": $(date +%s)
              }
            ]
          }
          EOF
          )

          # Send to Slack
          # Requires SLACK_WEBHOOK_URL secret to be set
          if [[ -n "${{ env.SLACK_WEBHOOK_URL }}" ]]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" \
              "${{ env.SLACK_WEBHOOK_URL }}"
            echo "Slack notification sent"
          else
            echo "SLACK_WEBHOOK_URL not configured, skipping notification"
          fi
