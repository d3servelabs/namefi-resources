# Dependabot configuration — recurrent dependency + GitHub Actions updates.
# Pairs with Dependabot *alerts* and *security updates*, which are enabled at the
# repo level via the API (see docs/security-scanning.md), not in this file.
version: 2
updates:
  # GitHub Actions — guaranteed-supported ecosystem. Keeps Actions current and,
  # together with SHA-pinning, closes the mutable-tag supply-chain risk
  # (e.g. the 2025 tj-actions/changed-files compromise).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # JS/TS dependencies. Uses the native `bun` ecosystem (Dependabot GA'd Bun
  # support 2025-02-13), so it reads this Bun workspace's bun.lock directly.
  # Dependency CVEs are additionally covered by `bun audit` + OSV-Scanner in
  # security-scan.yml. Grouped to limit PR churn across the monorepo.
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
