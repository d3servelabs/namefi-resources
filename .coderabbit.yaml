# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

## Note we choose to only include overridden default values. Anything that matches default values shall not be added here.
language: "en-US"
reviews:
  profile: "chill"
  request_changes_workflow: true
  collapse_walkthrough: false
  poem: false
  auto_review:
    drafts: true
    base_branches:
      - ".*"
      - "!prod"
      - "!gtmq_spec_*"
  path_instructions:
    # Matches all files in all directories - serves as the base ruleset for all code
    - path: "**/*"
      instructions: |
        Review according to the repository-specific review policy in .agents/skills/custom-codereview-guide.md and the reusable implementation guardrails in .rulesync/skills/namefi-astra-quality-guardrails/SKILL.md.
        Always check these quality and risk patterns before commenting:
        - Readiness/loading gates and premature success states
        - State defaults, persistence, reset, and migration behavior
        - Missing identity dimensions in keys, locks, caches, and dedupe logic
        - Async races after await, stale closures, double submits, and stale signers
        - Cache invalidation, polling, and stale visible state
        - Temporal determinism, activity idempotency, task queues, and error layers
        - User-facing truthfulness in status, copy, and docs
        - Security, permissions, migrations, CI/release automation, dependencies, and bundle surface

        Also check if the PR violates the following principles, and if so, remind the PR author to modify:
        - **Avoid PR too large**: If PR exceeds 1000 lines of code changes, suggest breaking it down into smaller, focused PRs for better reviewability.
        - **Exceptions are exceptions**: Avoid using exceptions as normal control flow. Exceptions should be reserved for exceptional circumstances, not as a mechanism for routine program flow control.
        - **Don't shout at users when unnecessary**: In UI, highlighted colors, bold fonts, and upper-case text attract attention. Use these emphasis techniques sparingly and only when necessary to guide user focus.
        - **3-strikes DRY principle**:
          While "Don't Repeat Yourself" (DRY) is a valuable principle, premature abstraction can lead to unnecessary complexity. Follow these guidelines:
          1. First occurrence: Write the simplest implementation that works, with a comment noting potential for future reuse.
          2. Second occurrence: Write it again separately, optimizing based on lessons from the first implementation. Add cross-references in comments between the two implementations.
          3. Third occurrence: Refactor to share code following the DRY principle.
          
          Exception: When logic must be strictly synchronized and consistent across instances, earlier refactoring may be appropriate.
        - **Don't format code lines that you didn't change**: 
          When making logic changes, avoid reformatting unrelated code in the same commit as it:
          - Makes it difficult to focus on the actual logic changes
          - Increases the likelihood of merge conflicts
          
          If you want to format code, submit a separate PR dedicated solely to formatting changes, and coordinate with team members to ensure they're not actively working on the affected files.

        Finally, always keep README.md and docstrings up to date with code changes.
    
    # Matches all TypeScript React (TSX) files - specific UI component files or Email templates
    - path: "**/*.tsx"
      instructions: |
        For UI or visual interaction changes, please ensure the PR description includes visual evidence (Loom video recording or screenshots) demonstrating the changes.
    
    # Matches all files in the backend application directory
    - path: "apps/backend/**/*"
      instructions: |
        For backend logic changes, verify that the PR description includes:
        1. The shell command used to validate the changes
        2. Sample output from the author's own test run

        For any changes involving payments, transactions, user assets, or user identity, require the following for approval:
        1. Confirm adequate test coverage
        2. If unit tests should be added, suggest the right tests to add
        3. Verify tests pass

        For changes not involving payments, transactions, user assets, or user identity:
        1. If unit tests should be added, suggest the right tests to add, but do not block approval

    - path: "apps/backend/src/services/**/*"
      instructions: |
        This folder is to be renamed soon, only shared code for trpc and temporal
        goes into this folder.
        If author adds new code to the folder of `apps/backend/src/services`
        but such code is not used by BOTH `apps/backend/src/trpc/` and `apps/backend/src/temporal/`,
        always remind author to reconsider keeping the code closer with the trpc code or
        the temporal code, directly in the places where they are being called from.
    - path: "apps/backend/src/temporal/**/*"
      instructions: |
        For temporal logic changes, verify that the PR description includes:
        1. URL to cloud.temporal.io run or screenshots to local temporal run.
    
    # Matches database-related files - schema definitions and migrations
    - path: "**/{schema,migrations}/**/*"
      instructions: |
        When updating database schema, follow the procedure documented in docs/DB-MIGRATION-PROCEDURE.md.
        Ensure migrations are included in the same PR as schema changes and that they pass validation checks.
        
    # Matches all files in the utility, DNS validation, and environment configuration packages
    - path: "packages/{utils,zod-dns,env}/**/*"
      instructions: |
        Ensure proper test coverage and documentation:
        - Verify unit tests are included for new functionality, if not, suggest actionable changes
        - Check that functions have clear, descriptive docstrings

    - path: "packages/db/src/schema.ts"
      instructions: |
        Ensure database migration is included when schema.ts is changed.

    # Matches all package.json files across the repository - dependency management files
    - path: "**/package.json"
      instructions: |
        When new dependencies are added, verify that they are actually used in the associated code changes and not just speculatively added. Also ensure the lockfile is updated.
  tools:
    ast-grep:
      rule_dirs:
        - ".sgr/rules"
chat:
  auto_reply: true
tone_instructions: "Be kind and professional. If a piece of code is unintuitive or challenging to understand the rationale, ask PR author to explain in code documentation"
