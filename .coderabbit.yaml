# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

## Note we choose to only include overridden default values. Anything that matches default values shall not be added here.
language: "en-US"
reviews:
  profile: "chill"
  request_changes_workflow: true
  collapse_walkthrough: false
  auto_review:
    drafts: true
  path_instructions:
    # Matches all files in all directories - serves as the base ruleset for all code
    - path: "**/*"
      instructions: |
        Review according to guidelines in .cursor/rules/default.mdc.
        Also check if the PR violates the following principles, if not, remind PR author to modify
        - "Avoid PR too large": If PR exceeds 1000 lines of code changes, suggest breaking it down into smaller, focused PRs for better reviewability.
        - "Exceptions are exceptions": Avoid using exceptions as normal control flow
        - "Don’t shout at users when unnecessary": 
          In UI, highlighted color / bold fonts / upper-case attracts attention. Whenever unnecessary, try to avoid such.
        - "3-strikes DRY"
          A widely adopted practice is “DRY: don’t repeat ourselves” to share code. There is a tendency in code development to create generalized solutions for future applications because of it. A lot of times, we will never use them; it just ends up adding complexity and increasing the size of the current code. 
          Therefore, we ask you to generalize the code to be shared only when you see 3 use cases that can be swapped out by the refactor. 
          When you only encounter the first use case, just write the simplest version that supports it. 
          For the second use case, please write it again without sharing code—don’t worry about duplicates, and just focus on optimizing it to create a better version than the first one. Oh, by the way, if you can, please in both first use case and second use cases, add in code comment to to mention the duplicated logic of the other, this makes it easier when the third comes and we see an opportunity to refactor. 
          Only when you see the third use case should you start applying the DRY principle and refactoring. Exceptions: sometimes certain logic needs to be strictly synchronized and consistent, and it can be refactored to share code and avoid duplication in two different instances.
        - "Don’t format code lines that you didn’t change, except for a pure format commit"
          If you have a commit that has certain logic change, formatting it meanwhile makes it
          Hard to focus on what’s actually the logic change
          Prone to merge conflict
          Of course if you are sending a PR/commit ONLY to format code, that’s ok and encouraged, just make sure you ask teammates that they are not actively working on it.

        Finally, pleas always keep README.md and docstrings update to date to the code change.
    
    # Matches all TypeScript React (TSX) files - specific UI component files or Email templates
    - path: "**/*.tsx"
      instructions: |
        For UI or visual interaction changes, please ensure the PR description includes visual evidence (Loom video recording or screenshots) demonstrating the changes.
    
    # Matches all files in the backend application directory
    - path: "apps/backend/**/*"
      instructions: |
        For backend logic changes, verify that the PR description includes:
        1. The shell command used to validate the changes
        2. Sample output from the author's own test run
    - path: "apps/backend/src/temporal/**/*"
      instructions: |
        For temporal logic changes, verify that the PR description includes:
        1. URL to cloud.temporal.io run or screenshots to local temporal run.
    
    # Matches all files in the utility, DNS validation, and environment configuration packages
    - path: "packages/{utils,zod-dns,env}/**/*"
      instructions: |
        Ensure proper test coverage and documentation:
        - Verify unit tests are included for new functionality, if not, suggest actionable changes
        - Check that functions have clear, descriptive docstrings
    
    # Matches all package.json files across the repository - dependency management files
    - path: "**/package.json"
      instructions: |
        When new dependencies are added, verify that they are actually used in the associated code changes and not just speculatively added.
  tools:
    ast-grep:
      rule_dirs:
        - ".sgr/rules"
chat:
  auto_reply: true
tone_instructions: "Be kind and professional. If a piece of code is unintuitive or challenging to understand the rationale, ask PR author to explain in code documentation"
