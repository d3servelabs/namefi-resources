pre-commit:
  commands:
    check:
      run: bun run biome check --diagnostic-level=error --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    sgr:
      run: bun run sgr
      files: git diff --name-only --staged

pre-push:
  commands:
    validate:
      run: bun validate:pre-push

post-checkout:
  commands:
    rulesync-post-checkout:
      run: |
        if [ -n "$CI" ]; then
          exit 0
        fi
        git_dir=$(git rev-parse --git-dir)
        if [ -d "$git_dir/rebase-merge" ] || [ -d "$git_dir/rebase-apply" ]; then
          exit 0
        fi
        old_ref="${1:-}"
        new_ref="${2:-}"
        is_branch_checkout="${3:-}"
        if [ "$is_branch_checkout" != "1" ]; then
          exit 0
        fi
        if [ -n "$old_ref" ] && [ -n "$new_ref" ] && git rev-parse -q --verify "$old_ref" >/dev/null && git rev-parse -q --verify "$new_ref" >/dev/null; then
          changed=$(git diff --name-only "$old_ref" "$new_ref" -- .rulesync rulesync.jsonc)
        elif git rev-parse -q --verify HEAD@{1} >/dev/null; then
          changed=$(git diff --name-only HEAD@{1} HEAD -- .rulesync rulesync.jsonc)
        else
          changed=
        fi
        if [ -n "$changed" ]; then
          bun run rulesync:generate
        fi

post-merge:
  commands:
    rulesync-post-merge:
      run: |
        if [ -n "$CI" ]; then
          exit 0
        fi
        if git rev-parse -q --verify ORIG_HEAD >/dev/null; then
          changed=$(git diff --name-only ORIG_HEAD HEAD -- .rulesync rulesync.jsonc)
        elif git rev-parse -q --verify HEAD@{1} >/dev/null; then
          changed=$(git diff --name-only HEAD@{1} HEAD -- .rulesync rulesync.jsonc)
        else
          changed=
        fi
        if [ -n "$changed" ]; then
          bun run rulesync:generate
        fi

post-rewrite:
  commands:
    rulesync-post-rewrite:
      run: |
        if [ -n "$CI" ]; then
          exit 0
        fi
        rewrite_type="${1:-}"
        if [ "$rewrite_type" = "amend" ]; then
          if git rev-parse -q --verify HEAD@{1} >/dev/null; then
            changed=$(git diff --name-only HEAD@{1} HEAD -- .rulesync rulesync.jsonc)
          else
            changed=
          fi
        elif git rev-parse -q --verify ORIG_HEAD >/dev/null; then
          changed=$(git diff --name-only ORIG_HEAD HEAD -- .rulesync rulesync.jsonc)
        elif git rev-parse -q --verify HEAD@{1} >/dev/null; then
          changed=$(git diff --name-only HEAD@{1} HEAD -- .rulesync rulesync.jsonc)
        else
          changed=
        fi
        if [ -n "$changed" ]; then
          bun run rulesync:generate
        fi
